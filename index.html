<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Vietnam Neon Check-in Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* =========================================
           HỆ THỐNG LÕI MÀU NEON THEO NGÀY
        ========================================= */
        :root {
            --neon-primary: #00f3ff;
            --neon-primary-rgb: 0, 243, 255;
            --neon-secondary: #ff007f;
            --neon-secondary-rgb: 255, 0, 127;
        }

        /* =========================================
           RESET & BASIC SETUP
        ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh; 
            background-color: #f8f9fa;
            color: #111827;
            overflow: hidden;
            user-select: none;
        }

        #map {
            width: 100%;
            height: 100%;
            height: 100dvh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: #f8f9fa;
        }

        .leaflet-control-attribution {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
        }

        /* =========================================
           GIAO DIỆN KAWAII CARTOON VECTOR (MỀM MẠI, BO TRÒN NHƯ STICKER)
        ========================================= */
        /* 1. Nút bấm (Buttons) dạng Sticker Hoạt Hình */
        .location-btn, .photo-btn, .install-btn {
            position: absolute;
            z-index: 1000;
            background: #ffffff !important;
            color: #2d3436 !important; 
            border: 3px solid #2d3436 !important;
            border-bottom: 6px solid #2d3436 !important; 
            padding: 10px 24px !important;
            border-radius: 30px !important; 
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.08) !important; 
            font-weight: 800 !important;
            font-size: 0.95rem !important;
            letter-spacing: 0.5px !important;
            text-shadow: none !important;
            backdrop-filter: none !important;
            transition: transform 0.15s ease-out, border-width 0.15s ease-out, background 0.15s ease-out !important;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .location-btn {
            bottom: max(30px, env(safe-area-inset-bottom)); 
            right: 20px;
        }

        .photo-btn {
            bottom: max(30px, env(safe-area-inset-bottom)); 
            left: 20px;
        }

        .install-btn {
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            display: none; 
        }

        .location-btn:hover, .photo-btn:hover, .install-btn:hover, .photo-btn.active {
            transform: translateY(3px) !important; 
            border-bottom-width: 3px !important; 
            background: var(--neon-primary) !important; 
            color: #2d3436 !important;
        }

        /* 2. Nhãn Vùng/Tỉnh/Huyện dạng Sticker */
        .region-label, .neon-label {
            position: absolute;
            top: -22px;
            background: #ffffff !important;
            color: #2d3436 !important; 
            border: 2px solid #2d3436 !important; 
            border-bottom: 4px solid #2d3436 !important; 
            padding: 6px 20px !important;
            border-radius: 25px !important; 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05) !important;
            text-shadow: none !important; 
            font-size: 0.85rem !important;
            font-weight: 800 !important;
            letter-spacing: 0.3px !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            backdrop-filter: none !important; 
            transition: all 0.15s ease-out !important;
            white-space: nowrap !important;
            min-width: max-content !important;
            pointer-events: auto;
        }

        .custom-district-icon .region-label, .custom-div-icon .neon-label {
            padding: 4px 14px !important;
            font-size: 0.75rem !important;
            border-bottom: 3px solid #2d3436 !important;
        }

        .region-label:hover, .neon-label:hover {
            transform: translateY(2px) !important;
            border-bottom-width: 2px !important;
            background: var(--neon-secondary) !important;
            color: #ffffff !important;
            cursor: pointer;
            z-index: 1000 !important;
        }

        /* 3. Đổi Popup Map thành màn hình máy tính bo tròn */
        .leaflet-popup-content-wrapper {
            background: #ffffff !important;
            color: #2d3436 !important;
            border: 3px solid #2d3436 !important;
            border-bottom: 6px solid #2d3436 !important; 
            border-radius: 24px !important; 
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08) !important;
            backdrop-filter: none !important;
            padding: 8px !important;
        }
        
        .leaflet-popup-tip {
            display: none !important; 
        }

        .popup-title {
            color: #2d3436 !important;
            text-shadow: none !important;
            border-bottom: 2px dashed #b2bec3 !important;
            font-weight: 800 !important;
            padding-bottom: 8px !important;
            font-size: 1.15rem;
            margin-bottom: 8px;
        }

        .popup-info {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #374151 !important;
        }

        .popup-info b {
            color: var(--neon-secondary);
        }

        .btn-gps-checkin {
            width: 100%;
            padding: 8px;
            font-weight: bold;
            cursor: pointer;
            background: #ffffff !important;
            color: #2d3436 !important;
            border: 2px solid #2d3436 !important;
            border-bottom: 4px solid #2d3436 !important;
            border-radius: 16px !important;
            transition: all 0.15s ease-out !important;
            margin-top: 12px !important;
        }

        .btn-gps-checkin:hover {
            transform: translateY(2px) !important;
            border-bottom-width: 2px !important;
            background: var(--neon-primary) !important;
        }

        /* =========================================
           CÁC THÔNG BÁO VÀ LOADING
        ========================================= */
        #syncToast {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #2d3436;
            color: #2d3436;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: opacity 0.5s ease;
            opacity: 0; 
            pointer-events: none;
        }

        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f8f9fa;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease-in-out, visibility 0.6s ease-in-out;
        }

        .loading-text {
            color: #111827 !important;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: none !important;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        /* =========================================
           HIỆU ỨNG ĐƯỜNG VIỀN RANH GIỚI NEON
        ========================================= */
        path.neon-province-border {
            filter: drop-shadow(0 0 3px rgba(var(--neon-primary-rgb), 0.5));
            transition: fill-opacity 0.5s ease, filter 0.5s ease, opacity 0.3s ease;
        }
        
        path.neon-province-active {
            filter: drop-shadow(0 0 6px var(--neon-secondary)) drop-shadow(0 0 12px var(--neon-secondary));
            transition: fill-opacity 0.5s ease, filter 0.5s ease, opacity 0.3s ease;
        }

        /* =========================================
           THIẾT KẾ MARKERS TRÊN BẢN ĐỒ
        ========================================= */
        .neon-marker-container {
            position: relative;
            width: 28px;
            height: 28px;
            display: flex;
            justify-content: center;
            transition: opacity 0.4s ease, transform 0.3s ease;
        }

        .neon-dot {
            width: 18px;
            height: 18px;
            background: var(--neon-secondary);
            border-radius: 50%;
            border: 2px solid #ffffff;
            position: absolute;
            top: 5px;
            box-shadow: 0 0 15px var(--neon-secondary), 0 0 25px var(--neon-secondary), 0 0 35px var(--neon-secondary);
            z-index: 2;
            cursor: pointer;
        }

        .neon-pulse {
            width: 28px;
            height: 28px;
            background: rgba(var(--neon-secondary-rgb), 0.7);
            border-radius: 50%;
            position: absolute;
            top: 0;
            animation: ripple 1.8s infinite ease-out;
            z-index: 1;
        }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        .red-flag-marker {
            font-size: 24px;
            filter: drop-shadow(0 0 8px #ff0000) drop-shadow(0 0 15px #ff0000);
            transition: transform 0.2s;
            cursor: pointer;
        }

        .red-flag-marker:hover {
            transform: scale(1.3) translateY(-3px);
        }

        .gps-dot {
            width: 16px;
            height: 16px;
            background: var(--neon-primary);
            border-radius: 50%;
            border: 2px solid #fff;
            position: absolute;
            top: 6px;
            left: 6px;
            box-shadow: 0 0 15px var(--neon-primary), 0 0 30px var(--neon-primary);
            z-index: 2;
        }

        .gps-pulse {
            width: 28px;
            height: 28px;
            background: rgba(var(--neon-primary-rgb), 0.6);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            animation: ripple 1.5s infinite ease-out;
            z-index: 1;
        }

        .photo-album-marker {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6), 0 0 15px rgba(189, 0, 255, 0.5);
            background: linear-gradient(45deg, #101026, #2a2a72);
            background-size: cover;
            background-position: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .photo-album-marker:hover {
            transform: scale(1.15);
            z-index: 2000 !important;
        }

        .photo-album-badge {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 6px;
            backdrop-filter: blur(3px);
        }

        /* =========================================
           THƯ VIỆN ẢNH IN-APP MASONRY GIAO DIỆN
        ========================================= */
        .gallery-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background-color: #f8f9fa !important;
            color: #111827 !important;
            z-index: 20000;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .gallery-container.active {
            transform: translateY(0);
        }
        
        .gallery-header {
            padding: max(20px, env(safe-area-inset-top)) 20px 15px 20px;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e5e7eb;
        }

        .gallery-title {
            color: #2d3436;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .close-gallery-btn {
            background: #ffffff;
            color: #2d3436;
            border: 2px solid #2d3436;
            border-bottom: 4px solid #2d3436;
            padding: 6px 12px;
            border-radius: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
        }

        .close-gallery-btn:hover {
            transform: translateY(2px);
            border-bottom-width: 2px;
            background: #f1f5f9;
        }
        
        .gallery-grid {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            column-count: 4;
            column-gap: 12px;
        }

        @media (max-width: 1024px) {
            .gallery-grid { column-count: 3; }
        }

        @media (max-width: 768px) {
            .gallery-grid { 
                column-count: 2; 
                column-gap: 8px; 
                padding: 8px; 
            }
        }

        .gallery-item {
            width: 100%;
            height: auto;
            margin-bottom: 12px;
            border-radius: 8px;
            background: #111;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: opacity 0.2s, transform 0.2s;
            break-inside: avoid;
            display: block;
        }

        @media (max-width: 768px) {
            .gallery-item { margin-bottom: 8px; }
        }

        .gallery-item:active {
            opacity: 0.6;
        }

        .gallery-item:hover {
            transform: scale(1.02);
        }
        
        .empty-gallery {
            text-align: center;
            color: #374151 !important;
            margin-top: 50px;
            width: 100%;
            column-span: all;
        }
        
        /* GIAO DIỆN LIGHTBOX (XEM ẢNH FULL SCREEN) */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 25000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-close, .lightbox-nav {
            background: rgba(255,255,255,0.2);
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: background 0.3s;
        }

        .lightbox-close {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            width: 35px;
            height: 35px;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 25002;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            font-size: 1.5rem;
            z-index: 25001;
        }

        .lightbox-nav:hover, .lightbox-close:hover {
            background: rgba(255,255,255,0.3);
        }

        .lightbox-prev { left: 15px; }
        .lightbox-next { right: 15px; }

        .lightbox-img-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.2s ease-out; 
            transform-origin: center center;
            touch-action: none; 
        }

        @media (max-width: 768px) {
            .lightbox-nav { display: none; }
        }

        /* =========================================
           HỘP THOẠI NHẬP LIỆU (SMART 2-STEP MODAL)
        ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: rgba(255, 255, 255, 0.95) !important;
            color: #111827 !important;
            width: 90%;
            max-width: 420px;
            padding: 22px;
            border-radius: 24px;
            border: 3px solid #2d3436 !important;
            border-bottom: 6px solid #2d3436 !important;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08) !important;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
            max-height: 92vh;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: #2d3436;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-align: center;
            flex-shrink: 0;
        }

        .auto-region-badge {
            background: #f1f5f9;
            border: 2px dashed #b2bec3;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #475569;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .auto-region-badge span {
            color: #2d3436;
            font-weight: bold;
        }

        .step-container {
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #475569 !important;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            background: #ffffff !important;
            border: 2px solid #cbd5e1 !important;
            border-radius: 12px;
            padding: 10px 12px;
            color: #111827 !important;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #2d3436 !important;
            box-shadow: 0 0 0 3px rgba(45, 52, 54, 0.1);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #2d3436;
            border-bottom: 4px solid #2d3436;
            border-radius: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease-out;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            background: #ffffff;
            color: #2d3436;
        }

        .btn:hover {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .btn-submit {
            background: var(--neon-primary);
        }

        .stamp-preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 5px 0;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
            border: 2px dashed #cbd5e1;
        }
        
        .stamp-preview-title {
            font-size: 0.85rem;
            color: #2d3436;
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #stampCanvas {
            width: 240px;
            height: 315px; 
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            background: transparent;
        }

        /* =========================================
           HIỆU ỨNG VÙNG ĐỊA LÝ KHI ZOOM XA
        ========================================= */
        .hide-neon-labels .neon-label {
            opacity: 0;
            visibility: hidden;
        }

        .hide-neon-labels .neon-marker-container {
            transform: scale(0.65);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.3s ease, opacity 0.4s ease;
        }

        .neon-marker-container {
            transition: opacity 0.4s ease, transform 0.3s ease;
        }

        .region-label {
            transition: opacity 0.4s ease, transform 0.2s ease;
        }

        /* =========================================
           TỐI ƯU HÓA HIỆU NĂNG RENDER
        ========================================= */
        .map-zooming path,
        .map-zooming .neon-dot,
        .map-zooming .neon-pulse,
        .map-zooming .red-flag-marker,
        .map-zooming .gps-dot,
        .map-zooming .gps-pulse,
        .map-zooming .photo-album-marker,
        .map-zooming .location-btn,
        .map-zooming .photo-btn {
            filter: none !important;
            box-shadow: none !important;
            animation: none !important;
            transition: none !important;
        }

        .fade-out {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div id="loadingOverlay">
        <img src="black-rainbow-cat.svg" alt="Loading Cat" style="width: 120px; height: auto; object-fit: contain;">
        <div class="loading-text">⏳ ĐANG TRUY XUẤT DỮ LIỆU...</div>
    </div>

    <!-- MÀN HÌNH HIỆU ỨNG KHI TÌM VỊ TRÍ -->
    <div id="ghibliOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(248, 249, 250, 0.9); backdrop-filter: blur(5px); z-index: 15000; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s ease;">
        <div style="text-align: center; display: flex; flex-direction: column; align-items: center;">
            <img src="GibliTribute.svg" alt="Ghibli Tribute" style="width: 180px; height: auto; max-width: 80%; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); animation: floatGhibli 2s ease-in-out infinite;">
            <div style="margin-top: 15px; font-weight: bold; color: #475569; font-size: 1rem; letter-spacing: 1px;">ĐANG TÌM TỌA ĐỘ...</div>
        </div>
    </div>

    <style>
        @keyframes floatGhibli {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>

    <!-- MÀN HÌNH HIỆU ỨNG CHECK-IN THÀNH CÔNG -->

        function removeVietnameseTones(str) {
            if (!str) return "";
            str = str.toLowerCase();
            str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
            str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
            str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
            str = str.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
            str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
            str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
            str = str.replace(/đ/g, "d");
            return str;
        }

                    if (normVisited.includes(normalizedP) || normalizedP.includes(normVisited)) {

                return false;
            });

        function getPolygonCentroid(feature) {
            try {
                let coords = feature.geometry.coordinates;
                let type = feature.geometry.type;
                let biggestRing = [];
                let maxArea = 0;

                function getRingArea(ring) {
                    let area = 0;
                    for (let i = 0, len = ring.length; i < len; i++) {
                        let j = (i + 1) % len;
                        area += ring[i][0] * ring[j][1] - ring[j][0] * ring[i][1];
                    }
                    return Math.abs(area / 2);
                }

                if (type === "Polygon") {
                    for (let ring of coords) {
                        let a = getRingArea(ring);
                        if (a > maxArea) { maxArea = a; biggestRing = ring; }
                    }
                } else if (type === "MultiPolygon") {
                    for (let poly of coords) {
                        for (let ring of poly) {
                            let a = getRingArea(ring);
                            if (a > maxArea) { maxArea = a; biggestRing = ring; }
                        }
                    }
                }

                if (!biggestRing || biggestRing.length === 0) return null;

                let twiceArea = 0, x = 0, y = 0, nPts = biggestRing.length;
                let p1, p2, f;
                for (let i = 0, j = nPts - 1; i < nPts; j = i++) {
                    p1 = biggestRing[i]; 
                    p2 = biggestRing[j];
                    f = p1[0] * p2[1] - p2[0] * p1[1];
                    twiceArea += f;
                    x += (p1[0] + p2[0]) * f;
                    y += (p1[1] + p2[1]) * f;
                }
                
                if (twiceArea === 0) return null;
                f = twiceArea * 3;
                return { lat: y / f, lng: x / f };
            } catch(e) {
                return null;
            }
        }

        function isPointInPolygon(point, vs) {
            var x = point[0], y = point[1];
            var inside = false;
            for (var i = 0, j = vs.length - 1; i < vs.length; j = i++) {
                var xi = vs[i][0], yi = vs[i][1];
                var xj = vs[j][0], yj = vs[j][1];
                var intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function addRegionalMarker(name, lat, lng, desc) {
            const regionKey = name.trim().toLowerCase();
            if (activeRegionsTracker.has(regionKey)) return;

            let finalLat = lat;
            let finalLng = lng;
            
            if (geoJsonBordersData) {
                const normalizedTarget = removeVietnameseTones(regionKey.replace(/thành phố |tỉnh |tp\. /gi, '').trim());
                const feature = geoJsonBordersData.features.find(f => {
                    if(!f.properties) return false;
                    const rawProps = removeVietnameseTones(JSON.stringify(f.properties));
                    return rawProps.includes(normalizedTarget);
                });
                
                if (feature) {
                    const centroid = getPolygonCentroid(feature);
                    if (centroid) { finalLat = centroid.lat; finalLng = centroid.lng; }
                }
            } else {
                const standardProv = VN_PROVINCES.find(p => p.name.toLowerCase() === regionKey);
                if (standardProv) { finalLat = standardProv.lat; finalLng = standardProv.lng; }
            }

            const marker = L.marker([finalLat, finalLng], { icon: createRegionalIcon(name) }).addTo(regionalLayer);
            marker.bindPopup(`<div class="popup-title">📍 ${name}</div><p style="color:#d1d5db;">${desc}</p>`);
            
            marker.on('popupopen', function(e) {
                const iconElement = e.target.getElement();
                if (iconElement) {
                    const label = iconElement.querySelector('.neon-label');
                    if (label) { label.style.transition = 'opacity 0.2s'; label.style.opacity = '0'; }
                }
            });

            marker.on('popupclose', function(e) {
                const iconElement = e.target.getElement();
                if (iconElement) {
                    const label = iconElement.querySelector('.neon-label');
                    if (label) { label.style.opacity = '1'; }
                }
            });

            marker.on('click', () => {
                map.flyTo([finalLat, finalLng], 11, { duration: 1.5 });
            });
            
            activeRegionsTracker.add(regionKey);
        }

        function startStampPress(e, lat, lng, nameStr) {
            isPressing = true;
            pressTimer = setTimeout(() => {
                if(isPressing) {
                    targetStampInfo = globalSpotsData.find(s => s.name === nameStr && Math.abs(s.lat - lat) < 0.0001 && Math.abs(s.lng - lng) < 0.0001);
                    if (targetStampInfo) {
                        document.getElementById('stampOptionsMenu').classList.add('active');
                    }
                }
            }, 800); 
        }

        function cancelStampPress() {
            isPressing = false;
            clearTimeout(pressTimer);
        }

        // ==========================================
        // VẼ ĐƯỜNG VIỀN RANH GIỚI TỈNH VÀ VÙNG
        // ==========================================
        function loadProvinceBorders() {
            fetch(GEOJSON_VN_BORDERS_URL)
                .then(res => res.json())
                .then(data => {
                    geoJsonBordersData = data;
                    renderProvinceBorders();
                    
                    const cachedDataStr = localStorage.getItem(LOCAL_STORAGE_KEY);
                    if (cachedDataStr) {
                        renderDataToMap(JSON.parse(cachedDataStr));
                    }
                })
                .catch(err => console.log("Không tải được ranh giới tỉnh:", err));
                
            fetch(GEOJSON_VN_DISTRICTS_URL)
                .then(res => res.json())
                .then(data => { 
                    geoJsonDistrictsData = data; 
                    initDistrictLayer();
                })

        function getProvinceStyle(feature) {
            let propName = String(feature.properties.Name || feature.properties.name || feature.properties.ten_tinh || feature.properties.NAME_1 || "");
            let normalized = removeVietnameseTones(propName.replace(/Thành phố /i, 'TP. ').replace(/Tỉnh /i, '').trim());
            const currentZoom = map.getZoom();

            if (currentZoom >= 10.5) {
                let normalizedActiveProv = activeProvinceName ? removeVietnameseTones(activeProvinceName) : "";
                
                if (normalizedActiveProv !== "" && normalized !== "" && (normalized === normalizedActiveProv || normalized.includes(normalizedActiveProv) || normalizedActiveProv.includes(normalized))) {
                    return { stroke: false, fill: false, className: '' }; 
                }
                
                return { stroke: false, fill: false, className: '' };
            } 
            
            let region = getRegionForProvince(propName);
            if (activeRegionId && region && region.id === activeRegionId) {
                return { stroke: true, color: currentAppColors.primary, weight: 1.5, opacity: 0.6, fill: false, className: 'neon-province-border' };
            }

            return { stroke: false, fill: false, className: '' };
        }

        function getRegionStyle(feature) {
            let propName = String(feature.properties.Name || feature.properties.name || feature.properties.ten_tinh || feature.properties.NAME_1 || "");
            let region = getRegionForProvince(propName);

            if (region) {
                let isVisited = isMacroRegionVisited(region);
                if (isVisited) {
                    return { stroke: true, color: region.color, weight: 2, opacity: 0.9, fill: true, fillColor: region.color, fillOpacity: 0.15, className: 'region-border' };
                } else {
                    return { stroke: true, color: region.color, weight: 1, opacity: 0.25, fill: true, fillColor: region.color, fillOpacity: 0.02, className: 'region-border' };
                }
            }
            
            return { stroke: false, fill: false, className: '' };
        }

        function renderProvinceBorders() {
            if (!geoJsonBordersData) return;
            if (geoJsonLayer) map.removeLayer(geoJsonLayer);

            geoJsonLayer = L.geoJSON(geoJsonBordersData, {
                interactive: false,
                style: map.getZoom() < 7.5 ? getRegionStyle : getProvinceStyle
            }).addTo(map);

            geoJsonLayer.bringToBack();
            lastRenderedRegionId = map.getZoom() < 7.5 ? 'ZOOMED_OUT' : activeRegionId; 
        }
        
        // ==========================================
        // HỆ THỐNG VẼ VÀ TÍNH TOÁN CẤP HUYỆN
        // ==========================================
        function isDistrictVisited(feature) {
            if (!feature.geometry || !feature.geometry.coordinates) return false;
            let type = feature.geometry.type;
            let coords = feature.geometry.coordinates;
            
            for (let i = 0; i < globalSpotsData.length; i++) {
                let pt = [globalSpotsData[i].lng, globalSpotsData[i].lat]; 
                let inside = false;
                
                if (type === "Polygon") {
                    inside = isPointInPolygon(pt, coords[0]);
                } else if (type === "MultiPolygon") {
                    for (let k = 0; k < coords.length; k++) {
                        if (isPointInPolygon(pt, coords[k][0])) { inside = true; break; }
                    }
                }
                if (inside) return true;
            }
            return false;
        }

        function getDistrictStyle(feature) {
            let normalizedActiveProv = activeProvinceName ? removeVietnameseTones(activeProvinceName) : "";
            
            if (!normalizedActiveProv || normalizedActiveProv === "") {
                return { stroke: false, fill: false, className: '' };
            }

            let belongToActiveProv = false;
            for (let key in feature.properties) {
                let val = String(feature.properties[key]);
                let normVal = removeVietnameseTones(val);
                if (normVal !== "" && (normVal === normalizedActiveProv || normVal.includes(normalizedActiveProv))) {
                    belongToActiveProv = true;
                    break;
                }
            }

            if (!belongToActiveProv) {
                return { stroke: false, fill: false, className: '' };
            }

            let isVisited = isDistrictVisited(feature);
            if (isVisited) {
                return { 
                    stroke: true, 
                    color: currentAppColors.secondary,
                    weight: 2.5,      
                    opacity: 1,       
                    fill: false,      
                    className: 'neon-province-active' 
                };
            } else {
                return { stroke: true, color: currentAppColors.primary, weight: 1.2, opacity: 0.6, fill: false, className: 'neon-province-border' };
            }
        }

        function initDistrictLayer() {
            if (!geoJsonDistrictsData) return;
            if (!geoJsonDistrictsLayer) {
                geoJsonDistrictsLayer = L.geoJSON(geoJsonDistrictsData, {
                    interactive: false,
                    style: getDistrictStyle
                });
            }
        }
// ==========================================
        // API TỰ ĐỘNG NẠP TÊN 700+ QUẬN HUYỆN CÓ DẤU CHUẨN 100%
        // ==========================================
        let vnProvincesData = [];
        
        // [CẬP NHẬT 1]: Thay đường link sập bằng kho dữ liệu Github (Vĩnh viễn không chết)
        fetch('https://raw.githubusercontent.com/kenzouno1/DiaGioiHanhChinhVN/master/data.json')
            .then(res => res.json())
            .then(data => {
                // Ép dữ liệu Github về đúng cấu trúc để mã cũ của bạn hiểu được
                vnProvincesData = data.map(p => ({
                    name: p.Name,
                    districts: p.Districts ? p.Districts.map(d => ({ name: d.Name })) : []
                }));
                // Yêu cầu bản đồ in lại chữ nếu đang mở
                if (map.getZoom() >= 10.5) renderDistrictLabels();
            }).catch(e => console.log("Lỗi API từ điển"));

        function renderDistrictLabels() {
            districtLabelLayer.clearLayers();
            if (!geoJsonDistrictsData || !activeProvinceName) return;

            let normalizedActiveProv = removeVietnameseTones(activeProvinceName).toLowerCase();
            if (!normalizedActiveProv) return;

            let activeProvApiData = vnProvincesData.find(p => {
                let pName = removeVietnameseTones(p.name).toLowerCase();
                return pName.includes(normalizedActiveProv) || normalizedActiveProv.includes(pName.replace(/\b(tinh|thanh pho)\b/g, '').trim());
            });

            // [CẬP NHẬT 2]: Thêm bộ lọc chặn việc in 2 nhãn giống hệt nhau lên bản đồ
            let renderedLabels = new Set();

            geoJsonDistrictsData.features.forEach(feature => {
                let belongToActiveProv = false;
                for (let key in feature.properties) {
                    let val = String(feature.properties[key]);
                    let normVal = removeVietnameseTones(val).toLowerCase();
                    if (normVal !== "" && (normVal === normalizedActiveProv || normVal.includes(normalizedActiveProv))) {
                        belongToActiveProv = true;
                        break;
                    }
                }
                
                if (belongToActiveProv) {
                    let rawName = feature.properties.Ten_Huyen || feature.properties.NAME_2 || feature.properties.Name || feature.properties.name || "";
                    let rawType = feature.properties.TYPE_2 || feature.properties.type || "";
                    
                    let geoCore = removeVietnameseTones(rawName).toLowerCase();
                    geoCore = geoCore.replace(/\b(huyen|thi xa|thanh pho|quan|district|city|town)\b/g, '');
                    geoCore = geoCore.replace(/y/g, 'i').replace(/[^a-z0-9]/g, ''); 
                    
                    let finalName = "";

                    if (activeProvApiData && activeProvApiData.districts) {
                        for (let d of activeProvApiData.districts) {
                            let apiCore = removeVietnameseTones(d.name).toLowerCase();
                            apiCore = apiCore.replace(/\b(huyen|thi xa|thanh pho|quan)\b/g, '');
                            apiCore = apiCore.replace(/y/g, 'i').replace(/[^a-z0-9]/g, '');
                            
                            if (geoCore === apiCore) {
                                let geoIsTown = /\b(thi xa|town)\b/i.test(rawName + " " + rawType);
                                let apiIsTown = /\bthị xã\b/i.test(d.name);
                                
                                let geoIsCity = /\b(thanh pho|city)\b/i.test(rawName + " " + rawType);
                                let apiIsCity = /\bthành phố\b/i.test(d.name);
                                
                                if (geoIsTown === apiIsTown && geoIsCity === apiIsCity) {
                                    finalName = d.name; 
                                    break;
                                } else if (!finalName) {
                                    finalName = d.name; 
                                }
                            }
                        }
                    }

                    if (!finalName && rawName !== "") {
                        let cleanedName = rawName.replace(/\b(District|City|Town)\b/ig, '').trim();
                        let prefix = "";
                        if (!/\b(Huyện|Thị xã|Thành phố|Quận)\b/i.test(cleanedName)) {
                            if (/district/i.test(rawType)) prefix = /[0-9]/.test(cleanedName) ? "Quận " : "Huyện ";
                            else if (/city/i.test(rawType)) prefix = "Thành phố ";
                            else if (/town/i.test(rawType)) prefix = "Thị xã ";
                        }
                        finalName = prefix + cleanedName;
                    }
                    
                    let isVisited = isDistrictVisited(feature);
                    let centroid = getPolygonCentroid(feature);
                    
                    if (centroid && finalName !== "") {
                        
                        // [CẬP NHẬT 2]: Nếu tên đã được vẽ trước đó rồi thì bỏ qua luôn (trị dứt điểm 2 Huyện Cao Lãnh)
                        if (renderedLabels.has(finalName)) return;
                        renderedLabels.add(finalName);

                        let htmlContent = '';
                        if (isVisited) {
                            htmlContent = `<div class="region-label">${finalName}</div>`;
                        } else {
                            htmlContent = `<div class="region-label" style="opacity: 0.5;">${finalName}</div>`;
                        }
                        const icon = L.divIcon({ className: 'custom-district-icon', html: htmlContent, iconSize: [160, 20], iconAnchor: [80, 10] });
                        L.marker([centroid.lat, centroid.lng], { icon: icon }).addTo(districtLabelLayer);
                    }
                }
            });
        }


        
        function preloadStampsIntoCache(spots) {
            if (!window.caches) return;
            caches.open('neon-stamps-cache-v1').then(cache => {
                spots.forEach(spot => {
                    const cleanUrl = (spot.stampUrl || "").toString().trim();
                    if (cleanUrl.startsWith('http')) {
                        cache.match(cleanUrl).then(res => {
                            if (!res) {
                                fetch(cleanUrl, { mode: 'no-cors' }).then(networkRes => {
                                    cache.put(cleanUrl, networkRes);
                                }).catch(() => {});
                            }
                        });
                    }
                });
            });
        }

        function renderDataToMap(data) {
            regionalLayer.clearLayers();
            spotLayer.clearLayers();
            activeRegionsTracker.clear(); 
            globalSpotsData = []; 

            let spotCount = 0;
            
            if (data && data.regions) {
                data.regions.forEach(function(reg) {
                    addRegionalMarker(reg.name, reg.lat, reg.lng, reg.desc);
                });
            }
            
            if (data && data.spots) {
                globalSpotsData = data.spots; 
                data.spots.forEach(function(spot) {
                    addSpotMarker(spot.name, spot.lat, spot.lng, spot.date, spot.note, spot.stampUrl);
                    spotCount++;
                });
            }
            
            const uniqueRegionsCount = activeRegionsTracker.size;
            
            if (isPhotoView) {
                renderPhotoLayer();
            } else {
                updateLayerVisibility();
            }

            lastRenderedRegionId = null; 
            renderProvinceBorders();
            renderMacroRegionsLabel();

            return { regCount: uniqueRegionsCount, spotCount };
        }

        // ==========================================
        // 3. TÍNH NĂNG CHUYỂN ĐỔI CHẾ ĐỘ ẢNH (PHOTO MODE)
        // ==========================================
        function togglePhotoView() {
            isPhotoView = !isPhotoView;
            const btn = document.getElementById('togglePhotoBtn');

            if (isPhotoView) {
                btn.classList.add('active');
                btn.innerHTML = '🔙 Tắt Ảnh';
                if (map.hasLayer(regionalLayer)) map.removeLayer(regionalLayer);
                if (map.hasLayer(spotLayer)) map.removeLayer(spotLayer);
                renderPhotoLayer(); 
                map.addLayer(photoLayer);
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '📸 Ảnh';
                if (map.hasLayer(photoLayer)) map.removeLayer(photoLayer);
                updateLayerVisibility();
            }
        }

        function renderPhotoLayer() {
            photoLayer.clearLayers();
            globalSpotsData.forEach((spot, index) => {
                const markerId = `album-cover-${index}`;
                const badgeId = `album-badge-${index}`;
                
                const cleanStampUrl = (spot.stampUrl || "").toString().trim();
                const bgStyle = cleanStampUrl ? `background-image: url('${cleanStampUrl}');` : '';
                
                const photoIcon = L.divIcon({
                    className: 'custom-photo-icon',
                    html: `<div class="photo-album-marker" id="${markerId}" style="${bgStyle}"><div class="photo-album-badge" id="${badgeId}">⏳</div></div>`,
                    iconSize: [65, 65],
                    iconAnchor: [32, 32]
                });

                const marker = L.marker([spot.lat, spot.lng], { icon: photoIcon }).addTo(photoLayer);
                
                marker.on('click', () => {
                    const cleanFolderUrl = (spot.folderUrl || "").toString().trim();
                    if (cleanFolderUrl.startsWith('http')) {
                        openInAppGallery(spot.name, cleanFolderUrl); 
                    } else {
                        alert(`Chưa có Album cho [${spot.name}] hoặc đang đồng bộ!`);
                    }
                });

                const cleanFolderUrl = (spot.folderUrl || "").toString().trim();
                if (cleanFolderUrl.startsWith('http')) {
                    fetch(`${GAS_API_URL}?action=getPhotos&folderUrl=${encodeURIComponent(cleanFolderUrl)}`)
                        .then(res => res.json())
                        .then(data => {
                            const markerEl = document.getElementById(markerId);
                            const badgeEl = document.getElementById(badgeId);
                            if (data.images && data.images.length > 0) {
                                if (badgeEl) badgeEl.innerText = data.images.length; 
                                
                                if (markerEl && !cleanStampUrl) {

                                    markerEl.style.backgroundImage = `url('https://drive.google.com/thumbnail?id=${coverId}&sz=w200')`;
                                }
                            } else {
                                if (badgeEl) badgeEl.innerText = "0"; 
                            }
                        })
                        .catch(() => {
                            const badgeEl = document.getElementById(badgeId);
                            if (badgeEl) badgeEl.innerText = "!";
                        });
                } else {
                    const badgeEl = document.getElementById(badgeId);
                    if (badgeEl) badgeEl.innerText = "0";
                }
            });
        }

        // ==========================================
        // 4. QUẢN LÝ GIAO DIỆN IN-APP GALLERY VÀ LIGHTBOX
        // ==========================================
        const galleryContainer = document.getElementById('inAppGallery');
        const galleryGrid = document.getElementById('galleryGrid');
        const galleryTitle = document.getElementById('galleryTitle');
        const lightboxOverlay = document.getElementById('lightboxOverlay');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxContainer = document.getElementById('lightboxContainer');

        let currentAlbumImages = [];
        let currentImageIndex = 0;
        let currentScale = 1;
        let currentTranslateX = 0;
        let currentTranslateY = 0;
        let touchStartX = 0;
        let touchStartY = 0;
        let lastTapTime = 0;

        function openInAppGallery(name, folderUrl) {
            galleryTitle.innerText = name;
            galleryGrid.innerHTML = '<div class="empty-gallery">⏳ Đang tải ảnh từ vệ tinh...</div>';
            galleryContainer.classList.add('active');

            fetch(`${GAS_API_URL}?action=getPhotos&folderUrl=${encodeURIComponent(folderUrl)}`)
                .then(res => res.json())
                .then(data => {
                    galleryGrid.innerHTML = '';
                    if (!data.images || data.images.length === 0) {
                        galleryGrid.innerHTML = '<div class="empty-gallery">📭 Album này chưa có ảnh nào.<br><br>Hãy vào Drive tải ảnh lên nhé!</div>';
                        currentAlbumImages = [];
                        return;
                    }
                    currentAlbumImages = data.images;
                    data.images.forEach((imgId, index) => {
                        const thumbUrl = `https://drive.google.com/thumbnail?id=${imgId}&sz=w800`;
                        const imgElem = document.createElement('img');
                        imgElem.src = thumbUrl;
                        imgElem.className = 'gallery-item';
                        imgElem.loading = 'lazy';
                        imgElem.onclick = () => openLightbox(index);
                        galleryGrid.appendChild(imgElem);
                    });
                })
                .catch(() => {
                    galleryGrid.innerHTML = '<div class="empty-gallery">⚠️ Lỗi kết nối lấy dữ liệu ảnh!</div>';
                });
        }

        function closeInAppGallery() {
            galleryContainer.classList.remove('active');
        }

        function openLightbox(index) {
            currentImageIndex = index;
            updateLightboxImage();
            
            document.querySelector('.lightbox-prev').style.display = 'flex';
            document.querySelector('.lightbox-next').style.display = 'flex';
            
            lightboxOverlay.classList.add('active');
        }

        function updateLightboxImage() {
            const imgId = currentAlbumImages[currentImageIndex];
            lightboxImg.src = `https://drive.google.com/thumbnail?id=${imgId}&sz=s0`;
            resetZoom();
        }

        function closeLightbox(event) {
            if(event) event.stopPropagation();
            lightboxOverlay.classList.remove('active');
            lightboxImg.src = '';
            resetZoom();
        }

        function nextImage(event) {
            if(event) event.stopPropagation();
            if (currentAlbumImages.length <= 1) return;
            currentImageIndex = (currentImageIndex + 1) % currentAlbumImages.length;
            updateLightboxImage();
        }

        function prevImage(event) {
            if(event) event.stopPropagation();
            if (currentAlbumImages.length <= 1) return;
            currentImageIndex = (currentImageIndex - 1 + currentAlbumImages.length) % currentAlbumImages.length;
            updateLightboxImage();
        }

        function resetZoom() {
            currentScale = 1;
            currentTranslateX = 0;
            currentTranslateY = 0;
            applyTransform();
        }

        function applyTransform() {
            lightboxImg.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${currentScale})`;
        }

        lightboxContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX - currentTranslateX;
                touchStartY = e.touches[0].clientY - currentTranslateY;
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTapTime;
                if (tapLength < 300 && tapLength > 0) {
                    if (currentScale === 1) {
                        currentScale = 2.5; 
                    } else {
                        currentScale = 1; 
                        currentTranslateX = 0;
                        currentTranslateY = 0;
                    }
                    applyTransform();
                    e.preventDefault();
                }
                lastTapTime = currentTime;
            }
        });

        lightboxContainer.addEventListener('touchmove', (e) => {
            if (currentScale > 1 && e.touches.length === 1) {
                currentTranslateX = e.touches[0].clientX - touchStartX;
                currentTranslateY = e.touches[0].clientY - touchStartY;
                applyTransform();
                e.preventDefault(); 
            }
        });

        lightboxContainer.addEventListener('touchend', (e) => {
            if (currentScale === 1 && e.changedTouches.length === 1) {
                let touchEndX = e.changedTouches[0].clientX;
                let diffX = touchEndX - touchStartX; 
                if (diffX < -50) {
                    nextImage(); 
                } else if (diffX > 50) {
                    prevImage(); 
                }
            }
        });

        function closeStampOptionsMenu() {
            document.getElementById('stampOptionsMenu').classList.remove('active');
        }

        function viewStampFullscreen() {
            closeStampOptionsMenu();
            if (!targetStampInfo || !targetStampInfo.stampUrl) return;

            lightboxImg.src = targetStampInfo.stampUrl; 
            currentAlbumImages = [targetStampInfo.stampUrl]; 
            resetZoom();
            
            document.querySelector('.lightbox-prev').style.display = 'none';
            document.querySelector('.lightbox-next').style.display = 'none';
            
            document.getElementById('lightboxOverlay').classList.add('active');
        }

        function triggerChangeStamp() {
            document.getElementById('updateStampFileInput').click();
        }

        document.getElementById('updateStampFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                closeStampOptionsMenu();
                showToast("⏳ Đang thiết kế Tem mới... Xin chờ!", 0); 
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        userCapturedImg = img;
                        currentStampColor = vintageColors[Math.floor(Math.random() * vintageColors.length)];
                        
                        drawNeonStamp(targetStampInfo.name, targetStampInfo.region, targetStampInfo.date);
                        const stampCanvasEl = document.getElementById('stampCanvas');
                        const newStampBase64 = stampCanvasEl.toDataURL('image/png');
                        
                        updateStampOnServer(targetStampInfo, newStampBase64);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        function updateStampOnServer(spotInfo, base64Data) {
            fetch(GAS_API_URL, {
                method: "POST",
                redirect: "follow",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    action: "updateStamp", 
                    placeName: spotInfo.name,
                    lat: spotInfo.lat,
                    lng: spotInfo.lng,
                    stampData: base64Data
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showToast("✅ Đã thiết kế Tem mới xong!", 3000);
                    
                    spotInfo.stampUrl = data.stampUrl;
                    const imgId = `stamp-img-${spotInfo.name.replace(/\s/g, '')}`;
                    const imgEl = document.getElementById(imgId);
                    if(imgEl) imgEl.src = data.stampUrl;
                    
                    fetch(`${GAS_API_URL}?action=get`, { redirect: "follow" })
                        .then(r => r.json())
                        .then(newData => {
                            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(newData));
                            if (isPhotoView) renderPhotoLayer();
                            if (newData.spots) preloadStampsIntoCache(newData.spots); 
                        });
                } else {
                    showToast("⚠️ Bị từ chối: " + data.error, 4000);
                }
            })
            .catch(err => {
                showToast("⚠️ Rớt mạng khi tạo Tem. Vui lòng thử lại.", 4000);
            });
        }

        // ==========================================
        // 5. CÁC HÀM HỆ THỐNG VÀ ĐỒNG BỘ CÓ FAILSAFE
        // ==========================================
        function showToast(msg, duration = 3000) {
            const toast = document.getElementById('syncToast');
            toast.innerHTML = msg;
            toast.style.opacity = '1';
            if (duration > 0) {
                setTimeout(() => { toast.style.opacity = '0'; }, duration);
            }
        }

        // ==========================================
        // TIMELINE CHUYỂN MÀN HÌNH TỐI ƯU CHO PWA (NATIVE SPLASH)
        // ==========================================
        const appStartTime = Date.now();
        const MIN_LOADING_DURATION = 1500; // Thời gian ép xem mèo chạy (1.5s)

        // Chuyển từ Loading mèo -> Bản đồ (Có xử lý hãm tốc khi có Cache)
        function hideLoadingScreen() {
            const timePassed = Date.now() - appStartTime;
            const delay = Math.max(0, MIN_LOADING_DURATION - timePassed);

            setTimeout(() => {
                const loader = document.getElementById('loadingOverlay');
                if (loader) {
                    loader.classList.add('fade-out');
                }
            }, delay);
        }

        function loadDataFromGoogleSheets() {
            const cachedDataStr = localStorage.getItem(LOCAL_STORAGE_KEY);
            let hasCache = false;

            if (cachedDataStr) {
                try {
                    const cachedData = JSON.parse(cachedDataStr);
                    renderDataToMap(cachedData);
                    hideLoadingScreen(); 
                    hasCache = true;
                    showToast('🔄 Đang kiểm tra dữ liệu mới ngầm...', 2000); 
                    if (cachedData.spots) preloadStampsIntoCache(cachedData.spots); 
                } catch(e) {
                    console.error("Lỗi đọc cache:", e);
                }
            }

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 12000); 

            fetch(`${GAS_API_URL}?action=get`, { redirect: "follow", signal: controller.signal })
                .then(res => {
                    clearTimeout(timeoutId);
                    if (!res.ok) throw new Error("Máy chủ Google phản hồi chậm");
                    return res.json();
                })
                .then(data => {
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(data));
                    renderDataToMap(data);
                    if (!hasCache) hideLoadingScreen(); 
                    showToast(`✅ Đã cập nhật mới nhất!`, 3000);
                    if (data.spots) preloadStampsIntoCache(data.spots); 
                })
                .catch(() => {
                    clearTimeout(timeoutId);
                    if (!hasCache) {
                        hideLoadingScreen();
                        showToast(`⚠️ Không có mạng. Vui lòng kiểm tra kết nối!`, 5000);
                    } else {
                        console.log("Đồng bộ ngầm thất bại. Tiếp tục dùng Cache mượt mà.");
                    }
                });
        }
