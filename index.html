<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="theme-color" content="#03050a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <title>Vietnam Neon Check-in Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Tắt nháy xanh khi nhấn trên điện thoại */
        }

        /* XÓA VỆT TRẮNG: Sử dụng 100dvh để tự động co giãn theo thanh công cụ của trình duyệt Mobile */
        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh; 
            background-color: #03050a;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }

        #map {
            width: 100%;
            height: 100%;
            height: 100dvh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: #03050a;
        }

        /* ẨN HOÀN TOÀN THANH BẢN QUYỀN GÓC DƯỚI BÊN PHẢI */
        .leaflet-control-attribution {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
        }

        /* Nút Vị trí GPS (Đã hạ xuống một chút để tránh dính Status Bar trên điện thoại) */
        .location-btn {
            position: absolute;
            top: max(20px, env(safe-area-inset-top)); 
            right: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(0, 243, 255, 0.2));
            color: #00f3ff;
            border: 1.5px solid #00f3ff;
            padding: 10px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4), inset 0 0 8px rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .location-btn:hover {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 25px #00f3ff;
            transform: scale(1.05);
        }

        /* NÚT CÀI ĐẶT ỨNG DỤNG NEON PWA */
        .install-btn {
            position: absolute;
            top: max(75px, calc(env(safe-area-inset-top) + 55px));
            right: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(255, 0, 127, 0.2));
            color: #ff007f;
            border: 1.5px solid #ff007f;
            padding: 10px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4), inset 0 0 8px rgba(255, 0, 127, 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: none; /* Hiện bằng JS khi đủ điều kiện */
            align-items: center;
            gap: 6px;
        }

        .install-btn:hover {
            background: #ff007f;
            color: #fff;
            box-shadow: 0 0 25px #ff007f;
            transform: scale(1.05);
        }

        /* Thanh thông báo đồng bộ dữ liệu Cyberpunk */
        #syncToast {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 20px;
            z-index: 1000;
            background: rgba(8, 12, 28, 0.9);
            border: 1px solid #00f3ff;
            color: #00f3ff;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            backdrop-filter: blur(5px);
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        /* Tùy chỉnh Nút Zoom phong cách Neon */
        .leaflet-control-zoom a {
            background-color: rgba(6, 10, 25, 0.85) !important;
            color: #00f3ff !important;
            border: 1px solid #00f3ff !important;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.4) !important;
            font-weight: bold;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .leaflet-control-zoom a:hover {
            background-color: #00f3ff !important;
            color: #000 !important;
            box-shadow: 0 0 20px #00f3ff !important;
        }

        /* --- HIỆU ỨNG MARKER KHU VỰC (CHẤM NEON + NHÃN TÊN) --- */
        .neon-marker-container {
            position: relative;
            width: 28px;
            height: 28px;
            display: flex;
            justify-content: center;
        }

        .neon-dot {
            width: 18px;
            height: 18px;
            background: #ff007f;
            border-radius: 50%;
            border: 2px solid #ffffff;
            position: absolute;
            top: 5px;
            box-shadow: 0 0 15px #ff007f, 0 0 25px #ff007f, 0 0 35px #ff007f;
            z-index: 2;
            cursor: pointer;
        }

        .neon-pulse {
            width: 28px;
            height: 28px;
            background: rgba(255, 0, 127, 0.7);
            border-radius: 50%;
            position: absolute;
            top: 0;
            animation: ripple 1.8s infinite ease-out;
            z-index: 1;
        }

        /* Nhãn tên khu vực nhỏ */
        .neon-label {
            position: absolute;
            top: -22px;
            color: #00f3ff;
            font-weight: 800;
            font-size: 0.8rem;
            text-shadow: 0 0 5px #00f3ff, 0 0 10px #000;
            white-space: nowrap;
            letter-spacing: 0.5px;
            pointer-events: none;
            background: rgba(5, 8, 20, 0.7);
            padding: 2px 6px;
            border-radius: 10px;
            border: 1px solid rgba(0, 243, 255, 0.4);
        }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        /* --- HIỆU ỨNG MARKER ĐIỂM NHỎ (LÁ CỜ ĐỎ NEON 🚩) --- */
        .red-flag-marker {
            font-size: 24px;
            filter: drop-shadow(0 0 8px #ff0000) drop-shadow(0 0 15px #ff0000);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .red-flag-marker:hover {
            transform: scale(1.3) translateY(-3px);
        }

        /* --- HIỆU ỨNG MARKER VỊ TRÍ CỦA TÔI (GPS CYAN) --- */
        .gps-dot {
            width: 16px; height: 16px;
            background: #00f3ff;
            border-radius: 50%;
            border: 2px solid #fff;
            position: absolute; top: 6px; left: 6px;
            box-shadow: 0 0 15px #00f3ff, 0 0 30px #00f3ff;
            z-index: 2;
        }
        .gps-pulse {
            width: 28px; height: 28px;
            background: rgba(0, 243, 255, 0.6);
            border-radius: 50%;
            position: absolute; top: 0; left: 0;
            animation: ripple 1.5s infinite ease-out;
            z-index: 1;
        }

        /* --- TÙY CHỈNH POPUP THÔNG TIN --- */
        .leaflet-popup-content-wrapper {
            background: rgba(8, 12, 28, 0.95) !important;
            color: #fff !important;
            border: 1px solid #00f3ff;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
            border-radius: 12px !important;
            backdrop-filter: blur(8px);
            padding: 5px;
        }

        .leaflet-popup-tip {
            background: rgba(8, 12, 28, 0.95) !important;
            border-bottom: 1px solid #00f3ff;
            border-right: 1px solid #00f3ff;
        }

        .popup-title {
            color: #00f3ff;
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 8px;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.6);
            border-bottom: 1px dashed rgba(0, 243, 255, 0.3);
            padding-bottom: 5px;
        }

        .popup-info { font-size: 0.9rem; line-height: 1.5; color: #d1d5db; }
        .popup-info b { color: #ff007f; }

        .btn-gps-checkin {
            margin-top: 8px;
            width: 100%;
            padding: 8px;
            background: linear-gradient(90deg, #ff007f, #ff00ff);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
            transition: all 0.2s;
        }
        .btn-gps-checkin:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.8);
        }

        /* --- CUSTOM MODAL CHECK-IN CHUYÊN NGHIỆP --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-box {
            background: linear-gradient(135deg, rgba(10, 16, 38, 0.95), rgba(5, 8, 20, 0.98));
            width: 90%; max-width: 400px; padding: 25px;
            border-radius: 16px; border: 2px solid #00f3ff;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.4), inset 0 0 15px rgba(0, 243, 255, 0.2);
            transform: translateY(-20px); transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-box { transform: translateY(0); }

        .modal-title {
            font-size: 1.3rem; font-weight: bold; color: #00f3ff;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 15px; text-align: center;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.6);
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: #a5b4fc; margin-bottom: 6px; font-weight: 600; }
        .form-control {
            width: 100%; background: rgba(0, 0, 0, 0.6);
            border: 1px solid #3b82f6; border-radius: 8px;
            padding: 10px 12px; color: #fff; font-size: 0.95rem; outline: none; transition: all 0.3s;
        }
        .form-control:focus { border-color: #ff007f; box-shadow: 0 0 10px rgba(255, 0, 127, 0.5); }

        .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; }
        .btn-cancel { background: transparent; color: #94a3b8; border: 1px solid #475569; }
        .btn-cancel:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .btn-submit { background: linear-gradient(90deg, #00f3ff, #0077ff); color: #000; box-shadow: 0 0 15px rgba(0, 243, 255, 0.5); }
        .btn-submit:hover { background: linear-gradient(90deg, #ff007f, #ff00ff); color: #fff; box-shadow: 0 0 20px rgba(255, 0, 127, 0.8); }

        .auto-region-badge {
            background: rgba(0, 243, 255, 0.08);
            border: 1px dashed rgba(0, 243, 255, 0.5);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #a5b4fc;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .auto-region-badge span {
            color: #00f3ff;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }

        /* Màn hình tải ban đầu */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #03050a;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        .loading-text {
            color: #00f3ff;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 15px #00f3ff;
            margin-top: 15px;
            letter-spacing: 1px;
        }
        .spinner {
            width: 45px; height: 45px;
            border: 4px solid rgba(0, 243, 255, 0.2);
            border-top: 4px solid #ff007f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px #ff007f;
        }
        /* ĐÃ SỬA LỖI TỪ KHÓA ĐỂ VÒNG XOAY HOẠT ĐỘNG */
        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">⏳ ĐANG TẢI DỮ LIỆU TỪ GOOGLE SHEETS...</div>
    </div>

    <div id="syncToast">🔄 Đang kết nối mạng lưới vệ tinh...</div>

    <button class="location-btn" onclick="goToMyLocation()">
        🎯 Vị Trí Của Tôi
    </button>

    <button id="pwaInstallBtn" class="install-btn">
        📲 Tải Ứng Dụng
    </button>

    <div id="map"></div>

    <div class="modal-overlay" id="checkinModal">
        <div class="modal-box">
            <div class="modal-title">📍 Thêm Điểm Check-in Nhỏ</div>
            
            <div class="auto-region-badge">
                🌐 Tỉnh/Thành: <span id="autoRegionText">⏳ Đang giải mã...</span>
            </div>

            <div class="form-group">
                <label for="placeName">Tên địa điểm chi tiết (Cờ đỏ 🚩)</label>
                <input type="text" id="placeName" class="form-control" placeholder="VD: Bến Nhà Rồng, Quán cà phê..." autocomplete="off">
            </div>
            <div class="form-group">
                <label for="placeNote">Ghi chú / Kỷ niệm</label>
                <input type="text" id="placeNote" class="form-control" placeholder="VD: Trải nghiệm cực kỳ chill..." autocomplete="off">
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Hủy</button>
                <button class="btn btn-submit" onclick="submitCheckIn()">Lưu Điểm</button>
            </div>
        </div>
    </div>

    <script>
        // ĐƯỜNG DẪN WEB API GOOGLE APPS SCRIPT CỦA BẠN
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxGDT5vFFH9wnVEab_QjvrqEfciZXJjNlXlL10ZTbrXkHHlLj-po0ZG88P8GpuvPheX/exec";

        // ĐĂNG KÝ SERVICE WORKER CHO PWA APP
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker đã kích hoạt!', reg))
                    .catch(err => console.error('Lỗi khởi chạy SW:', err));
            });
        }

        // BIẾN PROMPT QUẢN LÝ NÚT TẢI ỨNG DỤNG PWA
        let deferredPrompt;
        const installBtn = document.getElementById('pwaInstallBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.background = "linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(255, 0, 127, 0.2))";
            installBtn.style.display = 'flex';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`Kết quả cài đặt: ${outcome}`);
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });

        window.addEventListener('appinstalled', () => {
            console.log('Ứng dụng đã được cài đặt thành công!');
            installBtn.style.display = 'none';
        });

        // 1. Khởi tạo bản đồ (Tắt thanh bản quyền mặc định từ gốc)
        const map = L.map('map', {
            center: [16.047079, 108.206230],
            zoom: 6, minZoom: 5, maxZoom: 18, zoomControl: false,
            attributionControl: false
        });
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 2. Lớp bản đồ nền Dark Matter mượt mà
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', { 
            maxZoom: 20 
        }).addTo(map);

        // 3. Khởi tạo cấu trúc Icon
        function createRegionalIcon(regionName) {
            return L.divIcon({ 
                className: 'custom-div-icon', 
                html: `<div class="neon-marker-container"><div class="neon-label">${regionName}</div><div class="neon-pulse"></div><div class="neon-dot"></div></div>`, 
                iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -14] 
            });
        }
        
        const redFlagIcon = L.divIcon({ 
            className: 'custom-div-icon', 
            html: `<div class="red-flag-marker">🚩</div>`, 
            iconSize: [28, 28], iconAnchor: [5, 25], popupAnchor: [8, -25] 
        });
        
        const gpsIcon = L.divIcon({ 
            className: 'custom-div-icon', 
            html: `<div class="neon-marker-container"><div class="gps-pulse"></div><div class="gps-dot"></div></div>`, 
            iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -14] 
        });

        // 4. Lớp quản lý dữ liệu bản đồ
        const regionalLayer = L.layerGroup().addTo(map);
        const spotLayer = L.layerGroup();
        const activeRegionsTracker = new Set();

        function addRegionalMarker(name, lat, lng, desc) {
            const marker = L.marker([lat, lng], { icon: createRegionalIcon(name) }).addTo(regionalLayer);
            marker.bindPopup(`<div class="popup-title">📍 ${name}</div><p style="color:#d1d5db;">${desc}</p>`);
            marker.on('click', () => {
                map.flyTo([lat, lng], 11, { duration: 1.5 });
            });
            activeRegionsTracker.add(name.trim().toLowerCase());
        }

        function addSpotMarker(name, lat, lng, date, note) {
            const marker = L.marker([lat, lng], { icon: redFlagIcon }).addTo(spotLayer);
            const content = `
                <div class="popup-title">🚩 ${name}</div>
                <div class="popup-info">
                    <p><b>⏰ Thời gian:</b> ${date}</p>
                    <p><b>📝 Ghi chú:</b> ${note || 'Không có ghi chú'}</p>
                </div>
            `;
            marker.bindPopup(content);
            return marker;
        }

        // 5. Đồng bộ và tải dữ liệu từ Google Sheets
        function loadDataFromGoogleSheets() {
            // TỰ ĐỘNG GIẢI PHÓNG MÀN HÌNH SAU 4 GIÂY (SAFETY TIMEOUT) CHỐNG ĐỨNG HÌNH VĨNH VIỄN
            setTimeout(function() {
                const loader = document.getElementById('loadingOverlay');
                if (loader && loader.style.display !== 'none') {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                    console.log("Đã kích hoạt chế độ tải an toàn.");
                }
            }, 4000);

            if (GAS_API_URL === "" || GAS_API_URL.includes("ĐIỀN_URL")) {
                addRegionalMarker("Vĩnh Long", 10.2537, 105.9722, "Hệ thống đang chạy chế độ Local cấu hình.");
                return;
            }

            fetch(`${GAS_API_URL}?action=get`)
                .then(res => res.json())
                .then(data => {
                    regionalLayer.clearLayers();
                    spotLayer.clearLayers();
                    activeRegionsTracker.clear();

                    let regCount = 0, spotCount = 0;
                    if (data && data.regions) {
                        data.regions.forEach(function(reg) {
                            addRegionalMarker(reg.name, reg.lat, reg.lng, reg.desc);
                            regCount++;
                        });
                    }
                    if (data && data.spots) {
                        data.spots.forEach(function(spot) {
                            addSpotMarker(spot.name, spot.lat, spot.lng, spot.date, spot.note);
                            spotCount++;
                        });
                    }
                    
                    const toast = document.getElementById('syncToast');
                    toast.innerHTML = `✅ Đã đồng bộ: ${regCount} vùng & ${spotCount} điểm thành công!`;
                    setTimeout(() => { toast.style.opacity = '0'; }, 3000);
                    
                    const loader = document.getElementById('loadingOverlay');
                    if (loader) {
                        loader.style.opacity = '0'; 
                        setTimeout(() => loader.style.display = 'none', 500);
                    }
                    updateLayerVisibility();
                })
                .catch(err => {
                    console.error("Lỗi đồng bộ mạng:", err);
                });
        }

        // 6. Kiểm soát lớp ẩn hiện theo tầm thu phóng (Zoom Threshold = 9)
        const ZOOM_THRESHOLD = 9;
        function updateLayerVisibility() {
            const currentZoom = map.getZoom();
            if (currentZoom < ZOOM_THRESHOLD) {
                if (!map.hasLayer(regionalLayer)) map.addLayer(regionalLayer);
                if (map.hasLayer(spotLayer)) map.removeLayer(spotLayer);
            } else {
                if (map.hasLayer(regionalLayer)) map.removeLayer(regionalLayer);
                if (!map.hasLayer(spotLayer)) map.addLayer(spotLayer);
            }
        }
        map.on('zoomend', updateLayerVisibility);

        // 7. Định vị GPS liên tục thời gian thực
        let myLocationMarker = null, myCurrentLat = 0, myCurrentLng = 0;
        
        function goToMyLocation() {
            if (!navigator.geolocation) return alert("Trình duyệt không hỗ trợ chip GPS!");
            const btn = document.querySelector('.location-btn');
            const originTxt = btn.innerHTML; 
            btn.innerHTML = "⏳ Đang quét định vị...";
            
            navigator.geolocation.getCurrentPosition(
                position => {
                    myCurrentLat = position.coords.latitude.toFixed(4); 
                    myCurrentLng = position.coords.longitude.toFixed(4);
                    
                    if (myLocationMarker) map.removeLayer(myLocationMarker);
                    
                    myLocationMarker = L.marker([myCurrentLat, myCurrentLng], { icon: gpsIcon }).addTo(map);
                    myLocationMarker.bindPopup(`<div class="popup-title">🎯 Vị Trí Của Bạn</div><button class="btn-gps-checkin" onclick="checkInAtMyLocation()">🚩 Check-in Tại Đây!</button>`);
                    
                    map.flyTo([myCurrentLat, myCurrentLng], 14, { duration: 1.5 });
                    setTimeout(() => myLocationMarker.openPopup(), 1600);
                    btn.innerHTML = originTxt;
                },
                err => { 
                    alert("Không thể nhận tín hiệu GPS! Vui lòng bật vị trí."); 
                    btn.innerHTML = originTxt; 
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function checkInAtMyLocation() { 
            currentClickLat = myCurrentLat; 
            currentClickLng = myCurrentLng; 
            if (myLocationMarker) myLocationMarker.closePopup(); 
            openCheckInModal(); 
        }

        // 8. Tương tác đóng mở Modal Nhập dữ liệu
        let currentClickLat = 0, currentClickLng = 0, currentDetectedRegion = "Việt Nam";
        const modal = document.getElementById('checkinModal');
        const autoRegionText = document.getElementById('autoRegionText');
        const placeNameInput = document.getElementById('placeName');
        const placeNoteInput = document.getElementById('placeNote');

        function openCheckInModal() {
            placeNameInput.value = ''; 
            placeNoteInput.value = ''; 
            modal.classList.add('active'); 
            setTimeout(() => placeNameInput.focus(), 100);
            
            autoRegionText.innerHTML = '<span style="color:#00f3ff;">⏳ Đang định vị vệ tinh Google...</span>'; 
            currentDetectedRegion = "Việt Nam";
            
            if (GAS_API_URL !== "" && !GAS_API_URL.includes("ĐIỀN_URL")) {
                fetch(`${GAS_API_URL}?action=getProvince&lat=${currentClickLat}&lng=${currentClickLng}`)
                    .then(res => res.json())
                    .then(data => { 
                        currentDetectedRegion = data.province; 
                        autoRegionText.innerHTML = `📍 ${data.province}`; 
                    })
                    .catch(() => { 
                        autoRegionText.innerHTML = `📍 Khu vực mới`; 
                    });
            }
        }

        // 9. Thuật toán click thông minh: Bản đồ lớn thì zoom nhẹ, bản đồ nhỏ thì bật Check-in
        map.on('click', e => {
            if (map.getZoom() < ZOOM_THRESHOLD) {
                return map.flyTo(e.latlng, Math.max(map.getZoom() + 3, 10), { duration: 1.2 });
            }
            currentClickLat = e.latlng.lat.toFixed(4); 
            currentClickLng = e.latlng.lng.toFixed(4); 
            openCheckInModal();
        });

        function closeModal() { modal.classList.remove('active'); }

        // 10. Xử lý gửi dữ liệu lên Google Sheets
        function submitCheckIn() {
            const name = placeNameInput.value.trim();
            const note = placeNoteInput.value.trim();
            if (!name) return alert("Vui lòng điền tên địa điểm!");
            
            const btnSubmit = document.querySelector('.btn-submit');
            const oldText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = "⏳ Đang ghi vào Sheets..."; 
            btnSubmit.disabled = true;

            const regionName = currentDetectedRegion;
            const regionKey = regionName.trim().toLowerCase();
            
            // Vẽ giao diện ngay lập tức trước khi nhận phản hồi từ mạng (Optimistic UI)
            if (!activeRegionsTracker.has(regionKey)) {
                addRegionalMarker(regionName, currentClickLat, currentClickLng, `Khu vực tạo tự động! 🏙️`);
            }
            
            const t = new Date();
            const todayStr = t.getDate().toString().padStart(2, '0') + '/' + (t.getMonth()+1).toString().padStart(2, '0') + '/' + t.getFullYear();
            const newMarker = addSpotMarker(name, currentClickLat, currentClickLng, todayStr, note);
            
            closeModal(); 
            updateLayerVisibility(); 
            newMarker.openPopup();

            if (GAS_API_URL !== "" && !GAS_API_URL.includes("ĐIỀN_URL")) {
                fetch(`${GAS_API_URL}?action=save&regionName=${encodeURIComponent(regionName)}&placeName=${encodeURIComponent(name)}&lat=${currentClickLat}&lng=${currentClickLng}&date=${encodeURIComponent(todayStr)}&note=${encodeURIComponent(note)}`)
                    .then(res => res.json())
                    .then(() => {
                        btnSubmit.innerHTML = oldText; 
                        btnSubmit.disabled = false;
                        const toast = document.getElementById('syncToast'); 
                        toast.style.opacity = '1'; 
                        toast.innerHTML = `⚡ Đã lưu "${name}" thành công!`; 
                        setTimeout(() => toast.style.opacity = '0', 3000);
                    })
                    .catch(err => { 
                        alert("Lỗi ghi nhận dữ liệu: " + err); 
                        btnSubmit.innerHTML = oldText; 
                        btnSubmit.disabled = false; 
                    });
            } else { 
                btnSubmit.innerHTML = oldText; 
                btnSubmit.disabled = false; 
            }
        }

        // Sự kiện phím bấm tắt nhanh cho Modal
        document.addEventListener('keydown', e => { 
            if (!modal.classList.contains('active')) return; 
            if (e.key === 'Enter') submitCheckIn(); 
            if (e.key === 'Escape') closeModal(); 
        });
        
        // 11. Khắc phục triệt để lỗi tính toán kích thước ô lưới iframe của GAS
        function forceMapRender() { 
            map.invalidateSize(); 
            updateLayerVisibility(); 
        }
        setTimeout(forceMapRender, 100); 
        setTimeout(forceMapRender, 500);
        setTimeout(forceMapRender, 1500);
        
        window.addEventListener('load', () => { 
            forceMapRender(); 
            loadDataFromGoogleSheets(); 
        });
    </script>
</body>
</html>
