<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="theme-color" content="#03050a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <title>Vietnam Neon Check-in Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh; 
            background-color: #03050a;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }

        #map {
            width: 100%;
            height: 100%;
            height: 100dvh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: #03050a;
        }

        .leaflet-control-attribution {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
        }

        /* --- NÚT VỊ TRÍ GPS (GÓC DƯỚI PHẢI) --- */
        .location-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom)); 
            right: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(0, 243, 255, 0.2));
            color: #00f3ff;
            border: 1.5px solid #00f3ff;
            padding: 12px 18px; 
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4), inset 0 0 8px rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .location-btn:hover {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 25px #00f3ff;
            transform: scale(1.05);
        }

        /* --- TÍNH NĂNG MỚI: NÚT PHOTO (GÓC DƯỚI TRÁI TẠO SỰ ĐỐI XỨNG) --- */
        .photo-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom)); 
            left: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(189, 0, 255, 0.2));
            color: #bd00ff; /* Tông màu tím/hồng neon để phân biệt với xanh GPS */
            border: 1.5px solid #bd00ff;
            padding: 12px 18px; 
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(189, 0, 255, 0.4), inset 0 0 8px rgba(189, 0, 255, 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .photo-btn:hover, .photo-btn.active {
            background: #bd00ff;
            color: #fff;
            box-shadow: 0 0 25px #bd00ff;
            transform: scale(1.05);
        }

        /* Nút Cài đặt ứng dụng PWA (Góc trên phải) */
        .install-btn {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(255, 0, 127, 0.2));
            color: #ff007f;
            border: 1.5px solid #ff007f;
            padding: 10px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4), inset 0 0 8px rgba(255, 0, 127, 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: none; 
            align-items: center;
            gap: 6px;
        }

        .install-btn:hover {
            background: #ff007f;
            color: #fff;
            box-shadow: 0 0 25px #ff007f;
            transform: scale(1.05);
        }

        /* Thanh thông báo đồng bộ dữ liệu Cyberpunk */
        #syncToast {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 20px;
            z-index: 1000;
            background: rgba(8, 12, 28, 0.9);
            border: 1px solid #00f3ff;
            color: #00f3ff;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            backdrop-filter: blur(5px);
            transition: opacity 0.5s ease;
            opacity: 0; 
            pointer-events: none;
        }

        /* --- HIỆU ỨNG MARKER KHU VỰC LỚN --- */
        .neon-marker-container {
            position: relative;
            width: 28px;
            height: 28px;
            display: flex;
            justify-content: center;
        }
        .neon-dot {
            width: 18px;
            height: 18px;
            background: #ff007f;
            border-radius: 50%;
            border: 2px solid #ffffff;
            position: absolute;
            top: 5px;
            box-shadow: 0 0 15px #ff007f, 0 0 25px #ff007f, 0 0 35px #ff007f;
            z-index: 2;
            cursor: pointer;
        }
        .neon-pulse {
            width: 28px;
            height: 28px;
            background: rgba(255, 0, 127, 0.7);
            border-radius: 50%;
            position: absolute;
            top: 0;
            animation: ripple 1.8s infinite ease-out;
            z-index: 1;
        }
        .neon-label {
            position: absolute;
            top: -22px;
            color: #00f3ff;
            font-weight: 800;
            font-size: 0.8rem;
            text-shadow: 0 0 5px #00f3ff, 0 0 10px #000;
            white-space: nowrap;
            letter-spacing: 0.5px;
            pointer-events: none;
            background: rgba(5, 8, 20, 0.7);
            padding: 2px 6px;
            border-radius: 10px;
            border: 1px solid rgba(0, 243, 255, 0.4);
        }
        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        /* --- HIỆU ỨNG MARKER ĐIỂM NHỎ (CỜ ĐỎ) --- */
        .red-flag-marker {
            font-size: 24px;
            filter: drop-shadow(0 0 8px #ff0000) drop-shadow(0 0 15px #ff0000);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .red-flag-marker:hover {
            transform: scale(1.3) translateY(-3px);
        }

        /* --- UI ALBUM ẢNH (GIỐNG IPHONE) DÀNH CHO TÍNH NĂNG PHOTO --- */
        .photo-album-marker {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6), 0 0 15px rgba(189, 0, 255, 0.5);
            /* Gradient tạm thời (sau này bạn truyền url ảnh thật vào thuộc tính background-image) */
            background: linear-gradient(45deg, #101026, #2a2a72);
            background-size: cover;
            background-position: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .photo-album-marker:hover {
            transform: scale(1.15);
            z-index: 2000 !important;
        }
        .photo-album-badge {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 6px;
            backdrop-filter: blur(3px);
        }

        /* --- HIỆU ỨNG VỊ TRÍ GPS --- */
        .gps-dot {
            width: 16px; height: 16px;
            background: #00f3ff;
            border-radius: 50%;
            border: 2px solid #fff;
            position: absolute; top: 6px; left: 6px;
            box-shadow: 0 0 15px #00f3ff, 0 0 30px #00f3ff;
            z-index: 2;
        }
        .gps-pulse {
            width: 28px; height: 28px;
            background: rgba(0, 243, 255, 0.6);
            border-radius: 50%;
            position: absolute; top: 0; left: 0;
            animation: ripple 1.5s infinite ease-out;
            z-index: 1;
        }

        /* --- TÙY CHỈNH POPUP --- */
        .leaflet-popup-content-wrapper { background: rgba(8, 12, 28, 0.95) !important; color: #fff !important; border: 1px solid #00f3ff; box-shadow: 0 0 20px rgba(0, 243, 255, 0.5); border-radius: 12px !important; backdrop-filter: blur(8px); padding: 5px; }
        .leaflet-popup-tip { background: rgba(8, 12, 28, 0.95) !important; border-bottom: 1px solid #00f3ff; border-right: 1px solid #00f3ff; }
        .popup-title { color: #00f3ff; font-weight: 700; font-size: 1.15rem; margin-bottom: 8px; text-shadow: 0 0 8px rgba(0, 243, 255, 0.6); border-bottom: 1px dashed rgba(0, 243, 255, 0.3); padding-bottom: 5px; }
        .popup-info { font-size: 0.9rem; line-height: 1.5; color: #d1d5db; }
        .popup-info b { color: #ff007f; }

        .btn-gps-checkin { margin-top: 8px; width: 100%; padding: 8px; background: linear-gradient(90deg, #ff007f, #ff00ff); color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px rgba(255, 0, 127, 0.5); transition: all 0.2s; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(5px); z-index: 9999; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: linear-gradient(135deg, rgba(10, 16, 38, 0.95), rgba(5, 8, 20, 0.98)); width: 90%; max-width: 400px; padding: 25px; border-radius: 16px; border: 2px solid #00f3ff; box-shadow: 0 0 25px rgba(0, 243, 255, 0.4), inset 0 0 15px rgba(0, 243, 255, 0.2); transform: translateY(-20px); transition: transform 0.3s ease; }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .modal-title { font-size: 1.3rem; font-weight: bold; color: #00f3ff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; text-align: center; text-shadow: 0 0 10px rgba(0, 243, 255, 0.6); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: #a5b4fc; margin-bottom: 6px; font-weight: 600; }
        .form-control { width: 100%; background: rgba(0, 0, 0, 0.6); border: 1px solid #3b82f6; border-radius: 8px; padding: 10px 12px; color: #fff; font-size: 0.95rem; outline: none; transition: all 0.3s; }
        .form-control:focus { border-color: #ff007f; box-shadow: 0 0 10px rgba(255, 0, 127, 0.5); }
        .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; }
        .btn-cancel { background: transparent; color: #94a3b8; border: 1px solid #475569; }
        .btn-submit { background: linear-gradient(90deg, #00f3ff, #0077ff); color: #000; box-shadow: 0 0 15px rgba(0, 243, 255, 0.5); }
        
        .auto-region-badge { background: rgba(0, 243, 255, 0.08); border: 1px dashed rgba(0, 243, 255, 0.5); padding: 10px 12px; border-radius: 8px; font-size: 0.85rem; color: #a5b4fc; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .auto-region-badge span { color: #00f3ff; font-weight: bold; text-shadow: 0 0 5px rgba(0, 243, 255, 0.5); }

        /* Màn hình tải ban đầu */
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #03050a; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.4s ease; }
        .loading-text { color: #00f3ff; font-size: 1.2rem; font-weight: bold; text-shadow: 0 0 15px #00f3ff; margin-top: 15px; letter-spacing: 1px; }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(0, 243, 255, 0.2); border-top: 4px solid #ff007f; border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 15px #ff007f; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">⏳ ĐANG TRUY XUẤT DỮ LIỆU...</div>
    </div>

    <div id="syncToast">🔄 Đang đồng bộ dữ liệu ngầm...</div>

    <button id="pwaInstallBtn" class="install-btn">
        📲 Tải Ứng Dụng
    </button>

    <div id="map"></div>

    <button id="togglePhotoBtn" class="photo-btn" onclick="togglePhotoView()">
        📸 Ảnh
    </button>

    <button class="location-btn" onclick="goToMyLocation()">
        🎯 Vị Trí Của Tôi
    </button>

    <div class="modal-overlay" id="checkinModal">
        <div class="modal-box">
            <div class="modal-title">📍 Thêm Điểm Check-in Nhỏ</div>
            
            <div class="auto-region-badge">
                🌐 Tỉnh/Thành: <span id="autoRegionText">⏳ Đang quét tọa độ...</span>
            </div>

            <div class="form-group">
                <label for="placeName">Tên địa điểm chi tiết (Cờ đỏ 🚩)</label>
                <input type="text" id="placeName" class="form-control" placeholder="VD: Bến Nhà Rồng, Quán cà phê..." autocomplete="off">
            </div>
            <div class="form-group">
                <label for="placeNote">Ghi chú / Kỷ niệm</label>
                <input type="text" id="placeNote" class="form-control" placeholder="VD: Trải nghiệm cực kỳ chill..." autocomplete="off">
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Hủy</button>
                <button class="btn btn-submit" onclick="submitCheckIn()">Lưu Điểm</button>
            </div>
        </div>
    </div>

    <script>
        // 🔴 ĐƯỜNG DẪN WEB API GOOGLE APPS SCRIPT CỦA BẠN
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxGDT5vFFH9wnVEab_QjvrqEfciZXJjNlXlL10ZTbrXkHHlLj-po0ZG88P8GpuvPheX/exec";
        const LOCAL_STORAGE_KEY = 'neonMapDataCache';

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error('Lỗi SW:', err));
            });
        }

        let deferredPrompt;
        const installBtn = document.getElementById('pwaInstallBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'flex';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });

        window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });

        const map = L.map('map', {
            center: [16.047079, 108.206230],
            zoom: 6, minZoom: 5, maxZoom: 18, 
            zoomControl: false, 
            attributionControl: false 
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', { maxZoom: 20 }).addTo(map);

        function createRegionalIcon(regionName) {
            return L.divIcon({ className: 'custom-div-icon', html: `<div class="neon-marker-container"><div class="neon-label">${regionName}</div><div class="neon-pulse"></div><div class="neon-dot"></div></div>`, iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -14] });
        }
        
        const redFlagIcon = L.divIcon({ className: 'custom-div-icon', html: `<div class="red-flag-marker">🚩</div>`, iconSize: [28, 28], iconAnchor: [5, 25], popupAnchor: [8, -25] });
        const gpsIcon = L.divIcon({ className: 'custom-div-icon', html: `<div class="neon-marker-container"><div class="gps-pulse"></div><div class="gps-dot"></div></div>`, iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -14] });

        const VN_PROVINCES = [
            { name: "TP. Hồ Chí Minh", lat: 10.7769, lng: 106.7009 }, { name: "Hà Nội", lat: 21.0285, lng: 105.8542 }, { name: "Đà Nẵng", lat: 16.0608, lng: 108.2230 },
            { name: "Phú Quốc", lat: 10.2289, lng: 103.9572 }, { name: "Vĩnh Long", lat: 10.2537, lng: 105.9722 }, { name: "Cần Thơ", lat: 10.0452, lng: 105.7469 },
            { name: "Hải Phòng", lat: 20.8449, lng: 106.6881 }, { name: "Đà Lạt", lat: 11.9404, lng: 108.4583 }, { name: "Nha Trang", lat: 12.2388, lng: 109.1967 },
            { name: "Huế", lat: 16.4637, lng: 107.5909 }, { name: "Vũng Tàu", lat: 10.3460, lng: 107.0843 }, { name: "Quảng Ninh", lat: 20.9599, lng: 107.0432 },
            { name: "Bình Thuận", lat: 11.0912, lng: 108.0834 }, { name: "Quy Nhơn", lat: 13.7830, lng: 109.2197 }, { name: "Hội An", lat: 15.8801, lng: 108.3380 },
            { name: "An Giang", lat: 10.5216, lng: 105.1259 }, { name: "Kiên Giang", lat: 9.9574, lng: 105.1259 }, { name: "Đồng Nai", lat: 10.9574, lng: 107.0681 },
            { name: "Bình Dương", lat: 11.1667, lng: 106.6667 }, { name: "Tây Ninh", lat: 11.3667, lng: 106.1167 }, { name: "Tiền Giang", lat: 10.4333, lng: 106.2500 },
            { name: "Đồng Tháp", lat: 10.5333, lng: 105.6833 }, { name: "Bến Tre", lat: 10.2333, lng: 106.3833 }, { name: "Trà Vinh", lat: 9.8167, lng: 106.3000 },
            { name: "Sóc Trăng", lat: 9.6000, lng: 105.9667 }, { name: "Bạc Liêu", lat: 9.2833, lng: 105.7167 }, { name: "Cà Mau", lat: 9.1833, lng: 105.1500 },
            { name: "Lào Cai", lat: 22.4833, lng: 103.9500 }, { name: "Sa Pa", lat: 22.3364, lng: 103.8438 }, { name: "Thanh Hóa", lat: 19.8067, lng: 105.7714 },
            { name: "Nghệ An", lat: 19.8067, lng: 105.7714 }, { name: "Hà Tĩnh", lat: 18.6796, lng: 105.6813 }, { name: "Quảng Bình", lat: 18.4136, lng: 106.0125 },
            { name: "Quảng Trị", lat: 17.4833, lng: 106.6000 }, { name: "Quảng Nam", lat: 15.5678, lng: 108.0000 }, { name: "Quảng Ngãi", lat: 15.1205, lng: 108.7923 },
            { name: "Bình Định", lat: 14.1667, lng: 108.9000 }, { name: "Phú Yên", lat: 14.0500, lng: 109.0167 }, { name: "Ninh Thuận", lat: 11.0833, lng: 108.9333 },
            { name: "Kon Tum", lat: 14.3500, lng: 108.0000 }, { name: "Gia Lai", lat: 13.9833, lng: 108.0000 }, { name: "Đắk Lắk", lat: 13.7667, lng: 108.0000 },
            { name: "Đắk Nông", lat: 12.0000, lng: 108.0000 }, { name: "Lâm Đồng", lat: 11.9500, lng: 108.4333 }, { name: "Bình Phước", lat: 12.0000, lng: 106.7500 },
            { name: "Long An", lat: 10.6667, lng: 106.1667 }, { name: "Thái Nguyên", lat: 21.6000, lng: 105.8333 }, { name: "Bắc Giang", lat: 21.2667, lng: 106.2000 },
            { name: "Bắc Ninh", lat: 21.1833, lng: 106.0667 }, { name: "Hưng Yên", lat: 21.1167, lng: 106.0500 }, { name: "Hải Dương", lat: 20.9333, lng: 106.3167 },
            { name: "Thái Bình", lat: 20.4500, lng: 106.3333 }, { name: "Nam Định", lat: 20.9333, lng: 106.3167 }, { name: "Ninh Bình", lat: 20.2500, lng: 105.9667 }
        ];

        // KHỞI TẠO CÁC LỚP BẢN ĐỒ
        const regionalLayer = L.layerGroup().addTo(map);
        const spotLayer = L.layerGroup();
        const photoLayer = L.layerGroup(); // LỚP DÀNH RIÊNG CHO TÍNH NĂNG ẢNH
        
        const activeRegionsTracker = new Set();
        let globalSpotsData = []; // Biến lưu trữ toàn bộ điểm để vẽ giao diện Ảnh
        let isPhotoView = false; // Cờ kiểm soát trạng thái Đang xem ảnh hay Xem Map

        function addRegionalMarker(name, lat, lng, desc) {
            const regionKey = name.trim().toLowerCase();
            if (activeRegionsTracker.has(regionKey)) return;

            let finalLat = lat, finalLng = lng;
            const standardProv = VN_PROVINCES.find(p => p.name.toLowerCase() === regionKey);
            if (standardProv) { finalLat = standardProv.lat; finalLng = standardProv.lng; }

            const marker = L.marker([finalLat, finalLng], { icon: createRegionalIcon(name) }).addTo(regionalLayer);
            marker.bindPopup(`<div class="popup-title">📍 ${name}</div><p style="color:#d1d5db;">${desc}</p>`);
            marker.on('click', () => map.flyTo([finalLat, finalLng], 11, { duration: 1.5 }));
            activeRegionsTracker.add(regionKey);
        }

        function addSpotMarker(name, lat, lng, date, note) {
            const marker = L.marker([lat, lng], { icon: redFlagIcon }).addTo(spotLayer);
            marker.bindPopup(`<div class="popup-title">🚩 ${name}</div><div class="popup-info"><p><b>⏰ Thời gian:</b> ${date}</p><p><b>📝 Ghi chú:</b> ${note || 'Không có'}</p></div>`);
            return marker;
        }

        function renderDataToMap(data) {
            regionalLayer.clearLayers();
            spotLayer.clearLayers();
            activeRegionsTracker.clear(); 
            globalSpotsData = []; 

            let spotCount = 0;
            if (data && data.regions) {
                data.regions.forEach(reg => addRegionalMarker(reg.name, reg.lat, reg.lng, reg.desc));
            }
            if (data && data.spots) {
                globalSpotsData = data.spots; // Lưu lại để dùng cho chế độ Ảnh
                data.spots.forEach(spot => {
                    addSpotMarker(spot.name, spot.lat, spot.lng, spot.date, spot.note);
                    spotCount++;
                });
            }
            
            // Nếu đang ở chế độ ảnh, gọi hàm vẽ lại ảnh để tránh đè layer
            if (isPhotoView) renderPhotoLayer();
            else updateLayerVisibility();

            return { regCount: activeRegionsTracker.size, spotCount };
        }

        // --- TÍNH NĂNG MỚI: CHUYỂN ĐỔI CHẾ ĐỘ MAP <-> PHOTO ALBUM ---
        function togglePhotoView() {
            isPhotoView = !isPhotoView;
            const btn = document.getElementById('togglePhotoBtn');

            if (isPhotoView) {
                btn.classList.add('active');
                btn.innerHTML = '🔙 Tắt Ảnh';

                // Ẩn sạch các cờ đỏ và chấm neon
                if (map.hasLayer(regionalLayer)) map.removeLayer(regionalLayer);
                if (map.hasLayer(spotLayer)) map.removeLayer(spotLayer);

                renderPhotoLayer(); // Vẽ các khung album lên
                map.addLayer(photoLayer);
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '📸 Ảnh';

                // Ẩn lớp ảnh đi
                if (map.hasLayer(photoLayer)) map.removeLayer(photoLayer);

                // Khôi phục bản đồ Check-in thường tùy theo mức Zoom hiện tại
                updateLayerVisibility();
            }
        }

        function renderPhotoLayer() {
            photoLayer.clearLayers();
            
            globalSpotsData.forEach(spot => {
                // Tạm thời hiển thị số ngẫu nhiên (1-200) làm số lượng ảnh trong Album, và gradient nền
                const mockPhotoCount = Math.floor(Math.random() * 200) + 1;
                
                const photoIcon = L.divIcon({
                    className: 'custom-photo-icon',
                    html: `
                        <div class="photo-album-marker">
                            <div class="photo-album-badge">${mockPhotoCount}</div>
                        </div>
                    `,
                    iconSize: [65, 65],
                    iconAnchor: [32, 32]
                });

                const marker = L.marker([spot.lat, spot.lng], { icon: photoIcon }).addTo(photoLayer);
                
                marker.on('click', () => {
                    // Tạm thời báo khung Alert chờ hướng dẫn lấy dữ liệu từ bạn
                    alert(`Đang mở Album của [${spot.name}]\nBạn sẽ hướng dẫn tôi cách liên kết ảnh sau nhé!`);
                });
            });
        }

        function hideLoadingScreen() {
            const loader = document.getElementById('loadingOverlay');
            if (loader && loader.style.display !== 'none') {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 400);
            }
        }

        function showToast(msg, duration = 3000) {
            const toast = document.getElementById('syncToast');
            toast.innerHTML = msg;
            toast.style.opacity = '1';
            if (duration > 0) setTimeout(() => toast.style.opacity = '0', duration);
        }

        function loadDataFromGoogleSheets() {
            const cachedDataStr = localStorage.getItem(LOCAL_STORAGE_KEY);
            let hasCache = false;

            if (cachedDataStr) {
                try {
                    const cachedData = JSON.parse(cachedDataStr);
                    renderDataToMap(cachedData);
                    hideLoadingScreen(); 
                    hasCache = true;
                    showToast('🔄 Đang đồng bộ dữ liệu ngầm...', 0); 
                } catch(e) {}
            }

            setTimeout(hideLoadingScreen, 4000);

            fetch(`${GAS_API_URL}?action=get`, { redirect: "follow" })
                .then(res => {
                    if (!res.ok) throw new Error("Mạng lỗi");
                    return res.json();
                })
                .then(data => {
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(data));
                    const counts = renderDataToMap(data);
                    if (!hasCache) hideLoadingScreen(); 
                    showToast(`✅ Đã đồng bộ: ${counts.regCount} vùng & ${counts.spotCount} điểm`);
                })
                .catch(err => {
                    if (!hasCache) hideLoadingScreen();
                    showToast(`⚠️ Lỗi kết nối. Đang xem dữ liệu offline.`);
                });
        }

        const ZOOM_THRESHOLD = 9;
        function updateLayerVisibility() {
            if (isPhotoView) return; // Không can thiệp nếu đang ở chế độ xem Ảnh

            const currentZoom = map.getZoom();
            if (currentZoom < ZOOM_THRESHOLD) {
                if (!map.hasLayer(regionalLayer)) map.addLayer(regionalLayer);
                if (map.hasLayer(spotLayer)) map.removeLayer(spotLayer);
            } else {
                if (map.hasLayer(regionalLayer)) map.removeLayer(regionalLayer);
                if (!map.hasLayer(spotLayer)) map.addLayer(spotLayer);
            }
        }
        map.on('zoomend', updateLayerVisibility);

        let myLocationMarker = null, myCurrentLat = 0, myCurrentLng = 0;
        
        function goToMyLocation() {
            if (!navigator.geolocation) return alert("Trình duyệt không hỗ trợ GPS!");
            const btn = document.querySelector('.location-btn');
            const originTxt = btn.innerHTML; 
            btn.innerHTML = "📡 Đang quét...";
            btn.style.opacity = "0.7";
            
            const options = { enableHighAccuracy: true, timeout: 5000, maximumAge: 10000 };

            navigator.geolocation.getCurrentPosition(
                position => {
                    myCurrentLat = position.coords.latitude.toFixed(4); 
                    myCurrentLng = position.coords.longitude.toFixed(4);
                    
                    if (myLocationMarker) map.removeLayer(myLocationMarker);
                    
                    myLocationMarker = L.marker([myCurrentLat, myCurrentLng], { icon: gpsIcon }).addTo(map);
                    
                    // CHỈ CÓ NÚT VỊ TRÍ NÀY MỚI KÍCH HOẠT CHECK-IN ĐƯỢC
                    myLocationMarker.bindPopup(`<div class="popup-title">🎯 Vị Trí Của Bạn</div><button class="btn-gps-checkin" onclick="checkInAtMyLocation()">🚩 Check-in Tại Đây!</button>`);
                    
                    map.flyTo([myCurrentLat, myCurrentLng], 15, { duration: 1 });
                    setTimeout(() => myLocationMarker.openPopup(), 500);
                    btn.innerHTML = originTxt;
                    btn.style.opacity = "1";
                },
                err => { 
                    alert("Không thể nhận tín hiệu GPS! Vui lòng bật vị trí."); 
                    btn.innerHTML = originTxt;
                    btn.style.opacity = "1";
                }, options
            );
        }

        function checkInAtMyLocation() { 
            currentClickLat = myCurrentLat; 
            currentClickLng = myCurrentLng; 
            if (myLocationMarker) myLocationMarker.closePopup(); 
            openCheckInModal(); 
        }

        function findNearestProvinceOffline(lat, lng) {
            let minDistance = Infinity; let nearestName = "Khu vực Việt Nam";
            VN_PROVINCES.forEach(prov => {
                const dLat = lat - prov.lat, dLng = lng - prov.lng;
                const distance = Math.sqrt(dLat * dLat + dLng * dLng);
                if (distance < minDistance) { minDistance = distance; nearestName = prov.name; }
            });
            return nearestName;
        }

        let currentClickLat = 0, currentClickLng = 0, currentDetectedRegion = "Việt Nam";
        const modal = document.getElementById('checkinModal'), autoRegionText = document.getElementById('autoRegionText'), placeNameInput = document.getElementById('placeName'), placeNoteInput = document.getElementById('placeNote');

        function openCheckInModal() {
            placeNameInput.value = ''; placeNoteInput.value = ''; modal.classList.add('active'); 
            setTimeout(() => placeNameInput.focus(), 100);
            
            autoRegionText.innerHTML = '<span style="color:#00f3ff;">⏳ Đang quét tọa độ...</span>'; 
            currentDetectedRegion = "Việt Nam";
            
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentClickLat}&lon=${currentClickLng}&zoom=10&addressdetails=1`, { headers: { 'Accept-Language': 'vi' } })
            .then(res => res.json())
            .then(data => {
                if (data && data.address) {
                    let p = data.address.city || data.address.province || data.address.state || null;
                    if (p) { currentDetectedRegion = p.replace('Thành phố ', 'TP. ').replace('Tỉnh ', ''); autoRegionText.innerHTML = `📍 ${currentDetectedRegion}`; return; }
                }
                throw new Error("No data");
            })
            .catch(() => {
                if (GAS_API_URL !== "" && !GAS_API_URL.includes("ĐIỀN_URL")) {
                    fetch(`${GAS_API_URL}?action=getProvince&lat=${currentClickLat}&lng=${currentClickLng}`, { redirect: "follow" })
                        .then(res => res.json()).then(data => { 
                            if (data.province && data.province !== "Khu vực mới") { currentDetectedRegion = data.province; autoRegionText.innerHTML = `📍 ${currentDetectedRegion}`; } else throw new Error("Empty");
                        })
                        .catch(() => { currentDetectedRegion = findNearestProvinceOffline(currentClickLat, currentClickLng); autoRegionText.innerHTML = `📍 ${currentDetectedRegion} (Offline)`; });
                } else {
                    currentDetectedRegion = findNearestProvinceOffline(currentClickLat, currentClickLng); autoRegionText.innerHTML = `📍 ${currentDetectedRegion} (Offline)`;
                }
            });
        }

        // TÍNH NĂNG CHẠM LÊN BẢN ĐỒ CHỈ ĐỂ ZOOM, KHÔNG MỞ CHECK-IN (CHỐNG CHẠM NHẦM)
        map.on('click', e => {
            // Dù ở mức zoom nào, nếu người dùng bấm lên khoảng trống bản đồ thì chỉ trượt camera đến đó (không hiện bảng check-in)
            map.flyTo(e.latlng, Math.max(map.getZoom() + 2, 10), { duration: 1.2 });
        });

        function closeModal() { modal.classList.remove('active'); }

        function submitCheckIn() {
            const name = placeNameInput.value.trim(), note = placeNoteInput.value.trim();
            if (!name) return alert("Vui lòng điền tên địa điểm!");
            
            const btnSubmit = document.querySelector('.btn-submit');
            const oldText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = "⏳ Đang ghi vào Sheets..."; 
            btnSubmit.disabled = true;

            const regionName = currentDetectedRegion;
            
            addRegionalMarker(regionName, currentClickLat, currentClickLng, `Khu vực tạo tự động! 🏙️`);
            
            const t = new Date();
            const todayStr = t.getDate().toString().padStart(2, '0') + '/' + (t.getMonth()+1).toString().padStart(2, '0') + '/' + t.getFullYear();
            
            // Lưu vào mảng tạm để lỡ đang xem Photo thì có Data
            globalSpotsData.push({ region: regionName, name: name, lat: currentClickLat, lng: currentClickLng, date: todayStr, note: note });
            
            const newMarker = addSpotMarker(name, currentClickLat, currentClickLng, todayStr, note);
            
            closeModal(); 
            
            // Nếu đang xem Photo thì phải cập nhật lại Photo, nếu xem Map thì cập nhật Map
            if (isPhotoView) { renderPhotoLayer(); } else { updateLayerVisibility(); newMarker.openPopup(); }

            fetch(`${GAS_API_URL}?action=save&regionName=${encodeURIComponent(regionName)}&placeName=${encodeURIComponent(name)}&lat=${currentClickLat}&lng=${currentClickLng}&date=${encodeURIComponent(todayStr)}&note=${encodeURIComponent(note)}`, { redirect: "follow" })
                .then(res => res.json())
                .then(() => {
                    btnSubmit.innerHTML = oldText; btnSubmit.disabled = false;
                    showToast(`⚡ Đã lưu "${name}" đồng bộ mây thành công!`);
                    fetch(`${GAS_API_URL}?action=get`, { redirect: "follow" }).then(r => r.json()).then(newData => { localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(newData)); });
                })
                .catch(err => { 
                    alert("Lỗi kết nối khi lưu: Mạng yếu. Dữ liệu đã được vẽ tạm lên bản đồ."); 
                    btnSubmit.innerHTML = oldText; btnSubmit.disabled = false; 
                });
        }

        document.addEventListener('keydown', e => { if (!modal.classList.contains('active')) return; if (e.key === 'Enter') submitCheckIn(); if (e.key === 'Escape') closeModal(); });
        
        function forceMapRender() { map.invalidateSize(); if (!isPhotoView) updateLayerVisibility(); }
        setTimeout(forceMapRender, 100); setTimeout(forceMapRender, 500);
        
        window.addEventListener('load', () => { forceMapRender(); loadDataFromGoogleSheets(); });
    </script>
</body>
</html>
