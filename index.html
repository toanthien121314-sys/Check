<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="theme-color" content="#03050a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <title>Vietnam Neon Check-in Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* =========================================
           RESET & BASIC SETUP
        ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh; 
            background-color: #03050a;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }

        #map {
            width: 100%;
            height: 100%;
            height: 100dvh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: #03050a;
        }

        .leaflet-control-attribution {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
        }

        /* =========================================
           CÁC NÚT ĐIỀU KHIỂN (BUTTONS)
        ========================================= */
        .location-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom)); 
            right: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(0, 243, 255, 0.2));
            color: #00f3ff;
            border: 1.5px solid #00f3ff;
            padding: 12px 18px; 
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4), inset 0 0 8px rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .location-btn:hover {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 25px #00f3ff;
            transform: scale(1.05);
        }

        .photo-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom)); 
            left: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(189, 0, 255, 0.2));
            color: #bd00ff; 
            border: 1.5px solid #bd00ff;
            padding: 12px 18px; 
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(189, 0, 255, 0.4), inset 0 0 8px rgba(189, 0, 255, 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .photo-btn:hover, .photo-btn.active {
            background: #bd00ff;
            color: #fff;
            box-shadow: 0 0 25px #bd00ff;
            transform: scale(1.05);
        }

        .install-btn {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(255, 0, 127, 0.2));
            color: #ff007f;
            border: 1.5px solid #ff007f;
            padding: 10px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4), inset 0 0 8px rgba(255, 0, 127, 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: none; 
            align-items: center;
            gap: 6px;
        }

        .install-btn:hover {
            background: #ff007f;
            color: #fff;
            box-shadow: 0 0 25px #ff007f;
            transform: scale(1.05);
        }

        /* =========================================
           CÁC THÔNG BÁO VÀ LOADING
        ========================================= */
        #syncToast {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 20px;
            z-index: 1000;
            background: rgba(8, 12, 28, 0.9);
            border: 1px solid #00f3ff;
            color: #00f3ff;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            backdrop-filter: blur(5px);
            transition: opacity 0.5s ease;
            opacity: 0; 
            pointer-events: none;
        }

        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #03050a;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease;
        }

        .loading-text {
            color: #00f3ff;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 15px #00f3ff;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(0, 243, 255, 0.2);
            border-top: 4px solid #ff007f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px #ff007f;
        }

        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }

        /* =========================================
           THIẾT KẾ MARKERS TRÊN BẢN ĐỒ
        ========================================= */
        .neon-marker-container {
            position: relative;
            width: 28px;
            height: 28px;
            display: flex;
            justify-content: center;
        }

        .neon-dot {
            width: 18px;
            height: 18px;
            background: #ff007f;
            border-radius: 50%;
            border: 2px solid #ffffff;
            position: absolute;
            top: 5px;
            box-shadow: 0 0 15px #ff007f, 0 0 25px #ff007f, 0 0 35px #ff007f;
            z-index: 2;
            cursor: pointer;
        }

        .neon-pulse {
            width: 28px;
            height: 28px;
            background: rgba(255, 0, 127, 0.7);
            border-radius: 50%;
            position: absolute;
            top: 0;
            animation: ripple 1.8s infinite ease-out;
            z-index: 1;
        }

        .neon-label {
            position: absolute;
            top: -22px;
            color: #00f3ff;
            font-weight: 800;
            font-size: 0.8rem;
            text-shadow: 0 0 5px #00f3ff, 0 0 10px #000;
            white-space: nowrap;
            letter-spacing: 0.5px;
            pointer-events: none;
            background: rgba(5, 8, 20, 0.7);
            padding: 2px 6px;
            border-radius: 10px;
            border: 1px solid rgba(0, 243, 255, 0.4);
        }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        .red-flag-marker {
            font-size: 24px;
            filter: drop-shadow(0 0 8px #ff0000) drop-shadow(0 0 15px #ff0000);
            transition: transform 0.2s;
            cursor: pointer;
        }

        .red-flag-marker:hover {
            transform: scale(1.3) translateY(-3px);
        }

        .gps-dot {
            width: 16px;
            height: 16px;
            background: #00f3ff;
            border-radius: 50%;
            border: 2px solid #fff;
            position: absolute;
            top: 6px;
            left: 6px;
            box-shadow: 0 0 15px #00f3ff, 0 0 30px #00f3ff;
            z-index: 2;
        }

        .gps-pulse {
            width: 28px;
            height: 28px;
            background: rgba(0, 243, 255, 0.6);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            animation: ripple 1.5s infinite ease-out;
            z-index: 1;
        }

        /* Marker Album Ảnh Con Dấu */
        .photo-album-marker {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6), 0 0 15px rgba(189, 0, 255, 0.5);
            background: linear-gradient(45deg, #101026, #2a2a72);
            background-size: cover;
            background-position: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .photo-album-marker:hover {
            transform: scale(1.15);
            z-index: 2000 !important;
        }

        .photo-album-badge {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 6px;
            backdrop-filter: blur(3px);
        }

        /* =========================================
           POPUP TRÊN BẢN ĐỒ
        ========================================= */
        .leaflet-popup-content-wrapper {
            background: rgba(8, 12, 28, 0.95) !important;
            color: #fff !important;
            border: 1px solid #00f3ff;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
            border-radius: 12px !important;
            backdrop-filter: blur(8px);
            padding: 5px;
        }

        .leaflet-popup-tip {
            background: rgba(8, 12, 28, 0.95) !important;
            border-bottom: 1px solid #00f3ff;
            border-right: 1px solid #00f3ff;
        }

        .popup-title {
            color: #00f3ff;
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 8px;
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.6);
            border-bottom: 1px dashed rgba(0, 243, 255, 0.3);
            padding-bottom: 5px;
        }

        .popup-info {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #d1d5db;
        }

        .popup-info b {
            color: #ff007f;
        }

        /* =========================================
           THƯ VIỆN ẢNH IN-APP MASONRY GIAO DIỆN
        ========================================= */
        .gallery-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background-color: #03050a;
            z-index: 20000;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .gallery-container.active {
            transform: translateY(0);
        }
        
        .gallery-header {
            padding: max(20px, env(safe-area-inset-top)) 20px 15px 20px;
            background: linear-gradient(180deg, rgba(3,5,10,1) 0%, rgba(3,5,10,0.8) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
        }

        .gallery-title {
            color: #00f3ff;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.6);
        }

        .close-gallery-btn {
            background: rgba(255, 0, 127, 0.2);
            color: #ff007f;
            border: 1px solid #ff007f;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .gallery-grid {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            column-count: 4; 
            column-gap: 12px;
        }

        @media (max-width: 1024px) {
            .gallery-grid { column-count: 3; }
        }

        @media (max-width: 768px) {
            .gallery-grid { 
                column-count: 2; 
                column-gap: 8px; 
                padding: 8px; 
            }
        }

        .gallery-item {
            width: 100%;
            height: auto; 
            margin-bottom: 12px;
            border-radius: 8px;
            background: #111;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            transition: opacity 0.2s, transform 0.2s;
            break-inside: avoid; 
            display: block; 
        }

        @media (max-width: 768px) {
            .gallery-item { margin-bottom: 8px; }
        }

        .gallery-item:active {
            opacity: 0.6;
        }

        .gallery-item:hover {
            transform: scale(1.02); 
        }
        
        .empty-gallery {
            text-align: center;
            color: #64748b;
            margin-top: 50px;
            width: 100%;
            column-span: all; 
        }
        
        /* GIAO DIỆN LIGHTBOX (XEM ẢNH FULL SCREEN) */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 25000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-close {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            backdrop-filter: blur(5px);
            z-index: 25002;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            z-index: 25001;
            transition: background 0.3s;
        }

        .lightbox-nav:hover {
            background: rgba(255,255,255,0.3);
        }

        .lightbox-prev { left: 15px; }
        .lightbox-next { right: 15px; }

        .lightbox-img-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.2s ease-out; 
            transform-origin: center center;
            touch-action: none; 
        }

        @media (max-width: 768px) {
            .lightbox-nav { display: none; }
        }

        /* =========================================
           HỘP THOẠI NHẬP LIỆU CHECK-IN (MODAL)
        ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: linear-gradient(135deg, rgba(10, 16, 38, 0.95), rgba(5, 8, 20, 0.98));
            width: 90%;
            max-width: 400px;
            padding: 25px;
            border-radius: 16px;
            border: 2px solid #00f3ff;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.4), inset 0 0 15px rgba(0, 243, 255, 0.2);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #00f3ff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.6);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #a5b4fc;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 10px 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #ff007f;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .btn-cancel {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #475569;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-submit {
            background: linear-gradient(90deg, #00f3ff, #0077ff);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
        }

        .btn-submit:hover {
            background: linear-gradient(90deg, #ff007f, #ff00ff);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.8);
        }

        .auto-region-badge {
            background: rgba(0, 243, 255, 0.08);
            border: 1px dashed rgba(0, 243, 255, 0.5);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #a5b4fc;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .auto-region-badge span {
            color: #00f3ff;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">⏳ ĐANG TRUY XUẤT DỮ LIỆU...</div>
    </div>

    <div id="syncToast">🔄 Đang đồng bộ dữ liệu ngầm...</div>
    <button id="pwaInstallBtn" class="install-btn">
        📲 Tải Ứng Dụng
    </button>

    <div id="map"></div>

    <button id="togglePhotoBtn" class="photo-btn" onclick="togglePhotoView()">
        📸 Ảnh
    </button>
    <button class="location-btn" onclick="goToMyLocation()">
        🎯 Vị Trí Của Tôi
    </button>

    <div class="gallery-container" id="inAppGallery">
        <div class="gallery-header">
            <div class="gallery-title" id="galleryTitle">Album Ảnh</div>
            <button class="close-gallery-btn" onclick="closeInAppGallery()">Đóng</button>
        </div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <div class="lightbox-overlay" id="lightboxOverlay">
        <button class="lightbox-close" onclick="closeLightbox(event)">✕</button>
        <button class="lightbox-nav lightbox-prev" onclick="prevImage(event)">❮</button>
        <button class="lightbox-nav lightbox-next" onclick="nextImage(event)">❯</button>
        <div class="lightbox-img-container" id="lightboxContainer">
            <img src="" class="lightbox-img" id="lightboxImg" draggable="false">
        </div>
    </div>

    <div class="modal-overlay" id="checkinModal">
        <div class="modal-box">
            <div class="modal-title">📍 Thêm Điểm Check-in Nhỏ</div>
            
            <div class="auto-region-badge">
                🌐 Tỉnh/Thành: <span id="autoRegionText">⏳ Đang quét...</span>
            </div>

            <div class="form-group">
                <label>Tên địa điểm chi tiết (Cờ đỏ 🚩)</label>
                <input type="text" id="placeName" class="form-control" placeholder="VD: Quán cà phê..." autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>🎫 Ảnh đóng dấu hành trình (Stamp)</label>
                <input type="file" id="stampFileInput" accept="image/*" capture="environment" style="display:none;" onchange="handleStampFile(event)">
                <button type="button" class="btn-gps-checkin" style="margin-top:0; background:linear-gradient(90deg, #bd00ff, #ff007f);" onclick="document.getElementById('stampFileInput').click()">📸 Chụp Ảnh Con Dấu</button>
                <div id="stampPreviewContainer" style="margin-top:12px; text-align:center; display:none;">
                    <canvas id="stampCanvas" width="300" height="300" style="width:110px; height:110px; border:2px dashed #bd00ff; background:#000; border-radius:10px; box-shadow: 0 0 10px #bd00ff;"></canvas>
                </div>
            </div>

            <div class="form-group">
                <label>Ghi chú / Kỷ niệm</label>
                <input type="text" id="placeNote" class="form-control" placeholder="VD: Tuyệt vời..." autocomplete="off">
            </div>
            
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Hủy</button>
                <button class="btn btn-submit" id="btnSubmitCheckIn" onclick="submitCheckIn()">Lưu Điểm</button>
            </div>
        </div>
    </div>

    <script>
        // Tường lửa khẩn cấp ép tắt màn hình Loading sau tối đa 6 giây nếu trình duyệt lỗi cục bộ
        window.addEventListener('load', function() {
            setTimeout(function() {
                var loader = document.getElementById('loadingOverlay');
                if (loader && loader.style.display !== 'none') {
                    loader.style.opacity = '0';
                    setTimeout(function(){ loader.style.display = 'none'; }, 400);
                }
            }, 6000);
        });

        // ==========================================
        // 1. CẤU HÌNH HỆ THỐNG VÀ KHỞI TẠO API
        // ==========================================
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwa_ODSpKrrSWbbzeg7Fpc4cm3d1-FW9BbGrKtuJqhGIlrr4-y9NIZ7dIHo45EyWew/exec";
        const LOCAL_STORAGE_KEY = 'neonMapDataCache';

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {

        function createRegionalIcon(name) { 
            return L.divIcon({ className: 'custom-div-icon', html: `<div class="neon-marker-container"><div class="neon-label">${name}</div><div class="neon-pulse"></div><div class="neon-dot"></div></div>`, iconSize: [28,28], iconAnchor: [14,14] }); 
        }

        function addRegionalMarker(name, lat, lng, desc) {
            const regionKey = name.trim().toLowerCase();
            if (activeRegionsTracker.has(regionKey)) return;
            let finalLat = lat, finalLng = lng;
            const standardProv = VN_PROVINCES.find(p => p.name.toLowerCase() === regionKey);
            if (standardProv) { finalLat = standardProv.lat; finalLng = standardProv.lng; }

            const marker = L.marker([finalLat, finalLng], { icon: createRegionalIcon(name) }).addTo(regionalLayer);
            marker.bindPopup(`<div class="popup-title">📍 ${name}</div><p style="color:#d1d5db;">${desc}</p>`);
            
            marker.on('popupopen', e => { 
                const label = e.target.getElement()?.querySelector('.neon-label'); 
                if (label) { label.style.transition = 'opacity 0.2s'; label.style.opacity = '0'; } 
            });
            marker.on('popupclose', e => { 
                const label = e.target.getElement()?.querySelector('.neon-label'); 
                if (label) label.style.opacity = '1'; 
            });

            marker.on('click', () => { map.flyTo([finalLat, finalLng], 11, { duration: 1.5 }); });
            activeRegionsTracker.add(regionKey);
        }

        function addSpotMarker(name, lat, lng, date, note) {
            const marker = L.marker([lat, lng], { icon: redFlagIcon }).addTo(spotLayer);
            marker.bindPopup(`<div class="popup-title">🚩 ${name}</div><div class="popup-info"><p><b>⏰ Thời gian:</b> ${date}</p><p><b>📝 Ghi chú:</b> ${note || 'Không có ghi chú'}</p></div>`);
            return marker;
        }

        function renderDataToMap(data) {
            regionalLayer.clearLayers(); spotLayer.clearLayers(); activeRegionsTracker.clear(); globalSpotsData = [];
            if (data && data.regions) data.regions.forEach(reg => addRegionalMarker(reg.name, reg.lat, reg.lng, reg.desc));
            if (data && data.spots) { globalSpotsData = data.spots; data.spots.forEach(spot => addSpotMarker(spot.name, spot.lat, spot.lng, spot.date, spot.note)); }
            if (isPhotoView) renderPhotoLayer(); else updateLayerVisibility();
            return { regCount: activeRegionsTracker.size, spotCount: globalSpotsData.length };
        }

            }

        function handleStampFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            hasSelectedStampFile = true;
            document.getElementById('stampPreviewContainer').style.display = 'block';
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() { fileModelImageGlobal = img; processImageToStamp(img); };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function processImageToStamp(img) {
            const canvas = document.getElementById('stampCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 300, 300);

            const offCanvas = document.createElement('canvas');
            offCanvas.width = 170; offCanvas.height = 170;
            const offCtx = offCanvas.getContext('2d');
            
            let side = Math.min(img.width, img.height);
            let sx = (img.width - side) / 2; let sy = (img.height - side) / 2;
            offCtx.drawImage(img, sx, sy, side, side, 0, 0, 170, 170);

            const imgData = offCtx.getImageData(0, 0, 170, 170);
            const pixels = imgData.data;
            const threshold = 120; 
            const stampColor = { r: 230, g: 20, b: 80 }; 
            
            for (let i = 0; i < pixels.length; i += 4) {
                let brightness = 0.2126 * pixels[i] + 0.7152 * pixels[i+1] + 0.0722 * pixels[i+2];
                if (brightness > threshold) { pixels[i+3] = 0; } else { pixels[i] = stampColor.r; pixels[i+1] = stampColor.g; pixels[i+2] = stampColor.b; pixels[i+3] = 235; }
            }
            offCtx.putImageData(imgData, 0, 0);

            ctx.drawImage(offCanvas, 65, 65);

            ctx.strokeStyle = "rgb(230, 20, 80)"; ctx.fillStyle = "rgb(230, 20, 80)";
            ctx.lineWidth = 5; ctx.strokeRect(25, 20, 250, 260); 
            ctx.lineWidth = 1.5; ctx.strokeRect(33, 28, 234, 244); 

            const name = placeNameInput.value.trim() || "CHECK-IN";
            const t = new Date();
            const todayStr = t.getDate().toString().padStart(2, '0') + '/' + (t.getMonth()+1).toString().padStart(2, '0') + '/' + t.getFullYear();

            ctx.font = "bold 15px 'Segoe UI'"; ctx.textAlign = "center";
            ctx.fillText(name.toUpperCase(), 150, 47);
            ctx.font = "bold 14px 'Segoe UI'"; ctx.fillText(todayStr, 150, 253);
            ctx.font = "12px Arial"; ctx.fillText("★", 50, 150); ctx.fillText("★", 250, 150);

            const mainImgData = ctx.getImageData(0, 0, 300, 300);
            const mainPixels = mainImgData.data;
            for (let i = 0; i < mainPixels.length; i += 4) {
                if (mainPixels[i+3] > 0 && Math.random() < 0.14) { mainPixels[i+3] = Math.random() * 45; }
            }
            ctx.putImageData(mainImgData, 0, 0);
        }

        placeNameInput.addEventListener('input', () => { if (hasSelectedStampFile && fileModelImageGlobal) processImageToStamp(fileModelImageGlobal); });

        function openInAppGallery(name, folderUrl) {
            galleryTitle.innerText = name; galleryGrid.innerHTML = '<div class="empty-gallery">⏳ Đang tải ảnh từ vệ tinh...</div>'; galleryContainer.classList.add('active');
            fetch(`${GAS_API_URL}?action=getPhotos&folderUrl=${encodeURIComponent(folderUrl)}`)
                .then(res => res.json()).then(data => {
                    galleryGrid.innerHTML = '';
                    if (!data.images || data.images.length === 0) { galleryGrid.innerHTML = '<div class="empty-gallery">📭 Album chưa có ảnh.<br>Hãy lên Drive tải thêm!</div>'; currentAlbumImages = []; return; }
                    currentAlbumImages = data.images;
                    data.images.forEach((imgId, index) => {
                        const thumbUrl = `https://drive.google.com/thumbnail?id=${imgId}&sz=w800`;
                        const imgElem = document.createElement('img'); imgElem.src = thumbUrl; imgElem.className = 'gallery-item'; imgElem.loading = 'lazy';
                        imgElem.onclick = () => openLightbox(index); galleryGrid.appendChild(imgElem);
                    });
                }).catch(() => { galleryGrid.innerHTML = '<div class="empty-gallery">⚠️ Lỗi kết nối lấy ảnh!</div>'; });
        }
        
        function closeInAppGallery() { galleryContainer.classList.remove('active'); }
        function openLightbox(index) { currentImageIndex = index; updateLightboxImage(); lightboxOverlay.classList.add('active'); }
        function updateLightboxImage() { lightboxImg.src = `https://drive.google.com/thumbnail?id=${currentAlbumImages[currentImageIndex]}&sz=s0`; resetZoom(); }
        function closeLightbox(event) { if(event) event.stopPropagation(); lightboxOverlay.classList.remove('active'); lightboxImg.src = ''; resetZoom(); }
        function nextImage(event) { if(event) event.stopPropagation(); if(currentAlbumImages.length===0) return; currentImageIndex = (currentImageIndex + 1) % currentAlbumImages.length; updateLightboxImage(); }
        function prevImage(event) { if(event) event.stopPropagation(); if(currentAlbumImages.length===0) return; currentImageIndex = (currentImageIndex - 1 + currentAlbumImages.length) % currentAlbumImages.length; updateLightboxImage(); }

        function resetZoom() { currentScale = 1; currentTranslateX = 0; currentTranslateY = 0; applyTransform(); }
        function applyTransform() { lightboxImg.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${currentScale})`; }

        lightboxContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX - currentTranslateX; touchStartY = e.touches[0].clientY - currentTranslateY;
                const currentTime = new Date().getTime(); const tapLength = currentTime - lastTapTime;
                if (tapLength < 300 && tapLength > 0) {
                    if (currentScale === 1) currentScale = 2.5; else { currentScale = 1; currentTranslateX = 0; currentTranslateY = 0; }
                    applyTransform(); e.preventDefault();
                }
                lastTapTime = currentTime;
            }
        });
        lightboxContainer.addEventListener('touchmove', (e) => { if (currentScale > 1 && e.touches.length === 1) { currentTranslateX = e.touches[0].clientX - touchStartX; currentTranslateY = e.touches[0].clientY - touchStartY; applyTransform(); e.preventDefault(); } });
        lightboxContainer.addEventListener('touchend', (e) => { if (currentScale === 1 && e.changedTouches.length === 1) { let touchEndX = e.changedTouches[0].clientX; let diffX = touchEndX - touchStartX; if (diffX < -50) nextImage(); else if (diffX > 50) prevImage(); } });

        // ==========================================
        // 6. CACHE ĐỆM VÀ ĐỒNG BỘ MẠNG THÔNG MINH
        // ==========================================
        function safeGetCache() { try { return localStorage.getItem(LOCAL_STORAGE_KEY); } catch(e) { return null; } }
        function safeSetCache(data) { try { localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(data)); } catch(e) {} }

        function loadDataFromGoogleSheets() {
            setTimeout(hideLoadingScreen, 8000);
            let cachedDataStr = safeGetCache();
            let hasCache = false;

            if (cachedDataStr) { 
                try { 
                    const cachedData = JSON.parse(cachedDataStr); 
                    renderDataToMap(cachedData); 
                    hideLoadingScreen(); 
                    hasCache = true; 
                    showToast('🔄 Đang kiểm tra dữ liệu mới ngầm...', 2000); 
                } catch(e) {} 
            }

            fetch(`${GAS_API_URL}?action=get`, { redirect: "follow" })
                .then(res => {
                    if (!res.ok) throw new Error();
                    return res.json();
                })
                .then(data => {
                    safeSetCache(data);
                    renderDataToMap(data);
                    if (!hasCache) hideLoadingScreen(); 
                    showToast(`✅ Đã cập nhật mới nhất!`, 3000);
                })
                .catch(() => {
                    if (!hasCache) {
                        hideLoadingScreen();
                        showToast(`⚠️ Không có mạng. Đang xem offline!`, 5000);
                    }
                });
        }

        // ==========================================
        // 7. GPS ĐỊNH VỊ VÀ ĐÓNG GÓI DỮ LIỆU POST STAMP
        // ==========================================
        function goToMyLocation() {
            if (!navigator.geolocation) return alert("Trình duyệt không hỗ trợ GPS!");
            const btn = document.querySelector('.location-btn'); const originTxt = btn.innerHTML; btn.innerHTML = "📡 Đang quét..."; btn.style.opacity = "0.7";
            
            navigator.geolocation.getCurrentPosition(position => {
                myCurrentLat = position.coords.latitude.toFixed(4); myCurrentLng = position.coords.longitude.toFixed(4);
                if (myLocationMarker) map.removeLayer(myLocationMarker);
                myLocationMarker = L.marker([myCurrentLat, myCurrentLng], { icon: gpsIcon }).addTo(map);
                myLocationMarker.bindPopup(`<div class="popup-title">🎯 Vị Trí Của Bạn</div><button class="btn-gps-checkin" onclick="checkInAtMyLocation()">🚩 Check-in Tại Đây!</button>`);
                map.flyTo([myCurrentLat, myCurrentLng], 15, { duration: 1 }); setTimeout(() => myLocationMarker.openPopup(), 500);
                btn.innerHTML = originTxt; btn.style.opacity = "1";
            }, err => {
                let msg = "Không thể nhận tín hiệu GPS!";
                if (err.code === 1) msg = "Trình duyệt bị CHẶN quyền vị trí!"; else if (err.code === 3) msg = "Quá thời gian quét GPS (Timeout).";
                alert(msg); btn.innerHTML = originTxt; btn.style.opacity = "1";
            }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 10000 });
        }

        function updateLayerVisibility() {
            if (!map || isPhotoView) return; 
            if (map.getZoom() < ZOOM_THRESHOLD) { if (!map.hasLayer(regionalLayer)) map.addLayer(regionalLayer); if (map.hasLayer(spotLayer)) map.removeLayer(spotLayer); }
            else { if (map.hasLayer(regionalLayer)) map.removeLayer(regionalLayer); if (!map.hasLayer(spotLayer)) map.addLayer(spotLayer); }
        }

        function checkInAtMyLocation() { currentClickLat = myCurrentLat; currentClickLng = myCurrentLng; if (myLocationMarker) myLocationMarker.closePopup(); openCheckInModal(); }
        function findNearestProvinceOffline(lat, lng) { let min = Infinity; let name = "Việt Nam"; VN_PROVINCES.forEach(p => { let d = Math.sqrt(Math.pow(lat - p.lat,2) + Math.pow(lng - p.lng,2)); if (d < min) { min = d; name = p.name; } }); return name; }

        function openCheckInModal() {
            placeNameInput.value = ''; placeNoteInput.value = ''; hasSelectedStampFile = false; fileModelImageGlobal = null;
            document.getElementById('stampPreviewContainer').style.display = 'none'; document.getElementById('stampFileInput').value = '';
            modal.classList.add('active'); setTimeout(() => placeNameInput.focus(), 100);
            autoRegionText.innerHTML = '⏳ Đang quét...'; currentDetectedRegion = "Việt Nam";
            
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentClickLat}&lon=${currentClickLng}&zoom=10&addressdetails=1`, { headers: { 'Accept-Language': 'vi' } })
            .then(res => res.json()).then(data => { if (data && data.address) { let p = data.address.city || data.address.province || data.address.state; if (p) { currentDetectedRegion = p.replace('Thành phố ', 'TP. ').replace('Tỉnh ', ''); autoRegionText.innerHTML = `${currentDetectedRegion}`; return; } } throw new Error(); })
            .catch(() => {
                fetch(`${GAS_API_URL}?action=getProvince&lat=${currentClickLat}&lng=${currentClickLng}`, { redirect: "follow" }).then(res => res.json()).then(data => { if (data.province && data.province !== "Khu vực mới") { currentDetectedRegion = data.province; autoRegionText.innerHTML = `${currentDetectedRegion}`; } else throw new Error(); })
                .catch(() => { currentDetectedRegion = findNearestProvinceOffline(currentClickLat, currentClickLng); autoRegionText.innerHTML = `📍 ${currentDetectedRegion} (Offline)`; });
            });
        }
        
        function closeModal() { modal.classList.remove('active'); }

        function submitCheckIn() {
            const name = placeNameInput.value.trim(); const note = placeNoteInput.value.trim();
            if (!name) return alert("Vui lòng điền tên địa điểm!");
            
            const btnSubmit = document.getElementById('btnSubmitCheckIn'); const oldText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = "⏳ Đang đóng dấu..."; btnSubmit.disabled = true;

            const regionName = currentDetectedRegion;
            addRegionalMarker(regionName, currentClickLat, currentClickLng, `Khu vực tạo tự động! 🏙️`);
            const t = new Date(); const todayStr = t.getDate().toString().padStart(2, '0') + '/' + (t.getMonth()+1).toString().padStart(2, '0') + '/' + t.getFullYear();
            
            let stampDataBase64 = "";
            if (hasSelectedStampFile) {
                const cvs = document.getElementById('stampCanvas');
                if (cvs) stampDataBase64 = cvs.toDataURL("image/png");
            }

            const tempSpot = { region: regionName, name: name, lat: currentClickLat, lng: currentClickLng, date: todayStr, note: note, folderUrl: "", stampUrl: stampDataBase64 };
            globalSpotsData.push(tempSpot);
            addSpotMarker(name, currentClickLat, currentClickLng, todayStr, note);
            
            closeModal();
            if (isPhotoView) renderPhotoLayer(); else updateLayerVisibility();

            fetch(`${GAS_API_URL}?action=save`, { method: "POST", body: JSON.stringify({ regionName: regionName, placeName: name, lat: currentClickLat, lng: currentClickLng, date: todayStr, note: note, stampData: stampDataBase64 }) })
            .then(res => res.json()).then((respData) => {
                btnSubmit.innerHTML = oldText; btnSubmit.disabled = false;
                showToast(`⚡ Đã đóng mộc điểm "${name}"!`);
                tempSpot.folderUrl = respData.url; if(respData.stampUrl) tempSpot.stampUrl = respData.stampUrl;
                if (isPhotoView) renderPhotoLayer();
                fetch(`${GAS_API_URL}?action=get`, { redirect: "follow" }).then(r => r.json()).then(newData => { safeSetCache(newData); });
            })
            .catch(() => {
                showToast(`⏳ Kết nối nghẽn, đang vá dữ liệu đệm...`, 3000);
                setTimeout(() => {
                    fetch(`${GAS_API_URL}?action=get`, { redirect: "follow" }).then(r => r.json()).then(newData => {
                        safeSetCache(newData);
                        const saved = newData.spots.find(s => s.name === name && Math.abs(s.lat - currentClickLat) < 0.001);
                        if (saved && saved.folderUrl) { tempSpot.folderUrl = saved.folderUrl; tempSpot.stampUrl = saved.stampUrl; if (isPhotoView) renderPhotoLayer(); showToast(`✅ Đã đồng bộ "${name}"!`, 3000); }
                        btnSubmit.innerHTML = oldText; btnSubmit.disabled = false;
                    }).catch(() => { btnSubmit.innerHTML = oldText; btnSubmit.disabled = false; });
                }, 3000);
            });
        }

        document.addEventListener('keydown', e => { if (modal && !modal.classList.contains('active')) return; if (e.key === 'Enter') submitCheckIn(); if (e.key === 'Escape') closeModal(); });
        function forceMapRender() { map.invalidateSize(); if (!isPhotoView) updateLayerVisibility(); }
        
        setTimeout(forceMapRender, 100); setTimeout(forceMapRender, 500);
        window.addEventListener('load', () => { forceMapRender(); loadDataFromGoogleSheets(); });
    </script>
</body>
</html>
