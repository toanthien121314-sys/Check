<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#03050a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Vietnam Neon Check-in Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* =========================================
           HỆ THỐNG LÕI MÀU NEON THEO NGÀY
        ========================================= */
        :root {
            --neon-primary: #00f3ff;
            --neon-primary-rgb: 0, 243, 255;
            --neon-secondary: #ff007f;
            --neon-secondary-rgb: 255, 0, 127;
        }

        /* =========================================
           RESET & BASIC SETUP
        ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh; 
            background-color: #03050a;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }

        #map {
            width: 100%;
            height: 100%;
            height: 100dvh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: #03050a;
        }

        .leaflet-control-attribution {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
        }

        /* =========================================
           CÁC NÚT ĐIỀU KHIỂN (BUTTONS)
        ========================================= */
        .location-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom)); 
            right: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(var(--neon-primary-rgb), 0.2));
            color: var(--neon-primary);
            border: 1.5px solid var(--neon-primary);
            padding: 12px 18px; 
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(var(--neon-primary-rgb), 0.4), inset 0 0 8px rgba(var(--neon-primary-rgb), 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .location-btn:hover {
            background: var(--neon-primary);
            color: #000;
            box-shadow: 0 0 25px var(--neon-primary);
            transform: scale(1.05);
        }

        .photo-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom)); 
            left: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(189, 0, 255, 0.2));
            color: #bd00ff; 
            border: 1.5px solid #bd00ff;
            padding: 12px 18px; 
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(189, 0, 255, 0.4), inset 0 0 8px rgba(189, 0, 255, 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .photo-btn:hover, .photo-btn.active {
            background: #bd00ff;
            color: #fff;
            box-shadow: 0 0 25px #bd00ff;
            transform: scale(1.05);
        }

        .install-btn {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(var(--neon-secondary-rgb), 0.2));
            color: var(--neon-secondary);
            border: 1.5px solid var(--neon-secondary);
            padding: 10px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(var(--neon-secondary-rgb), 0.4), inset 0 0 8px rgba(var(--neon-secondary-rgb), 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: none; 
            align-items: center;
            gap: 6px;
        }

        .install-btn:hover {
            background: var(--neon-secondary);
            color: #fff;
            box-shadow: 0 0 25px var(--neon-secondary);
            transform: scale(1.05);
        }

        /* =========================================
           CÁC THÔNG BÁO VÀ LOADING
        ========================================= */
        #syncToast {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 20px;
            z-index: 1000;
            background: rgba(8, 12, 28, 0.9);
            border: 1px solid var(--neon-primary);
            color: var(--neon-primary);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(var(--neon-primary-rgb), 0.4);
            backdrop-filter: blur(5px);
            transition: opacity 0.5s ease;
            opacity: 0; 
            pointer-events: none;
        }

        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #03050a;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease;
        }

        .loading-text {
            color: var(--neon-primary);
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 15px var(--neon-primary);
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(var(--neon-primary-rgb), 0.2);
            border-top: 4px solid var(--neon-secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px var(--neon-secondary);
        }

        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }

        /* =========================================
           HIỆU ỨNG ĐƯỜNG VIỀN RANH GIỚI NEON
        ========================================= */
        path.neon-province-border {
            filter: drop-shadow(0 0 3px rgba(var(--neon-primary-rgb), 0.5));
            transition: fill-opacity 0.5s ease, filter 0.5s ease;
        }
        
        path.neon-province-active {
            filter: drop-shadow(0 0 6px var(--neon-secondary)) drop-shadow(0 0 12px var(--neon-secondary));
            transition: fill-opacity 0.5s ease, filter 0.5s ease;
        }

        /* =========================================
           THIẾT KẾ MARKERS TRÊN BẢN ĐỒ
        ========================================= */
        .neon-marker-container {
            position: relative;
            width: 28px;
            height: 28px;
            display: flex;
            justify-content: center;
        }

        .neon-dot {
            width: 18px;
            height: 18px;
            background: var(--neon-secondary);
            border-radius: 50%;
            border: 2px solid #ffffff;
            position: absolute;
            top: 5px;
            box-shadow: 0 0 15px var(--neon-secondary), 0 0 25px var(--neon-secondary), 0 0 35px var(--neon-secondary);
            z-index: 2;
            cursor: pointer;
        }

        .neon-pulse {
            width: 28px;
            height: 28px;
            background: rgba(var(--neon-secondary-rgb), 0.7);
            border-radius: 50%;
            position: absolute;
            top: 0;
            animation: ripple 1.8s infinite ease-out;
            z-index: 1;
        }

        .neon-label {
            position: absolute;
            top: -22px;
            color: var(--neon-primary);
            font-weight: 800;
            font-size: 0.8rem;
            text-shadow: 0 0 5px var(--neon-primary), 0 0 10px #000;
            white-space: nowrap;
            letter-spacing: 0.5px;
            pointer-events: none;
            background: rgba(5, 8, 20, 0.7);
            padding: 2px 6px;
            border-radius: 10px;
            border: 1px solid rgba(var(--neon-primary-rgb), 0.4);
        }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        .red-flag-marker {
            font-size: 24px;
            filter: drop-shadow(0 0 8px #ff0000) drop-shadow(0 0 15px #ff0000);
            transition: transform 0.2s;
            cursor: pointer;
        }

        .red-flag-marker:hover {
            transform: scale(1.3) translateY(-3px);
        }

        .gps-dot {
            width: 16px;
            height: 16px;
            background: var(--neon-primary);
            border-radius: 50%;
            border: 2px solid #fff;
            position: absolute;
            top: 6px;
            left: 6px;
            box-shadow: 0 0 15px var(--neon-primary), 0 0 30px var(--neon-primary);
            z-index: 2;
        }

        .gps-pulse {
            width: 28px;
            height: 28px;
            background: rgba(var(--neon-primary-rgb), 0.6);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            animation: ripple 1.5s infinite ease-out;
            z-index: 1;
        }

        .photo-album-marker {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6), 0 0 15px rgba(189, 0, 255, 0.5);
            background: linear-gradient(45deg, #101026, #2a2a72);
            background-size: cover;
            background-position: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .photo-album-marker:hover {
            transform: scale(1.15);
            z-index: 2000 !important;
        }

        .photo-album-badge {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 6px;
            backdrop-filter: blur(3px);
        }

        /* =========================================
           POPUP TRÊN BẢN ĐỒ
        ========================================= */
        .leaflet-popup-content-wrapper {
            background: rgba(8, 12, 28, 0.95) !important;
            color: #fff !important;
            border: 1px solid var(--neon-primary);
            box-shadow: 0 0 20px rgba(var(--neon-primary-rgb), 0.5);
            border-radius: 12px !important;
            backdrop-filter: blur(8px);
            padding: 5px;
        }

        .leaflet-popup-tip {
            background: rgba(8, 12, 28, 0.95) !important;
            border-bottom: 1px solid var(--neon-primary);
            border-right: 1px solid var(--neon-primary);
        }

        .popup-title {
            color: var(--neon-primary);
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 8px;
            text-shadow: 0 0 8px rgba(var(--neon-primary-rgb), 0.6);
            border-bottom: 1px dashed rgba(var(--neon-primary-rgb), 0.3);
            padding-bottom: 5px;
        }

        .popup-info {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #d1d5db;
        }

        .popup-info b {
            color: var(--neon-secondary);
        }

        .btn-gps-checkin {
            margin-top: 8px;
            width: 100%;
            padding: 8px;
            background: linear-gradient(90deg, var(--neon-secondary), #ff00ff);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(var(--neon-secondary-rgb), 0.5);
            transition: all 0.2s;
        }

        .btn-gps-checkin:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(var(--neon-secondary-rgb), 0.8);
        }

        /* =========================================
           THƯ VIỆN ẢNH IN-APP MASONRY GIAO DIỆN
        ========================================= */
        .gallery-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background-color: #03050a;
            z-index: 20000;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .gallery-container.active {
            transform: translateY(0);
        }
        
        .gallery-header {
            padding: max(20px, env(safe-area-inset-top)) 20px 15px 20px;
            background: linear-gradient(180deg, rgba(3,5,10,1) 0%, rgba(3,5,10,0.8) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(var(--neon-primary-rgb), 0.2);
        }

        .gallery-title {
            color: var(--neon-primary);
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(var(--neon-primary-rgb), 0.6);
        }

        .close-gallery-btn {
            background: rgba(var(--neon-secondary-rgb), 0.2);
            color: var(--neon-secondary);
            border: 1px solid var(--neon-secondary);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .gallery-grid {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            column-count: 4;
            column-gap: 12px;
        }

        @media (max-width: 1024px) {
            .gallery-grid { column-count: 3; }
        }

        @media (max-width: 768px) {
            .gallery-grid { 
                column-count: 2; 
                column-gap: 8px; 
                padding: 8px; 
            }
        }

        .gallery-item {
            width: 100%;
            height: auto;
            margin-bottom: 12px;
            border-radius: 8px;
            background: #111;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            transition: opacity 0.2s, transform 0.2s;
            break-inside: avoid;
            display: block;
        }

        @media (max-width: 768px) {
            .gallery-item { margin-bottom: 8px; }
        }

        .gallery-item:active {
            opacity: 0.6;
        }

        .gallery-item:hover {
            transform: scale(1.02);
        }
        
        .empty-gallery {
            text-align: center;
            color: #64748b;
            margin-top: 50px;
            width: 100%;
            column-span: all;
        }
        
        /* GIAO DIỆN LIGHTBOX (XEM ẢNH FULL SCREEN) */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 25000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-close {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            backdrop-filter: blur(5px);
            z-index: 25002;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            z-index: 25001;
            transition: background 0.3s;
        }

        .lightbox-nav:hover {
            background: rgba(255,255,255,0.3);
        }

        .lightbox-prev { left: 15px; }
        .lightbox-next { right: 15px; }

        .lightbox-img-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.2s ease-out; 
            transform-origin: center center;
            touch-action: none; 
        }

        @media (max-width: 768px) {
            .lightbox-nav { display: none; }
        }

        /* =========================================
           HỘP THOẠI NHẬP LIỆU (SMART 2-STEP MODAL)
        ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: linear-gradient(135deg, rgba(10, 16, 38, 0.95), rgba(5, 8, 20, 0.98));
            width: 90%;
            max-width: 420px;
            padding: 22px;
            border-radius: 16px;
            border: 2px solid var(--neon-primary);
            box-shadow: 0 0 25px rgba(var(--neon-primary-rgb), 0.4), inset 0 0 15px rgba(var(--neon-primary-rgb), 0.2);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
            max-height: 92vh;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--neon-primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 0 0 10px rgba(var(--neon-primary-rgb), 0.6);
            flex-shrink: 0;
        }

        .auto-region-badge {
            background: rgba(var(--neon-primary-rgb), 0.08);
            border: 1px dashed rgba(var(--neon-primary-rgb), 0.5);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #a5b4fc;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .auto-region-badge span {
            color: var(--neon-primary);
            font-weight: bold;
            text-shadow: 0 0 5px rgba(var(--neon-primary-rgb), 0.5);
        }

        .step-container {
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #a5b4fc;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 10px 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--neon-secondary);
            box-shadow: 0 0 10px rgba(var(--neon-secondary-rgb), 0.5);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .btn-cancel {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #475569;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-submit {
            background: linear-gradient(90deg, var(--neon-primary), #0077ff);
            color: #000;
            box-shadow: 0 0 15px rgba(var(--neon-primary-rgb), 0.5);
        }

        .btn-submit:hover {
            background: linear-gradient(90deg, var(--neon-secondary), #ff00ff);
            color: #fff;
            box-shadow: 0 0 20px rgba(var(--neon-secondary-rgb), 0.8);
        }

        .stamp-preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 5px 0;
            background: rgba(0, 0, 0, 0.55);
            padding: 12px;
            border-radius: 12px;
            border: 1px dashed rgba(var(--neon-secondary-rgb), 0.5);
            box-shadow: inset 0 0 10px rgba(var(--neon-secondary-rgb), 0.1);
        }
        
        .stamp-preview-title {
            font-size: 0.78rem;
            color: var(--neon-secondary);
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(var(--neon-secondary-rgb), 0.5);
        }

        #stampCanvas {
            width: 240px;
            height: 315px; 
            border-radius: 4px;
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.2);
            background: transparent;
        }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">⏳ ĐANG TRUY XUẤT DỮ LIỆU...</div>
    </div>

    <div id="syncToast">🔄 Đang đồng bộ dữ liệu ngầm...</div>

    <button id="pwaInstallBtn" class="install-btn">
        📲 Tải Ứng Dụng
    </button>

    <div id="map"></div>

    <button id="togglePhotoBtn" class="photo-btn" onclick="togglePhotoView()">
        📸 Ảnh
    </button>

    <button class="location-btn" onclick="goToMyLocation()">
        🎯 Vị Trí Của Tôi
    </button>

    <div class="gallery-container" id="inAppGallery">
        <div class="gallery-header">
            <div class="gallery-title" id="galleryTitle">Album Ảnh</div>
            <button class="close-gallery-btn" onclick="closeInAppGallery()">Đóng</button>
        </div>
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <div class="lightbox-overlay" id="lightboxOverlay">

    <script>
        // ==========================================
        // 0. HỆ THỐNG MÀU NEON THEO NGÀY (THAY THẾ HARDCODE MÀU)
        // ==========================================
        const appNeonPalettes = [
            { primary: '#00f3ff', pRgb: '0, 243, 255', secondary: '#ff007f', sRgb: '255, 0, 127' }, // Xanh lam - Hồng (Mặc định)
            { primary: '#00ffaa', pRgb: '0, 255, 170', secondary: '#bd00ff', sRgb: '189, 0, 255' }, // Bạc hà - Tím
            { primary: '#ffea00', pRgb: '255, 234, 0', secondary: '#ff0055', sRgb: '255, 0, 85' },  // Vàng - Đỏ
            { primary: '#00e5ff', pRgb: '0, 229, 255', secondary: '#ffaa00', sRgb: '255, 170, 0' }, // Xanh biển - Cam
            { primary: '#ccff00', pRgb: '204, 255, 0', secondary: '#ff00ff', sRgb: '255, 0, 255' }  // Chanh - Đỏ tươi (Magenta)
        ];
        
        function setAppNeonColorByDate() {
            const today = new Date();
            // Lấy ngày trong năm để đổi màu ngẫu nhiên nhưng cố định trong ngày
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
            const palette = appNeonPalettes[dayOfYear % appNeonPalettes.length];
            
            document.documentElement.style.setProperty('--neon-primary', palette.primary);
            document.documentElement.style.setProperty('--neon-primary-rgb', palette.pRgb);
            document.documentElement.style.setProperty('--neon-secondary', palette.secondary);
            document.documentElement.style.setProperty('--neon-secondary-rgb', palette.sRgb);
            
            return palette;
        }
        const currentAppColors = setAppNeonColorByDate();

        // ==========================================
        // 1. CẤU HÌNH HỆ THỐNG VÀ API
        // ==========================================
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx7vxQeX0br9PqlWsjE8FcVvdg6zohwHejlEJbxlrKIEDldoHymGNd8gvXe5ZqQmI3q/exec";
        const LOCAL_STORAGE_KEY = 'neonMapDataCache';
        const GEOJSON_VN_BORDERS_URL = "https://cdn.jsdelivr.net/gh/TungTh/tungth.github.io/data/vn-provinces.json"; 

        let myLocationMarker = null;
        let myCurrentLat = 0;
        let myCurrentLng = 0;
        let currentClickLat = 0;
        let currentClickLng = 0;
        let currentDetectedRegion = "Việt Nam";
        let globalSpotsData = []; 
        let isPhotoView = false; 
        let userCapturedImg = null; 

        let geoJsonBordersData = null;
        let geoJsonLayer = null;

        let pressTimer;
        let isPressing = false;
        let targetStampInfo = null;

        const vintageColors = [
            { hex: '#1b3b6f', r: 27, g: 59, b: 111 },   
            { hex: '#8b1c1c', r: 139, g: 28, b: 28 },   
            { hex: '#1c5236', r: 28, g: 82, b: 54 },    
            { hex: '#4a2c5e', r: 74, g: 44, b: 94 },    
            { hex: '#5c4033', r: 92, g: 64, b: 51 }     
        ];
        let currentStampColor = vintageColors[0];

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error('Lỗi khởi chạy SW:', err));
            });
        }

        let deferredPrompt;
        const installBtn = document.getElementById('pwaInstallBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'flex';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });

        window.addEventListener('appinstalled', () => {
            installBtn.style.display = 'none';
        });

        // ==========================================
        // 2. KHỞI TẠO BẢN ĐỒ LEAFLET VÀ CÁC LỚP
        // ==========================================
        const map = L.map('map', {
            center: [16.047079, 108.206230],
            zoom: 6,
            minZoom: 5,
            maxZoom: 18, 
            zoomControl: false, 
            attributionControl: false 
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', { 
            maxZoom: 20 
        }).addTo(map);

        function createRegionalIcon(regionName) {
            return L.divIcon({ 
                className: 'custom-div-icon', 
                html: `<div class="neon-marker-container"><div class="neon-label">${regionName}</div><div class="neon-pulse"></div><div class="neon-dot"></div></div>`, 
                iconSize: [28, 28], 
                iconAnchor: [14, 14], 
                popupAnchor: [0, -14] 
            });
        }
        
        const redFlagIcon = L.divIcon({ 
            className: 'custom-div-icon', 
            html: `<div class="red-flag-marker">🚩</div>`, 
            iconSize: [28, 28], 
            iconAnchor: [5, 25], 
            popupAnchor: [8, -25] 
        });
        
        const gpsIcon = L.divIcon({ 
            className: 'custom-div-icon', 
            html: `<div class="neon-marker-container"><div class="gps-pulse"></div><div class="gps-dot"></div></div>`, 
            iconSize: [28, 28], 
            iconAnchor: [14, 14], 
            popupAnchor: [0, -14] 
        });

        const VN_PROVINCES = [
            { name: "TP. Hồ Chí Minh", lat: 10.7769, lng: 106.7009 },
            { name: "Hà Nội", lat: 21.0285, lng: 105.8542 },
            { name: "Đà Nẵng", lat: 16.0608, lng: 108.2230 },
            { name: "Phú Quốc", lat: 10.2289, lng: 103.9572 },
            { name: "Vĩnh Long", lat: 10.2537, lng: 105.9722 },
            { name: "Cần Thơ", lat: 10.0452, lng: 105.7469 },
            { name: "Hải Phòng", lat: 20.8449, lng: 106.6881 },
            { name: "Đà Lạt", lat: 11.9404, lng: 108.4583 },
            { name: "Nha Trang", lat: 12.2388, lng: 109.1967 },
            { name: "Huế", lat: 16.4637, lng: 107.5909 },
            { name: "Vũng Tàu", lat: 10.3460, lng: 107.0843 },
            { name: "Quảng Ninh", lat: 20.9599, lng: 107.0432 },
            { name: "Bình Thuận", lat: 11.0912, lng: 108.0834 },
            { name: "Quy Nhơn", lat: 13.7830, lng: 109.2197 },
            { name: "Hội An", lat: 15.8801, lng: 108.3380 },
            { name: "An Giang", lat: 10.5216, lng: 105.1259 },
            { name: "Kiên Giang", lat: 9.9574, lng: 105.1259 },
            { name: "Đồng Nai", lat: 10.9574, lng: 107.0681 },
            { name: "Bình Dương", lat: 11.1667, lng: 106.6667 },
            { name: "Tây Ninh", lat: 11.3667, lng: 106.1167 },
            { name: "Tiền Giang", lat: 10.4333, lng: 106.2500 },
            { name: "Đồng Tháp", lat: 10.5333, lng: 105.6833 },
            { name: "Bến Tre", lat: 10.2333, lng: 106.3833 },
            { name: "Trà Vinh", lat: 9.8167, lng: 106.3000 },
            { name: "Sóc Trăng", lat: 9.6000, lng: 105.9667 },
            { name: "Bạc Liêu", lat: 9.2833, lng: 105.7167 },
            { name: "Cà Mau", lat: 9.1833, lng: 105.1500 },
            { name: "Lào Cai", lat: 22.4833, lng: 103.9500 },
            { name: "Sa Pa", lat: 22.3364, lng: 103.8438 },
            { name: "Thanh Hóa", lat: 19.8067, lng: 105.7714 },
            { name: "Nghệ An", lat: 19.8067, lng: 105.7714 },
            { name: "Hà Tĩnh", lat: 18.6796, lng: 105.6813 },
            { name: "Quảng Bình", lat: 18.4136, lng: 106.0125 },
            { name: "Quảng Trị", lat: 17.4833, lng: 106.6000 },
            { name: "Quảng Nam", lat: 15.5678, lng: 108.0000 },
            { name: "Quảng Ngãi", lat: 15.1205, lng: 108.7923 },
            { name: "Bình Định", lat: 14.1667, lng: 108.9000 },
            { name: "Phú Yên", lat: 14.0500, lng: 109.0167 },
            { name: "Ninh Thuận", lat: 11.0833, lng: 108.9333 },
            { name: "Kon Tum", lat: 14.3500, lng: 108.0000 },
            { name: "Gia Lai", lat: 13.9833, lng: 108.0000 },
            { name: "Đắk Lắk", lat: 13.7667, lng: 108.0000 },
            { name: "Đắk Nông", lat: 12.0000, lng: 108.0000 },
            { name: "Lâm Đồng", lat: 11.9500, lng: 108.4333 },
            { name: "Bình Phước", lat: 12.0000, lng: 106.7500 },
            { name: "Long An", lat: 10.6667, lng: 106.1667 },
            { name: "Thái Nguyên", lat: 21.6000, lng: 105.8333 },
            { name: "Bắc Giang", lat: 21.2667, lng: 106.2000 },
            { name: "Bắc Ninh", lat: 21.1833, lng: 106.0667 },
            { name: "Hưng Yên", lat: 21.1167, lng: 106.0500 },
            { name: "Hải Dương", lat: 20.9333, lng: 106.3167 },
            { name: "Thái Bình", lat: 20.4500, lng: 106.3333 },
            { name: "Nam Định", lat: 20.9333, lng: 106.3167 },
            { name: "Ninh Bình", lat: 20.2500, lng: 105.9667 }
        ];

        const regionalLayer = L.layerGroup().addTo(map);
        const spotLayer = L.layerGroup();
        const photoLayer = L.layerGroup();
        const activeRegionsTracker = new Set();

        function addRegionalMarker(name, lat, lng, desc) {
            const regionKey = name.trim().toLowerCase();
            if (activeRegionsTracker.has(regionKey)) return;

            let finalLat = lat;
            let finalLng = lng;
            
            const standardProv = VN_PROVINCES.find(p => p.name.toLowerCase() === regionKey);
            if (standardProv) {
                finalLat = standardProv.lat;
                finalLng = standardProv.lng;
            }

            const marker = L.marker([finalLat, finalLng], { icon: createRegionalIcon(name) }).addTo(regionalLayer);
            marker.bindPopup(`<div class="popup-title">📍 ${name}</div><p style="color:#d1d5db;">${desc}</p>`);
            
            marker.on('popupopen', function(e) {
                const iconElement = e.target.getElement();
                if (iconElement) {
                    const label = iconElement.querySelector('.neon-label');
                    if (label) {
                        label.style.transition = 'opacity 0.2s'; 
                        label.style.opacity = '0'; 
                    }
                }
            });

            marker.on('popupclose', function(e) {
                const iconElement = e.target.getElement();
                if (iconElement) {
                    const label = iconElement.querySelector('.neon-label');
                    if (label) {
                        label.style.opacity = '1'; 
                    }
                }
            });

            marker.on('click', () => {
                map.flyTo([finalLat, finalLng], 11, { duration: 1.5 });
            });
            
            activeRegionsTracker.add(regionKey);
        }

        function startStampPress(e, lat, lng, nameStr) {
            isPressing = true;
            pressTimer = setTimeout(() => {
                if(isPressing) {
                    targetStampInfo = globalSpotsData.find(s => s.name === nameStr && Math.abs(s.lat - lat) < 0.0001 && Math.abs(s.lng - lng) < 0.0001);
                    if (targetStampInfo) {
                        document.getElementById('stampOptionsMenu').classList.add('active');
                    }
                }
            }, 800); 
        }

        function cancelStampPress() {
            isPressing = false;
            clearTimeout(pressTimer);
        }

        function addSpotMarker(name, lat, lng, date, note, stampUrl) {
            const marker = L.marker([lat, lng], { icon: redFlagIcon }).addTo(spotLayer);
            const cleanStampUrl = (stampUrl || "").toString().trim();
            const safeNameStr = name.replace(/'/g, "\\'"); 
            const imgId = `stamp-img-${name.replace(/\s/g, '')}`;
            
            let stampHtml = '';
            if (cleanStampUrl !== '') {
                stampHtml = `
                    <div style="text-align:center; margin-top:10px; padding-top:8px; border-top:1px dashed rgba(var(--neon-primary-rgb), 0.3);">
                        <div style="font-size:0.75rem; color:var(--neon-primary); margin-bottom:4px; font-weight:bold; letter-spacing:0.5px;">🌸 TEM THƯ KỶ NIỆM 🌸</div>
                        <img id="${imgId}" src="${cleanStampUrl}"
                             oncontextmenu="return false;"
                             onmousedown="startStampPress(event, ${lat}, ${lng}, '${safeNameStr}')"
                             onmouseup="cancelStampPress()"
                             onmouseleave="cancelStampPress()"
                             ontouchstart="startStampPress(event, ${lat}, ${lng}, '${safeNameStr}')"
                             ontouchend="cancelStampPress()"
                             ontouchmove="cancelStampPress()"
                             style="width:160px; height:210px; object-fit:contain; border-radius:4px; box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); background: transparent; cursor:pointer; transition:transform 0.2s; -webkit-touch-callout: none; -webkit-user-select: none;"
                             title="Ấn đè vài giây để xem hoặc đổi ảnh"
                             onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                    </div>
                `;
            }

            marker.bindPopup(`
                <div class="popup-title">🚩 ${name}</div>
                <div class="popup-info">
                    <p><b>⏰ Thời gian:</b> ${date}</p>
                    <p><b>📝 Ghi chú:</b> ${note || 'Không có ghi chú'}</p>
                    ${stampHtml}
                </div>
            `);
            return marker;
        }

        // ==========================================
        // VẼ ĐƯỜNG VIỀN RANH GIỚI TỈNH THÀNH ĐỔI MÀU
        // ==========================================
        function loadProvinceBorders() {
            fetch(GEOJSON_VN_BORDERS_URL)
                .then(res => res.json())
                .then(data => {
                    geoJsonBordersData = data;
                    renderProvinceBorders();
                })
                .catch(err => console.log("Không tải được ranh giới tỉnh:", err));
        }

        function renderProvinceBorders() {
            if (!geoJsonBordersData) return;
            if (geoJsonLayer) map.removeLayer(geoJsonLayer);

            geoJsonLayer = L.geoJSON(geoJsonBordersData, {
                interactive: false, 
                style: function (feature) {
                    let propName = feature.properties.Name || feature.properties.name || feature.properties.ten_tinh || "";
                    let normalized = propName.replace(/Thành phố /i, 'TP. ').replace(/Tỉnh /i, '').trim().toLowerCase();
                    let isActive = activeRegionsTracker.has(normalized);

                    if (isActive) {
                        return {
                            color: currentAppColors.secondary,
                            weight: 2,
                            opacity: 0.9,
                            fillColor: currentAppColors.secondary,
                            fillOpacity: 0.1,
                            className: 'neon-province-active'
                        };
                    } else {
                        return {
                            color: currentAppColors.primary,
                            weight: 1.5,
                            opacity: 0.4,
                            fillColor: 'transparent',
                            fillOpacity: 0,
                            className: 'neon-province-border'
                        };
                    }
                }
            }).addTo(map);

            geoJsonLayer.bringToBack(); 
        }

        function preloadStampsIntoCache(spots) {
            if (!window.caches) return;
            caches.open('neon-stamps-cache-v1').then(cache => {
                spots.forEach(spot => {
                    const cleanUrl = (spot.stampUrl || "").toString().trim();
                    if (cleanUrl.startsWith('http')) {
                        cache.match(cleanUrl).then(res => {
                            if (!res) {
                                fetch(cleanUrl, { mode: 'no-cors' }).then(networkRes => {
                                    cache.put(cleanUrl, networkRes);
                                }).catch(() => {});
                            }
                        });
                    }
                });
            });
        }

        function renderDataToMap(data) {
            regionalLayer.clearLayers();
            spotLayer.clearLayers();
            activeRegionsTracker.clear(); 
            globalSpotsData = []; 

            let spotCount = 0;
            
            if (data && data.regions) {
                data.regions.forEach(function(reg) {
                    addRegionalMarker(reg.name, reg.lat, reg.lng, reg.desc);
                });
            }
            
            if (data && data.spots) {
                globalSpotsData = data.spots; 
                data.spots.forEach(function(spot) {
                    addSpotMarker(spot.name, spot.lat, spot.lng, spot.date, spot.note, spot.stampUrl);
                    spotCount++;
                });
            }
            
            const uniqueRegionsCount = activeRegionsTracker.size;
            
            if (isPhotoView) {
                renderPhotoLayer();
            } else {
                updateLayerVisibility();
            }

            renderProvinceBorders();

            return { regCount: uniqueRegionsCount, spotCount };
        }

        // ==========================================
        // 3. TÍNH NĂNG CHUYỂN ĐỔI CHẾ ĐỘ ẢNH (PHOTO MODE)
        // ==========================================
        function togglePhotoView() {
            isPhotoView = !isPhotoView;
            const btn = document.getElementById('togglePhotoBtn');

            if (isPhotoView) {
                btn.classList.add('active');
                btn.innerHTML = '🔙 Tắt Ảnh';
                if (map.hasLayer(regionalLayer)) map.removeLayer(regionalLayer);
                if (map.hasLayer(spotLayer)) map.removeLayer(spotLayer);
                renderPhotoLayer(); 
                map.addLayer(photoLayer);
            } else {
                btn.classList.remove('active');
                btn.innerHTML = '📸 Ảnh';
                if (map.hasLayer(photoLayer)) map.removeLayer(photoLayer);
                updateLayerVisibility();
            }
        }

        function renderPhotoLayer() {
            photoLayer.clearLayers();
            globalSpotsData.forEach((spot, index) => {
                const markerId = `album-cover-${index}`;
                const badgeId = `album-badge-${index}`;
                
                const cleanStampUrl = (spot.stampUrl || "").toString().trim();
                const bgStyle = cleanStampUrl ? `background-image: url('${cleanStampUrl}');` : '';
                
                const photoIcon = L.divIcon({
                    className: 'custom-photo-icon',
                    html: `<div class="photo-album-marker" id="${markerId}" style="${bgStyle}"><div class="photo-album-badge" id="${badgeId}">⏳</div></div>`,
                    iconSize: [65, 65],
                    iconAnchor: [32, 32]
                });

                const marker = L.marker([spot.lat, spot.lng], { icon: photoIcon }).addTo(photoLayer);
                
                marker.on('click', () => {
                    const cleanFolderUrl = (spot.folderUrl || "").toString().trim();
                    if (cleanFolderUrl.startsWith('http')) {
                        openInAppGallery(spot.name, cleanFolderUrl); 
                    } else {
                        alert(`Chưa có Album cho [${spot.name}] hoặc đang đồng bộ!`);
                    }
                });

                const cleanFolderUrl = (spot.folderUrl || "").toString().trim();
                if (cleanFolderUrl.startsWith('http')) {
                    fetch(`${GAS_API_URL}?action=getPhotos&folderUrl=${encodeURIComponent(cleanFolderUrl)}`)
                        .then(res => res.json())
                        .then(data => {
                            const markerEl = document.getElementById(markerId);
                            const badgeEl = document.getElementById(badgeId);
                            if (data.images && data.images.length > 0) {
                                if (badgeEl) badgeEl.innerText = data.images.length; 
                                
                                if (markerEl && !cleanStampUrl) {
                                    const coverId = data.images[0]; 
                                    markerEl.style.backgroundImage = `url('https://drive.google.com/thumbnail?id=${coverId}&sz=w200')`;
                                }
                            } else {
                                if (badgeEl) badgeEl.innerText = "0"; 
                            }
                        })
                        .catch(() => {
                            const badgeEl = document.getElementById(badgeId);
                            if (badgeEl) badgeEl.innerText = "!";
                        });
                } else {
                    const badgeEl = document.getElementById(badgeId);

        function updateLightboxImage() {
            const imgId = currentAlbumImages[currentImageIndex];
            lightboxImg.src = `https://drive.google.com/thumbnail?id=${imgId}&sz=s0`;

        }

        function closeLightbox(event) {
            if(event) event.stopPropagation();
            lightboxOverlay.classList.remove('active');
            lightboxImg.src = '';
            resetZoom();
        }

        function nextImage(event) {
            if(event) event.stopPropagation();
            if (currentAlbumImages.length <= 1) return;
            currentImageIndex = (currentImageIndex + 1) % currentAlbumImages.length;
            updateLightboxImage();
        }

        function prevImage(event) {
            if(event) event.stopPropagation();
            if (currentAlbumImages.length <= 1) return;
            currentImageIndex = (currentImageIndex - 1 + currentAlbumImages.length) % currentAlbumImages.length;
            updateLightboxImage();
        }

        function resetZoom() {
            currentScale = 1;
            currentTranslateX = 0;
            currentTranslateY = 0;
            applyTransform();
        }

        function applyTransform() {
            lightboxImg.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${currentScale})`;
        }

        lightboxContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX - currentTranslateX;
                touchStartY = e.touches[0].clientY - currentTranslateY;
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTapTime;
                if (tapLength < 300 && tapLength > 0) {
                    if (currentScale === 1) {
                        currentScale = 2.5; 
                    } else {
                        currentScale = 1; 
                        currentTranslateX = 0;
                        currentTranslateY = 0;
                    }
                    applyTransform();
                    e.preventDefault();
                }
                lastTapTime = currentTime;
            }
        });

        lightboxContainer.addEventListener('touchmove', (e) => {
            if (currentScale > 1 && e.touches.length === 1) {
                currentTranslateX = e.touches[0].clientX - touchStartX;
                currentTranslateY = e.touches[0].clientY - touchStartY;
                applyTransform();
                e.preventDefault(); 
            }
        });

        lightboxContainer.addEventListener('touchend', (e) => {
            if (currentScale === 1 && e.changedTouches.length === 1) {
                let touchEndX = e.changedTouches[0].clientX;
                let diffX = touchEndX - touchStartX; 
                if (diffX < -50) {
                    nextImage(); 
                } else if (diffX > 50) {
                    prevImage(); 
                }
            }
        });

        function loadDataFromGoogleSheets() {
            const cachedDataStr = localStorage.getItem(LOCAL_STORAGE_KEY);
            let hasCache = false;

            if (cachedDataStr) {
                try {
                    const cachedData = JSON.parse(cachedDataStr);
                    renderDataToMap(cachedData);
                    hideLoadingScreen(); 
                    hasCache = true;
                    showToast('🔄 Đang kiểm tra dữ liệu mới ngầm...', 2000); 
                    if (cachedData.spots) preloadStampsIntoCache(cachedData.spots); 
                } catch(e) {
                    console.error("Lỗi đọc cache:", e);
                }
            }

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 12000); 

            fetch(`${GAS_API_URL}?action=get`, { redirect: "follow", signal: controller.signal })
                .then(res => {
                    clearTimeout(timeoutId);
                    if (!res.ok) throw new Error("Máy chủ Google phản hồi chậm");
                    return res.json();
                })
                .then(data => {
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(data));
                    renderDataToMap(data);
                    if (!hasCache) hideLoadingScreen(); 
                    showToast(`✅ Đã cập nhật mới nhất!`, 3000);
                    if (data.spots) preloadStampsIntoCache(data.spots); 
                })
                .catch(() => {
                    clearTimeout(timeoutId);
                    if (!hasCache) {
                        hideLoadingScreen();
                        showToast(`⚠️ Không có mạng. Vui lòng kiểm tra kết nối!`, 5000);
                    } else {
                        console.log("Đồng bộ ngầm thất bại. Tiếp tục dùng Cache mượt mà.");
                    }
                });
        }

        function findNearestProvinceOffline(lat, lng) {
            let minDistance = Infinity;
            let nearestName = "Khu vực Việt Nam";
            VN_PROVINCES.forEach(prov => {
                const dLat = lat - prov.lat;
                const dLng = lng - prov.lng;
                const distance = Math.sqrt(dLat * dLat + dLng * dLng);
                if (distance < minDistance) {
                    minDistance = distance;
                    nearestName = prov.name;
                }
            });
            return nearestName;
        }

        // ==========================================
        // THUẬT TOÁN VẼ TEM THƯ IN KHẮC KẼM
        // ==========================================
        function drawNeonStamp(placeName, regionName, dateStr) {
            const canvas = document.getElementById('stampCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;  
            const h = canvas.height; 

            const inkColor = currentStampColor.hex;   
            const paperColor = '#f4f0e6'; 

            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = paperColor;
            ctx.fillRect(10, 10, w - 20, h - 20);

            ctx.save();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = '#000000';
            const radius = 6;
            const step = 20;
            for (let x = 10; x <= w - 10; x += step) {
                ctx.beginPath(); ctx.arc(x, 10, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(x, h - 10, radius, 0, Math.PI * 2); ctx.fill();
            }
            for (let y = 10; y <= h - 10; y += step) {
                ctx.beginPath(); ctx.arc(10, y, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(w - 10, y, radius, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();

            ctx.strokeStyle = inkColor;
            ctx.lineWidth = 1;
            ctx.strokeRect(22, 22, w - 44, h - 44);
            ctx.lineWidth = 3;
            ctx.strokeRect(26, 26, w - 52, h - 52);

            ctx.fillStyle = inkColor;
            ctx.font = 'bold 16px "Times New Roman", Times, serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('.. CHECK-IN ..', w / 2, 42);
            
            ctx.font = 'bold 14px "Times New Roman", Times, serif';
            let topRegion = (regionName || 'VIETNAM').toUpperCase();
            if (topRegion.length > 18) topRegion = topRegion.substring(0, 18) + '..';
            ctx.fillText(topRegion + ' ' + (new Date().getFullYear()), w / 2, 60);

            const imgX = 32, imgY = 74, imgW = w - 64, imgH = h - 168;

            if (userCapturedImg) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = imgW;
                tempCanvas.height = imgH;
                const tCtx = tempCanvas.getContext('2d');

                const imgRatio = userCapturedImg.width / userCapturedImg.height;
                const boxRatio = imgW / imgH;
                let drawW, drawH, drawX, drawY;
                if (imgRatio > boxRatio) {
                    drawH = imgH; drawW = imgH * imgRatio;
                    drawX = - (drawW - imgW) / 2; drawY = 0;
                } else {
                    drawW = imgW; drawH = imgW / imgRatio;
                    drawX = 0; drawY = - (drawH - imgH) / 2;
                }
                tCtx.drawImage(userCapturedImg, drawX, drawY, drawW, drawH);

                const imgData = tCtx.getImageData(0, 0, imgW, imgH);
                const data = imgData.data;
                
                const iR = currentStampColor.r, iG = currentStampColor.g, iB = currentStampColor.b;
                const pR = 244, pG = 240, pB = 230;

                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i], g = data[i+1], b = data[i+2];
                    let gray = 0.299 * r + 0.587 * g + 0.114 * b;

                    let px = (i / 4) % imgW;
                    let py = Math.floor((i / 4) / imgW);
                    let linePattern = (Math.sin(px * 1.5) + Math.sin(py * 1.5)) * 15;
                    let noise = (Math.random() - 0.5) * 40 + linePattern;
                    
                    gray += noise;

                    let blend;
                    if (gray < 110) blend = 0;      
                    else if (gray < 170) blend = 0.4; 
                    else blend = 1;                 

                    data[i]   = iR + (pR - iR) * blend;
                    data[i+1] = iG + (pG - iG) * blend;
                    data[i+2] = iB + (pB - iB) * blend;
                }
                tCtx.putImageData(imgData, 0, 0);
                ctx.drawImage(tempCanvas, imgX, imgY);
            } else {
                ctx.fillStyle = paperColor;
                ctx.fillRect(imgX, imgY, imgW, imgH);
                ctx.strokeStyle = inkColor;
                ctx.lineWidth = 1;
                
                for(let r = 2; r < 40; r += 4) {
                    ctx.beginPath();
                    ctx.arc(imgX + imgW/2, imgY + imgH/2, r, 0, Math.PI, true);
                    ctx.stroke();
                }
                for(let y = imgY + imgH/2 + 10; y < imgY + imgH; y += 8) {
                    ctx.beginPath();
                    ctx.moveTo(imgX, y);
                    for(let x = imgX; x < imgX + imgW; x += 10) {
                        ctx.lineTo(x + 5, y - 3);
                        ctx.lineTo(x + 10, y);
                    }
                    ctx.stroke();
                }
                ctx.strokeRect(imgX, imgY, imgW, imgH);
            }

            ctx.strokeStyle = inkColor;
            ctx.lineWidth = 2;
            ctx.strokeRect(imgX, imgY, imgW, imgH);
            
            ctx.fillStyle = paperColor;
            ctx.fillRect(w - 70, h - 86, 38, 38);
            ctx.strokeStyle = inkColor;
            ctx.lineWidth = 1;
            ctx.strokeRect(w - 70, h - 86, 38, 38);
            
            ctx.fillStyle = inkColor;
            ctx.font = 'bold 22px "Times New Roman", Times, serif';
            ctx.fillText('10', w - 51, h - 70); 
            ctx.font = '10px "Times New Roman", Times, serif';
            ctx.fillText('XU', w - 51, h - 54);

            ctx.textAlign = 'left';
            ctx.font = 'bold 20px "Times New Roman", Times, serif';
            ctx.fillText('POSTES', 32, h - 74);

            let nameText = (placeName || 'ĐIỂM CHECK-IN').toUpperCase();
            if (nameText.length <= 15) {
                ctx.font = 'bold 18px "Times New Roman", Times, serif';
                ctx.fillText(nameText, 32, h - 55);
            } else {
                ctx.font = 'bold 12px "Times New Roman", Times, serif';
                ctx.fillText(nameText.substring(0, 20), 32, h - 55);
            }

            ctx.beginPath();
            ctx.moveTo(32, h - 38);
            ctx.lineTo(w - 32, h - 38);
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.font = '9px Arial';
            ctx.fillText('MỘC BẢN', 32, h - 30);
            ctx.textAlign = 'right';
            ctx.fillText(dateStr || '09/07/2026', w - 32, h - 30);
        }

                name: name,
                lat: currentClickLat,
                lng: currentClickLng,
                date: todayStr,
                note: note,
                folderUrl: "",
                stampUrl: stampBase64 
            };
            
            globalSpotsData.push(tempSpot);
            const newMarker = addSpotMarker(name, currentClickLat, currentClickLng, todayStr, note, stampBase64);
            
            closeModal(); 
            if (isPhotoView) {
                renderPhotoLayer();
            } else {
                updateLayerVisibility();
                newMarker.openPopup();
            }

            fetch(GAS_API_URL, {
                method: "POST",
                redirect: "follow", 
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    regionName: regionName,
                    placeName: name,
                    lat: currentClickLat,
                    lng: currentClickLng,
                    date: todayStr,
                    note: note,
                    stampData: stampBase64 
                })
            })
            .then(res => res.text())
            .then(text => {
                try {
                    const respData = JSON.parse(text);
                    btnSubmit.innerHTML = oldText; 
                    btnSubmit.disabled = false;
                    if (respData.success) {
                        showToast(`⚡ Đã lưu "${name}" thành công!`);
                        tempSpot.folderUrl = respData.url; 
                        if (respData.stampUrl) tempSpot.stampUrl = respData.stampUrl;
                        if (isPhotoView) renderPhotoLayer();
                        fetch(`${GAS_API_URL}?action=get`, { redirect: "follow" })
                            .then(r => r.json())
                            .then(newData => {
                                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(newData));
                                if (newData.spots) preloadStampsIntoCache(newData.spots); 
                            });
                    } else {
                        throw new Error(respData.error || "Lỗi lưu từ máy chủ");
                    }
                } catch(e) {
                    throw new Error("Phản hồi bị lỗi định dạng: " + e.message);
                }
            })
            .catch(() => { 
                showToast(`⏳ Máy chủ phản hồi chậm. Đang kiểm tra chéo...`, 3000);
                setTimeout(() => {
                    fetch(`${GAS_API_URL}?action=get`, { redirect: "follow" })
                        .then(r => r.json())
                        .then(newData => {
                            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(newData));
                            const savedSpot = newData.spots.find(s => s.name === name && Math.abs(s.lat - currentClickLat) < 0.0001);
                            if (savedSpot && savedSpot.folderUrl) {
                                tempSpot.folderUrl = savedSpot.folderUrl; 
                                if (savedSpot.stampUrl) tempSpot.stampUrl = savedSpot.stampUrl;
                                if (isPhotoView) renderPhotoLayer();
                                showToast(`✅ Đã đồng bộ thành công "${name}" cùng tem thư!`, 3000);
                            } else {
                                alert("Lỗi thực sự: Không thể tạo thư mục. Vui lòng kiểm tra lại quyền Drive!");
                            }
                            btnSubmit.innerHTML = oldText; 
                            btnSubmit.disabled = false; 
                        })
                        .catch(() => {
                            btnSubmit.innerHTML = oldText; 
                            btnSubmit.disabled = false; 
                        });
                }, 2500);
            });
        }

        document.addEventListener('keydown', e => { 
            if (!modal.classList.contains('active')) return; 
            if (e.key === 'Escape') closeModal(); 
            if (e.key === 'Enter') {
                if (document.getElementById('step1Inputs').style.display !== 'none') {
                    goToStep2(); 
                } else {
                    submitCheckIn(); 
                }
            }
        });
        
        function forceMapRender() { 
            map.invalidateSize(); 
            if (!isPhotoView) updateLayerVisibility(); 
        }
        
        window.addEventListener('load', () => { 
            setTimeout(() => {
                const loader = document.getElementById('loadingOverlay');
                if (loader && loader.style.opacity !== '0') {
                    hideLoadingScreen();
                    showToast("⚠️ Mạng chậm, đã tự động chuyển sang chế độ Nhanh (Offline)!", 4000);
                }
            }, 7000);
            
            setTimeout(forceMapRender, 100); 
            setTimeout(forceMapRender, 500);
            
            loadProvinceBorders();
            loadDataFromGoogleSheets(); 
        });
    </script>
</body>
</html>
