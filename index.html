<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#03050a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Vietnam Neon Check-in Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* =========================================
           Hل»† THل»گNG Lأ•I Mأ€U NEON THEO NGأ€Y
        ========================================= */
        :root {
            --neon-primary: #00f3ff;
            --neon-primary-rgb: 0, 243, 255;
            --neon-secondary: #ff007f;
            --neon-secondary-rgb: 255, 0, 127;
        }

        /* =========================================
           RESET & BASIC SETUP
        ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh; 
            background-color: #03050a;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }

        #map {
            width: 100%;
            height: 100%;
            height: 100dvh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: #03050a;
        }

        .leaflet-control-attribution {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
        }

        /* =========================================
          NأڑT ؤگIل»€U KHIل»‚N (BUTTONS)
        ========================================= */
        .location-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom)); 
            right: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(var(--neon-primary-rgb), 0.2));
            color: var(--neon-primary);
            border: 1.5px solid var(--neon-primary);
            padding: 12px 18px; 
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(var(--neon-primary-rgb), 0.4), inset 0 0 8px rgba(var(--neon-primary-rgb), 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .location-btn:hover {
            background: var(--neon-primary);
            color: #000;
            box-shadow: 0 0 25px var(--neon-primary);
            transform: scale(1.05);
        }

        .photo-btn {
            position: absolute;
            bottom: max(30px, env(safe-area-inset-bottom)); 
            left: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(189, 0, 255, 0.2));
            color: #bd00ff; 
            border: 1.5px solid #bd00ff;
            padding: 12px 18px; 
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(189, 0, 255, 0.4), inset 0 0 8px rgba(189, 0, 255, 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .photo-btn:hover, .photo-btn.active {
            background: #bd00ff;
            color: #fff;
            box-shadow: 0 0 25px #bd00ff;
            transform: scale(1.05);
        }

        .install-btn {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, rgba(6, 10, 25, 0.9), rgba(var(--neon-secondary-rgb), 0.2));
            color: var(--neon-secondary);
            border: 1.5px solid var(--neon-secondary);
            padding: 10px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(var(--neon-secondary-rgb), 0.4), inset 0 0 8px rgba(var(--neon-secondary-rgb), 0.2);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: none; 
            align-items: center;
            gap: 6px;
        }

        .install-btn:hover {
            background: var(--neon-secondary);
            color: #fff;
            box-shadow: 0 0 25px var(--neon-secondary);
            transform: scale(1.05);
        }

        /* =========================================
           CأپC THأ”NG BأپO Vأ€ LOADING
        ========================================= */
        #syncToast {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 20px;
            z-index: 1000;
            background: rgba(8, 12, 28, 0.9);
            border: 1px solid var(--neon-primary);
            color: var(--neon-primary);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(var(--neon-primary-rgb), 0.4);
            backdrop-filter: blur(5px);
            transition: opacity 0.5s ease;
            opacity: 0; 
            pointer-events: none;
        }

        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #03050a;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease;
        }

        .loading-text {
            color: var(--neon-primary);
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 15px var(--neon-primary);
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(var(--neon-primary-rgb), 0.2);
            border-top: 4px solid var(--neon-secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px var(--neon-secondary);
        }

        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }

        /* =========================================
           HIل»†U ل»¨NG ؤگئ¯ل»œNG VIل»€N RANH GIل»ڑI NEON
        ========================================= */
        path.neon-province-border {
            filter: drop-shadow(0 0 3px rgba(var(--neon-primary-rgb), 0.5));
            transition: fill-opacity 0.5s ease, filter 0.5s ease, opacity 0.3s ease;
        }
        
        path.neon-province-active {
            filter: drop-shadow(0 0 6px var(--neon-secondary)) drop-shadow(0 0 12px var(--neon-secondary));
            transition: fill-opacity 0.5s ease, filter 0.5s ease, opacity 0.3s ease;
        }

        /* =========================================
           THIل؛¾T Kل؛¾ MARKERS TRأٹN Bل؛¢N ؤگل»’
        ========================================= */
        .neon-marker-container {
            position: relative;
            width: 28px;
            height: 28px;
            display: flex;
            justify-content: center;
            transition: opacity 0.4s ease, transform 0.3s ease;
        }

        .neon-dot {
            width: 18px;
            height: 18px;
            background: var(--neon-secondary);
            border-radius: 50%;
            border: 2px solid #ffffff;
            position: absolute;
            top: 5px;
            box-shadow: 0 0 15px var(--neon-secondary), 0 0 25px var(--neon-secondary), 0 0 35px var(--neon-secondary);
            z-index: 2;
            cursor: pointer;
        }

        .neon-pulse {
            width: 28px;
            height: 28px;
            background: rgba(var(--neon-secondary-rgb), 0.7);
            border-radius: 50%;
            position: absolute;
            top: 0;
            animation: ripple 1.8s infinite ease-out;
            z-index: 1;
        }

        .neon-label {
            position: absolute;
            top: -22px;
            color: var(--neon-primary);
            font-weight: 800;
            font-size: 0.8rem;
            text-shadow: 0 0 5px var(--neon-primary), 0 0 10px #000;
            white-space: nowrap;
            letter-spacing: 0.5px;
            pointer-events: none;
            background: rgba(5, 8, 20, 0.7);
            padding: 2px 6px;
            border-radius: 10px;
            border: 1px solid rgba(var(--neon-primary-rgb), 0.4);
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        .red-flag-marker {
            font-size: 24px;
            filter: drop-shadow(0 0 8px #ff0000) drop-shadow(0 0 15px #ff0000);
            transition: transform 0.2s;
            cursor: pointer;
        }

        .red-flag-marker:hover {
            transform: scale(1.3) translateY(-3px);
        }

        .gps-dot {
            width: 16px;
            height: 16px;
            background: var(--neon-primary);
            border-radius: 50%;
            border: 2px solid #fff;
            position: absolute;
            top: 6px;
            left: 6px;
            box-shadow: 0 0 15px var(--neon-primary), 0 0 30px var(--neon-primary);
            z-index: 2;
        }

        .gps-pulse {
            width: 28px;
            height: 28px;
            background: rgba(var(--neon-primary-rgb), 0.6);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            animation: ripple 1.5s infinite ease-out;
            z-index: 1;
        }

        .photo-album-marker {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6), 0 0 15px rgba(189, 0, 255, 0.5);
            background: linear-gradient(45deg, #101026, #2a2a72);
            background-size: cover;
            background-position: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .photo-album-marker:hover {
            transform: scale(1.15);
            z-index: 2000 !important;
        }

        .photo-album-badge {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 6px;
            backdrop-filter: blur(3px);
        }

        /* =========================================
           POPUP TRأٹN Bل؛¢N ؤگل»’
        ========================================= */
        .leaflet-popup-content-wrapper {
            background: rgba(8, 12, 28, 0.95) !important;
            color: #fff !important;
            border: 1px solid var(--neon-primary);
            box-shadow: 0 0 20px rgba(var(--neon-primary-rgb), 0.5);
            border-radius: 12px !important;
            backdrop-filter: blur(8px);
            padding: 5px;
        }

        .leaflet-popup-tip {
            background: rgba(8, 12, 28, 0.95) !important;
            border-bottom: 1px solid var(--neon-primary);
            border-right: 1px solid var(--neon-primary);
        }

        .popup-title {
            color: var(--neon-primary);
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 8px;
            text-shadow: 0 0 8px rgba(var(--neon-primary-rgb), 0.6);
            border-bottom: 1px dashed rgba(var(--neon-primary-rgb), 0.3);
            padding-bottom: 5px;
        }

        .popup-info {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #d1d5db;
        }

        .popup-info b {
            color: var(--neon-secondary);
        }

        .btn-gps-checkin {
            margin-top: 8px;
            width: 100%;
            padding: 8px;
            background: linear-gradient(90deg, var(--neon-secondary), #ff00ff);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(var(--neon-secondary-rgb), 0.5);
            transition: all 0.2s;
        }

        .btn-gps-checkin:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(var(--neon-secondary-rgb), 0.8);
        }

        /* =========================================
           THئ¯ VIل»†N ل؛¢NH IN-APP MASONRY GIAO DIل»†N
        ========================================= */
        .gallery-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background-color: #03050a;
            z-index: 20000;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .gallery-container.active {
            transform: translateY(0);
        }
        
        .gallery-header {
            padding: max(20px, env(safe-area-inset-top)) 20px 15px 20px;
            background: linear-gradient(180deg, rgba(3,5,10,1) 0%, rgba(3,5,10,0.8) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(var(--neon-primary-rgb), 0.2);
        }

        .gallery-title {
            color: var(--neon-primary);
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(var(--neon-primary-rgb), 0.6);
        }

        .close-gallery-btn {
            background: rgba(var(--neon-secondary-rgb), 0.2);
            color: var(--neon-secondary);
            border: 1px solid var(--neon-secondary);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .gallery-grid {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            column-count: 4;
            column-gap: 12px;
        }

        @media (max-width: 1024px) {
            .gallery-grid { column-count: 3; }
        }

        @media (max-width: 768px) {
            .gallery-grid { 
                column-count: 2; 
                column-gap: 8px; 
                padding: 8px; 
            }
        }

        .gallery-item {
            width: 100%;
            height: auto;
            margin-bottom: 12px;
            border-radius: 8px;
            background: #111;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            transition: opacity 0.2s, transform 0.2s;
            break-inside: avoid;
            display: block;
        }

        @media (max-width: 768px) {
            .gallery-item { margin-bottom: 8px; }
        }

        .gallery-item:active {
            opacity: 0.6;
        }

        .gallery-item:hover {
            transform: scale(1.02);
        }
        
        .empty-gallery {
            text-align: center;
            color: #64748b;
            margin-top: 50px;
            width: 100%;
            column-span: all;
        }
        
        /* GIAO DIل»†N LIGHTBOX (XEM ل؛¢NH FULL SCREEN) */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 25000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-close {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            backdrop-filter: blur(5px);
            z-index: 25002;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            z-index: 25001;
            transition: background 0.3s;
        }

        .lightbox-nav:hover {
            background: rgba(255,255,255,0.3);
        }

        .lightbox-prev { left: 15px; }
        .lightbox-next { right: 15px; }

        .lightbox-img-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.2s ease-out; 
            transform-origin: center center;
            touch-action: none; 
        }

        @media (max-width: 768px) {
            .lightbox-nav { display: none; }
        }

        /* =========================================
           Hل»کP THOل؛ I NHل؛¬P LIل»†U (SMART 2-STEP MODAL)
        ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: linear-gradient(135deg, rgba(10, 16, 38, 0.95), rgba(5, 8, 20, 0.98));
            width: 90%;
            max-width: 420px;
            padding: 22px;
            border-radius: 16px;
            border: 2px solid var(--neon-primary);
            box-shadow: 0 0 25px rgba(var(--neon-primary-rgb), 0.4), inset 0 0 15px rgba(var(--neon-primary-rgb), 0.2);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
            max-height: 92vh;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--neon-primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 0 0 10px rgba(var(--neon-primary-rgb), 0.6);
            flex-shrink: 0;
        }

        .auto-region-badge {
            background: rgba(var(--neon-primary-rgb), 0.08);
            border: 1px dashed rgba(var(--neon-primary-rgb), 0.5);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #a5b4fc;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .auto-region-badge span {
            color: var(--neon-primary);
            font-weight: bold;
            text-shadow: 0 0 5px rgba(var(--neon-primary-rgb), 0.5);
        }

        .step-container {
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #a5b4fc;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #3b82f6;
            border-radius: 8px;
            padding: 10px 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: var(--neon-secondary);
            box-shadow: 0 0 10px rgba(var(--neon-secondary-rgb), 0.5);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .btn-cancel {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #475569;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-submit {
            background: linear-gradient(90deg, var(--neon-primary), #0077ff);
            color: #000;
            box-shadow: 0 0 15px rgba(var(--neon-primary-rgb), 0.5);
        }

        .btn-submit:hover {
            background: linear-gradient(90deg, var(--neon-secondary), #ff00ff);
            color: #fff;
            box-shadow: 0 0 20px rgba(var(--neon-secondary-rgb), 0.8);
        }

        .stamp-preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 5px 0;
            background: rgba(0, 0, 0, 0.55);
            padding: 12px;
            border-radius: 12px;
            border: 1px dashed rgba(var(--neon-secondary-rgb), 0.5);
            box-shadow: inset 0 0 10px rgba(var(--neon-secondary-rgb), 0.1);
        }
        
        .stamp-preview-title {
            font-size: 0.78rem;
            color: var(--neon-secondary);
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(var(--neon-secondary-rgb), 0.5);
        }

        #stampCanvas {
            width: 240px;
            height: 315px; 
            border-radius: 4px;
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.2);
            background: transparent;
        }

        /* =========================================
           HIل»†U ل»¨NG Vأ™NG ؤگل»ٹA Lأ‌ KHI ZOOM XA
        ========================================= */
        .hide-neon-labels .neon-label {
            opacity: 0;
            visibility: hidden;
        }

        .hide-neon-labels .neon-marker-container {
            transform: scale(0.65);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.3s ease, opacity 0.4s ease;
        }

        .neon-marker-container {
            transition: opacity 0.4s ease, transform 0.3s ease;
        }

        .neon-label {
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .region-label {
            font-weight: 900;
            font-size: 1rem;
            text-align: center;
            text-shadow: 0 0 10px #000, 0 0 15px currentColor;
            white-space: nowrap;

            return str;

        function getRegionForProvince(provinceName) {
            const rawName = provinceName.replace(/Thأ nh phل»‘ /i, 'TP. ').replace(/Tل»‰nh /i, '').trim();
            const normalizedMap = removeVietnameseTones(rawName); 
            
            return REGIONS_DATA.find(r => r.provinces.some(p => {
                const normalizedArray = removeVietnameseTones(p); 
                return normalizedMap.includes(normalizedArray);
            })) || null;
        }

        function getPolygonCentroid(feature) {
            try {
                let coords = feature.geometry.coordinates;
                let type = feature.geometry.type;
                let biggestRing = [];
                let maxArea = 0;

                function getRingArea(ring) {
                    let area = 0;
                    for (let i = 0, len = ring.length; i < len; i++) {
                        let j = (i + 1) % len;
                        area += ring[i][0] * ring[j][1] - ring[j][0] * ring[i][1];
                    }
                    return Math.abs(area / 2);
                }

                if (type === "Polygon") {
                    for (let ring of coords) {
                        let a = getRingArea(ring);
                        if (a > maxArea) { maxArea = a; biggestRing = ring; }
                    }
                } else if (type === "MultiPolygon") {
                    for (let poly of coords) {
                        for (let ring of poly) {
                            let a = getRingArea(ring);
                            if (a > maxArea) { maxArea = a; biggestRing = ring; }
                        }
                    }
                }

                if (!biggestRing || biggestRing.length === 0) return null;

                let twiceArea = 0, x = 0, y = 0, nPts = biggestRing.length;
                let p1, p2, f;
                for (let i = 0, j = nPts - 1; i < nPts; j = i++) {
                    p1 = biggestRing[i]; 
                    p2 = biggestRing[j];
                    f = p1[0] * p2[1] - p2[0] * p1[1];
                    twiceArea += f;
                    x += (p1[0] + p2[0]) * f;
                    y += (p1[1] + p2[1]) * f;
                }
                
                if (twiceArea === 0) return null;
                f = twiceArea * 3;
                return { lat: y / f, lng: x / f };
            } catch(e) {
                return null;
            }
        }

        function isPointInPolygon(point, vs) {
            var x = point[0], y = point[1];
            var inside = false;
            for (var i = 0, j = vs.length - 1; i < vs.length; j = i++) {
                var xi = vs[i][0], yi = vs[i][1];
                var xj = vs[j][0], yj = vs[j][1];
                var intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function isDistrictVisited(feature) {
            if (!feature.geometry || !feature.geometry.coordinates) return false;
            let type = feature.geometry.type;
            let coords = feature.geometry.coordinates;
            
            for (let i = 0; i < globalSpotsData.length; i++) {
                let pt = [globalSpotsData[i].lng, globalSpotsData[i].lat]; 
                let inside = false;
                
                if (type === "Polygon") {
                    inside = isPointInPolygon(pt, coords[0]);
                } else if (type === "MultiPolygon") {
                    for (let k = 0; k < coords.length; k++) {
                        if (isPointInPolygon(pt, coords[k][0])) { inside = true; break; }
                    }
                }
                if (inside) return true;
            }
            return false;
        }

        function getDistrictStyle(feature) {
            let normalizedActiveProv = activeProvinceName ? removeVietnameseTones(activeProvinceName) : "";
            
            if (!normalizedActiveProv || normalizedActiveProv === "") {

            }

            let belongToActiveProv = false;
            for (let key in feature.properties) {
                let val = String(feature.properties[key]);
                let normVal = removeVietnameseTones(val);
                if (normVal !== "" && (normVal === normalizedActiveProv || normVal.includes(normalizedActiveProv))) {
                    belongToActiveProv = true;
                    break;
                }
            }

            if (!belongToActiveProv) {
                return { stroke: false, fill: false, className: '' };
            }

            let isVisited = isDistrictVisited(feature);
            if (isVisited) {
                return { stroke: true, color: currentAppColors.secondary, weight: 2, opacity: 0.9, fill: true, fillColor: currentAppColors.secondary, fillOpacity: 0.25, className: 'neon-province-active' };

            districtLabelLayer.clearLayers();

            geoJsonDistrictsData.features.forEach(feature => {
                let belongToActiveProv = false;
                for (let key in feature.properties) {

                    let normVal = removeVietnameseTones(val);
                    if (normVal !== "" && (normVal === normalizedActiveProv || normVal.includes(normalizedActiveProv))) {
                        belongToActiveProv = true;
                        break;
                    }
                }
                
                if (belongToActiveProv) {
                    let bestVietnameseName = "";
                    let backupName = "";
                    
                    for (let key in feature.properties) {
                        let lowerKey = key.toLowerCase();
                        let val = String(feature.properties[key]).trim();
                        let lowerVal = val.toLowerCase();
                        
                        // 1. KHأ“A CHل؛¶T PHل؛ M VI: CHل»ˆ lل؛¥y cأ،c cل»™t cأ³ khل؛£ nؤƒng lأ  Tأھn Huyل»‡n
                        if (!lowerKey.includes('huyen') && !lowerKey.includes('name_2') && lowerKey !== 'name' && lowerKey !== 'varname_2' && lowerKey !== 'nl_name_2') continue;
                        
                        // 2. NGؤ‚N RأپC: Bل»ڈ qua giأ، trل»‹ quأ، ngل؛¯n hoل؛·c chل»‰ chل»©a tل»« khأ³a hأ nh chأ­nh chung chung
                        if (!val || val.length < 2) continue;
                        if (lowerVal === 'huyل»‡n' || lowerVal === 'thل»‹ xأ£' || lowerVal === 'thأ nh phل»‘' || lowerVal === 'quل؛­n') continue;
                        
                        // 3. TأŒM CHل»® Cأ“ Dل؛¤U
                        if (/[أ أ،ل؛،ل؛£أ£أ¢ل؛§ل؛¥ل؛­ل؛©ل؛«ؤƒل؛±ل؛¯ل؛·ل؛³ل؛µأ¨أ©ل؛¹ل؛»ل؛½أھل»پل؛؟ل»‡ل»ƒل»…أ¬أ­ل»‹ل»‰ؤ©أ²أ³ل»چل»ڈأµأ´ل»“ل»‘ل»™ل»•ل»—ئ،ل»‌ل»›ل»£ل»ںل»،أ¹أ؛ل»¥ل»§إ©ئ°ل»«ل»©ل»±ل»­ل»¯ل»³أ½ل»µل»·ل»¹ؤ‘]/i.test(val)) {
                            if (!bestVietnameseName || val.length < bestVietnameseName.length) {
                                bestVietnameseName = val;
                            }
                        } else {
                            if (!backupName) {
                                backupName = val;
                            }
                        }
                    }

                    // 4. CHل»گT TأٹN (ئ¯u tiأھn cأ³ dل؛¥u)
                    let rawName = bestVietnameseName || backupName || feature.properties.NAME_2 || "";
                    
                    // 5. Gل»ŒT Sل؛ CH TIل»€N Tل»گ/Hل؛¬U Tل»گ
                    let name = rawName.replace(/(?:Huyل»‡n|Thل»‹ xأ£|Thأ nh phل»‘|Quل؛­n|District|City|Town)\s*/ig, '').trim(); 
                    
                    let isVisited = isDistrictVisited(feature);
                    let centroid = getPolygonCentroid(feature);
                    
                    if (centroid && name !== "") {
                        let htmlContent = '';

                        L.marker([centroid.lat, centroid.lng], { icon: icon }).addTo(districtLabelLayer);

        function resetZoom() {

        function applyTransform() {
            lightboxImg.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${currentScale})`;
        }

        lightboxContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX - currentTranslateX;
                touchStartY = e.touches[0].clientY - currentTranslateY;
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTapTime;
                if (tapLength < 300 && tapLength > 0) {
                    if (currentScale === 1) {
                        currentScale = 2.5; 
                    } else {
                        currentScale = 1; 
                        currentTranslateX = 0;
                        currentTranslateY = 0;
                    }
                    applyTransform();
                    e.preventDefault();
                }
                lastTapTime = currentTime;
            }
        });

        lightboxContainer.addEventListener('touchmove', (e) => {
            if (currentScale > 1 && e.touches.length === 1) {
                currentTranslateX = e.touches[0].clientX - touchStartX;
                currentTranslateY = e.touches[0].clientY - touchStartY;
                applyTransform();
                e.preventDefault(); 
            }
        });

        lightboxContainer.addEventListener('touchend', (e) => {
            if (currentScale === 1 && e.changedTouches.length === 1) {
                let touchEndX = e.changedTouches[0].clientX;
                let diffX = touchEndX - touchStartX; 
                if (diffX < -50) {
                    nextImage(); 
                } else if (diffX > 50) {
                    prevImage(); 
                }
            }
        });

        function loadDataFromGoogleSheets() {

            if (cachedDataStr) {

                    renderDataToMap(cachedData);

                    showToast('ًں”„ ؤگang kiل»ƒm tra dل»¯ liل»‡u mل»›i ngل؛§m...', 2000);

                } catch(e) {

                }

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 12000); 

            fetch(`${GAS_API_URL}?action=get`, { redirect: "follow", signal: controller.signal })
                .then(res => {
                    clearTimeout(timeoutId);
                    if (!res.ok) throw new Error("Mأ،y chل»§ Google phل؛£n hل»“i chل؛­m");
                    return res.json();
                })
                .then(data => {
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(data));
                    renderDataToMap(data);
                    if (!hasCache) hideLoadingScreen(); 
                    showToast(`âœ… ؤگأ£ cل؛­p nhل؛­t mل»›i nhل؛¥t!`, 3000);

        }

        const ZOOM_THRESHOLD = 10.5;
        
        function updateLayerVisibility() {
            if (isPhotoView) return; 
            const currentZoom = map.getZoom();
            
            if (currentZoom >= 7.5 && currentZoom < 10.5) {
                const center = map.getCenter();
                let closestRegion = null;
                let minDist = Infinity;
                REGIONS_DATA.forEach(r => {
                    let dist = Math.pow(center.lat - r.center[0], 2) + Math.pow(center.lng - r.center[1], 2);
                    if (dist < minDist) { minDist = dist; closestRegion = r; }
                });
                if (closestRegion && minDist < 15) activeRegionId = closestRegion.id;
                else activeRegionId = null;
            } else {
                activeRegionId = null;
            }

            if (currentZoom >= 10.5) {
                let centerPt = [map.getCenter().lng, map.getCenter().lat];
                let foundProv = null;
                if (geoJsonBordersData) {
                    for (let f of geoJsonBordersData.features) {
                        let type = f.geometry.type;
                        let coords = f.geometry.coordinates;
                        let inside = false;
                        if (type === "Polygon") {
                            inside = isPointInPolygon(centerPt, coords[0]);
                        } else if (type === "MultiPolygon") {
                            for (let k = 0; k < coords.length; k++) {
                                if (isPointInPolygon(centerPt, coords[k][0])) { inside = true; break; }
                            }
                        }
                        if (inside) {
                            foundProv = String(f.properties.Name || f.properties.name || f.properties.ten_tinh || f.properties.NAME_1 || "").replace(/Thأ nh phل»‘ /i, 'TP. ').replace(/Tل»‰nh /i, '').trim();
                            break;
                        }
                    }
                }
                
                if (!foundProv) {
                    let minProvDist = Infinity;
                    VN_PROVINCES.forEach(p => {
                        let dist = Math.pow(map.getCenter().lat - p.lat, 2) + Math.pow(map.getCenter().lng - p.lng, 2);
                        if (dist < minProvDist) { minProvDist = dist; foundProv = p.name; }
                    });
                    if (foundProv) foundProv = foundProv.replace(/Thأ nh phل»‘ /i, 'TP. ').replace(/Tل»‰nh /i, '').trim();
                }
                activeProvinceName = foundProv;
            } else {
                activeProvinceName = null;
            }

            if (currentZoom < ZOOM_THRESHOLD) {
                if (!map.hasLayer(regionalLayer)) map.addLayer(regionalLayer);
                if (map.hasLayer(spotLayer)) map.removeLayer(spotLayer);
            } else {
                if (map.hasLayer(regionalLayer)) map.removeLayer(regionalLayer);
                if (!map.hasLayer(spotLayer)) map.addLayer(spotLayer);
            }

            const mapContainer = document.getElementById('map');
            
            if (currentZoom < 7.5) {
                mapContainer.classList.add('hide-neon-labels'); 
                if (!map.hasLayer(regionLabelLayer)) map.addLayer(regionLabelLayer); 
                
                if (geoJsonLayer && lastRenderedRegionId !== 'ZOOMED_OUT') {
                    geoJsonLayer.setStyle(getRegionStyle); 
                    lastRenderedRegionId = 'ZOOMED_OUT';
                }
                
                if (geoJsonDistrictsLayer && map.hasLayer(geoJsonDistrictsLayer)) map.removeLayer(geoJsonDistrictsLayer);
                if (map.hasLayer(districtLabelLayer)) map.removeLayer(districtLabelLayer);
                
            } else {
                mapContainer.classList.remove('hide-neon-labels'); 
                if (map.hasLayer(regionLabelLayer)) map.removeLayer(regionLabelLayer); 
                
                if (lastRenderedRegionId !== activeRegionId || lastActiveProvinceName !== activeProvinceName) {
                    if (geoJsonLayer) geoJsonLayer.setStyle(getProvinceStyle); 
                    if (geoJsonDistrictsLayer) geoJsonDistrictsLayer.setStyle(getDistrictStyle); 
                    renderDistrictLabels(); 
                    
                    lastRenderedRegionId = activeRegionId;
                    lastActiveProvinceName = activeProvinceName;
                }

                if (currentZoom >= 10.5) {
                    if (geoJsonDistrictsLayer && !map.hasLayer(geoJsonDistrictsLayer)) map.addLayer(geoJsonDistrictsLayer);
                    if (!map.hasLayer(districtLabelLayer)) map.addLayer(districtLabelLayer);
                } else {
                    if (geoJsonDistrictsLayer && map.hasLayer(geoJsonDistrictsLayer)) map.removeLayer(geoJsonDistrictsLayer);
                    if (map.hasLayer(districtLabelLayer)) map.removeLayer(districtLabelLayer);
                }
            }
        }

        function findNearestProvinceOffline(lat, lng) {
            let minDistance = Infinity;
            let nearestName = "Khu vل»±c Viل»‡t Nam";
            VN_PROVINCES.forEach(prov => {
                const dLat = lat - prov.lat;
                const dLng = lng - prov.lng;
                const distance = Math.sqrt(dLat * dLat + dLng * dLng);
                if (distance < minDistance) {
                    minDistance = distance;
                    nearestName = prov.name;
                }
            });
            return nearestName;
        }

        // ==========================================
        // THUل؛¬T TOأپN Vل؛¼ TEM THئ¯ IN KHل؛®C Kل؛¼M
        // ==========================================
        function drawNeonStamp(placeName, regionName, dateStr) {
            const canvas = document.getElementById('stampCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width;  
            const h = canvas.height; 

            const inkColor = currentStampColor.hex;   
            const paperColor = '#f4f0e6'; 

            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = paperColor;
            ctx.fillRect(10, 10, w - 20, h - 20);

            ctx.save();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = '#000000';
            const radius = 6;
            const step = 20;
            for (let x = 10; x <= w - 10; x += step) {
                ctx.beginPath(); ctx.arc(x, 10, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(x, h - 10, radius, 0, Math.PI * 2); ctx.fill();
            }
            for (let y = 10; y <= h - 10; y += step) {
                ctx.beginPath(); ctx.arc(10, y, radius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(w - 10, y, radius, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();

            ctx.strokeStyle = inkColor;
            ctx.lineWidth = 1;
            ctx.strokeRect(22, 22, w - 44, h - 44);
            ctx.lineWidth = 3;
            ctx.strokeRect(26, 26, w - 52, h - 52);

            ctx.fillStyle = inkColor;
            ctx.font = 'bold 16px "Times New Roman", Times, serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('.. CHECK-IN ..', w / 2, 42);
            
            ctx.font = 'bold 14px "Times New Roman", Times, serif';
            let topRegion = (regionName || 'VIETNAM').toUpperCase();
            if (topRegion.length > 18) topRegion = topRegion.substring(0, 18) + '..';
            ctx.fillText(topRegion + ' ' + (new Date().getFullYear()), w / 2, 60);

            const imgX = 32, imgY = 74, imgW = w - 64, imgH = h - 168;

            if (userCapturedImg) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = imgW;
                tempCanvas.height = imgH;
                const tCtx = tempCanvas.getContext('2d');

                const imgRatio = userCapturedImg.width / userCapturedImg.height;
                const boxRatio = imgW / imgH;
                let drawW, drawH, drawX, drawY;
                if (imgRatio > boxRatio) {
                    drawH = imgH; drawW = imgH * imgRatio;
                    drawX = - (drawW - imgW) / 2; drawY = 0;
                } else {
                    drawW = imgW; drawH = imgW / imgRatio;
                    drawX = 0; drawY = - (drawH - imgH) / 2;
                }
                tCtx.drawImage(userCapturedImg, drawX, drawY, drawW, drawH);

                const imgData = tCtx.getImageData(0, 0, imgW, imgH);
                const data = imgData.data;
                
                const iR = currentStampColor.r, iG = currentStampColor.g, iB = currentStampColor.b;
                const pR = 244, pG = 240, pB = 230;

                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i], g = data[i+1], b = data[i+2];
                    let gray = 0.299 * r + 0.587 * g + 0.114 * b;

                    let px = (i / 4) % imgW;
                    let py = Math.floor((i / 4) / imgW);
                    let linePattern = (Math.sin(px * 1.5) + Math.sin(py * 1.5)) * 15;
                    let noise = (Math.random() - 0.5) * 40 + linePattern;
                    
                    gray += noise;

                    let blend;
                    if (gray < 110) blend = 0;      
                    else if (gray < 170) blend = 0.4; 
                    else blend = 1;                 

                    data[i]   = iR + (pR - iR) * blend;
                    data[i+1] = iG + (pG - iG) * blend;
                    data[i+2] = iB + (pB - iB) * blend;
                }
                tCtx.putImageData(imgData, 0, 0);
                ctx.drawImage(tempCanvas, imgX, imgY);
            } else {
                ctx.fillStyle = paperColor;
                ctx.fillRect(imgX, imgY, imgW, imgH);
                ctx.strokeStyle = inkColor;
                ctx.lineWidth = 1;
                
                for(let r = 2; r < 40; r += 4) {
                    ctx.beginPath();
                    ctx.arc(imgX + imgW/2, imgY + imgH/2, r, 0, Math.PI, true);
                    ctx.stroke();
                }
                for(let y = imgY + imgH/2 + 10; y < imgY + imgH; y += 8) {
                    ctx.beginPath();
                    ctx.moveTo(imgX, y);
                    for(let x = imgX; x < imgX + imgW; x += 10) {
                        ctx.lineTo(x + 5, y - 3);
                        ctx.lineTo(x + 10, y);
                    }
                    ctx.stroke();
                }
                ctx.strokeRect(imgX, imgY, imgW, imgH);
            }

            ctx.strokeStyle = inkColor;
            ctx.lineWidth = 2;
            ctx.strokeRect(imgX, imgY, imgW, imgH);
            
            ctx.fillStyle = paperColor;
            ctx.fillRect(w - 70, h - 86, 38, 38);
            ctx.strokeStyle = inkColor;
            ctx.lineWidth = 1;
            ctx.strokeRect(w - 70, h - 86, 38, 38);
            
            ctx.fillStyle = inkColor;
            ctx.font = 'bold 22px "Times New Roman", Times, serif';
            ctx.fillText('10', w - 51, h - 70); 
            ctx.font = '10px "Times New Roman", Times, serif';
            ctx.fillText('XU', w - 51, h - 54);

            ctx.textAlign = 'left';
            ctx.font = 'bold 20px "Times New Roman", Times, serif';
            ctx.fillText('POSTES', 32, h - 74);

            let nameText = (placeName || 'ؤگIل»‚M CHECK-IN').toUpperCase();
            if (nameText.length <= 15) {
                ctx.font = 'bold 18px "Times New Roman", Times, serif';
                ctx.fillText(nameText, 32, h - 55);
            } else {
                ctx.font = 'bold 12px "Times New Roman", Times, serif';
                ctx.fillText(nameText.substring(0, 20), 32, h - 55);
            }

            ctx.beginPath();
            ctx.moveTo(32, h - 38);
            ctx.lineTo(w - 32, h - 38);
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.font = '9px Arial';
            ctx.fillText('Mل»کC Bل؛¢N', 32, h - 30);
            ctx.textAlign = 'right';
            ctx.fillText(dateStr || '09/07/2026', w - 32, h - 30);
        }

        function openCheckInModal() {
            placeNameInput.value = ''; 
            placeNoteInput.value = ''; 
            stampPhotoInput.value = ''; 
            userCapturedImg = null;    

            goToStep1();

            modal.classList.add('active'); 
            setTimeout(() => placeNameInput.focus(), 100);
            
            autoRegionText.innerHTML = '<span style="color:var(--neon-primary);">âڈ³ ؤگang quأ©t tل»چa ؤ‘ل»™...</span>'; 
            currentDetectedRegion = "Viل»‡t Nam";
            
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentClickLat}&lon=${currentClickLng}&zoom=10&addressdetails=1`, {
                headers: { 'Accept-Language': 'vi' }
            })
            .then(res => res.json())
            .then(data => {
                if (data && data.address) {
                    let p = data.address.state || data.address.province || data.address.city || null;
                    if (p) {
                        currentDetectedRegion = p.replace(/Thأ nh phل»‘ /i, 'TP. ').replace(/Tل»‰nh /i, '').trim();
                        autoRegionText.innerHTML = `ًں“چ ${currentDetectedRegion}`;
                        return; 
                    }
                }
                throw new Error("Khأ´ng cأ³ chi tiل؛؟t ؤ‘ل»‹a giل»›i");
            })
            .catch(() => {
                if (GAS_API_URL !== "") {
                    fetch(`${GAS_API_URL}?action=getProvince&lat=${currentClickLat}&lng=${currentClickLng}`, { redirect: "follow" })
                        .then(res => res.json())
                        .then(data => { 
                            if (data.province && data.province !== "Khu vل»±c mل»›i") {
                                currentDetectedRegion = data.province; 
                                autoRegionText.innerHTML = `ًں“چ ${currentDetectedRegion}`; 
                            } else {
                                throw new Error("Server GAS trل؛£ vل»پ rل»—ng");
                            }
                        })
                        .catch(() => { 
                            currentDetectedRegion = findNearestProvinceOffline(currentClickLat, currentClickLng);
                            autoRegionText.innerHTML = `ًں“چ ${currentDetectedRegion} (Offline)`;
                        });
                } else {
                    currentDetectedRegion = findNearestProvinceOffline(currentClickLat, currentClickLng);
                    autoRegionText.innerHTML = `ًں“چ ${currentDetectedRegion} (Offline)`;
                }
            });
        }

        map.on('click', e => {
            currentClickLat = e.latlng.lat;
            currentClickLng = e.latlng.lng;
            map.flyTo(e.latlng, Math.max(map.getZoom() + 2, 10), { duration: 1.2 });
        });

        function closeModal() {
            modal.classList.remove('active');
        }

        function submitCheckIn() {
            const name = placeNameInput.value.trim();
            const note = placeNoteInput.value.trim();
            if (!name) return alert("Vui lأ²ng ؤ‘iل»پn tأھn ؤ‘ل»‹a ؤ‘iل»ƒm!");
            
            const btnSubmit = document.getElementById('btnSubmitCheckIn');
            const oldText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = "âڈ³ ؤگang lئ°u Tem Bئ°u Chأ­nh..."; 
            btnSubmit.disabled = true;

            const regionName = currentDetectedRegion;
            addRegionalMarker(regionName, currentClickLat, currentClickLng, `Khu vل»±c tل؛،o tل»± ؤ‘ل»™ng! ًںڈ™ï¸ڈ`);
            
            const t = new Date();
            const todayStr = t.getDate().toString().padStart(2, '0') + '/' + (t.getMonth()+1).toString().padStart(2, '0') + '/' + t.getFullYear();
            
            const stampCanvasEl = document.getElementById('stampCanvas');
            const stampBase64 = stampCanvasEl ? stampCanvasEl.toDataURL('image/png') : "";

            const tempSpot = {
                region: regionName,
                name: name,
                lat: currentClickLat,
                lng: currentClickLng,
                date: todayStr,
                note: note,
                folderUrl: "",
                stampUrl: stampBase64 
            };
            
            globalSpotsData.push(tempSpot);
            const newMarker = addSpotMarker(name, currentClickLat, currentClickLng, todayStr, note, stampBase64);
            
            closeModal(); 
            if (isPhotoView) {
                renderPhotoLayer();
            } else {
                updateLayerVisibility();
                newMarker.openPopup();
            }

            fetch(GAS_API_URL, {
                method: "POST",
                redirect: "follow", 
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    regionName: regionName,
                    placeName: name,
                    lat: currentClickLat,
                    lng: currentClickLng,
                    date: todayStr,
                    note: note,
                    stampData: stampBase64 
                })
            })
            .then(res => res.text())
            .then(text => {
                try {
                    const respData = JSON.parse(text);
                    btnSubmit.innerHTML = oldText; 
                    btnSubmit.disabled = false;
                    if (respData.success) {
                        showToast(`âڑ، ؤگأ£ lئ°u "${name}" thأ nh cأ´ng!`);
                        tempSpot.folderUrl = respData.url; 
                        if (respData.stampUrl) tempSpot.stampUrl = respData.stampUrl;
                        if (isPhotoView) renderPhotoLayer();
                        fetch(`${GAS_API_URL}?action=get`, { redirect: "follow" })
                            .then(r => r.json())
                            .then(newData => {
                                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(newData));
                                if (newData.spots) preloadStampsIntoCache(newData.spots); 
                            });
                    } else {
                        throw new Error(respData.error || "Lل»—i lئ°u tل»« mأ،y chل»§");
                    }
                } catch(e) {
                    throw new Error("Phل؛£n hل»“i bل»‹ lل»—i ؤ‘ل»‹nh dل؛،ng: " + e.message);
                }
            })
            .catch(() => { 
                showToast(`âڈ³ Mأ،y chل»§ phل؛£n hل»“i chل؛­m. ؤگang kiل»ƒm tra chأ©o...`, 3000);
                setTimeout(() => {
                    fetch(`${GAS_API_URL}?action=get`, { redirect: "follow" })
                        .then(r => r.json())
                        .then(newData => {
                            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(newData));
                            const savedSpot = newData.spots.find(s => s.name === name && Math.abs(s.lat - currentClickLat) < 0.0001);
                            if (savedSpot && savedSpot.folderUrl) {
                                tempSpot.folderUrl = savedSpot.folderUrl; 
                                if (savedSpot.stampUrl) tempSpot.stampUrl = savedSpot.stampUrl;
                                if (isPhotoView) renderPhotoLayer();
                                showToast(`âœ… ؤگأ£ ؤ‘ل»“ng bل»™ thأ nh cأ´ng "${name}" cأ¹ng tem thئ°!`, 3000);
                            } else {
                                alert("Lل»—i thل»±c sل»±: Khأ´ng thل»ƒ tل؛،o thئ° mل»¥c. Vui lأ²ng kiل»ƒm tra lل؛،i quyل»پn Drive!");
                            }
                            btnSubmit.innerHTML = oldText; 
                            btnSubmit.disabled = false; 
                        })
                        .catch(() => {
                            btnSubmit.innerHTML = oldText; 
                            btnSubmit.disabled = false; 
                        });
                }, 2500);
            });
        }

        document.addEventListener('keydown', e => { 
            if (!modal.classList.contains('active')) return; 
            if (e.key === 'Escape') closeModal(); 
            if (e.key === 'Enter') {
                if (document.getElementById('step1Inputs').style.display !== 'none') {
                    goToStep2(); 
                } else {
                    submitCheckIn(); 
                }
            }
        });
        
        function forceMapRender() { 
            map.invalidateSize(); 
            if (!isPhotoView) updateLayerVisibility(); 
        }
        
        window.addEventListener('load', () => { 
            setTimeout(() => {
                const loader = document.getElementById('loadingOverlay');
                if (loader && loader.style.opacity !== '0') {
                    hideLoadingScreen();
                    showToast("âڑ ï¸ڈ Mل؛،ng chل؛­m, ؤ‘أ£ tل»± ؤ‘ل»™ng chuyل»ƒn sang chل؛؟ ؤ‘ل»™ Nhanh (Offline)!", 4000);
                }
            }, 7000);
            
            setTimeout(forceMapRender, 100); 
            setTimeout(forceMapRender, 500);
            
            loadProvinceBorders();
            loadDataFromGoogleSheets(); 
        });
    </script>
